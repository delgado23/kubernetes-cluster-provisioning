---
# provision_vms.yml
# Provisions Kubernetes nodes (controlplane + workers) in Proxmox via Foreman.
# AlmaLinux 10 host groups:
#   Controlplane : AlmaLinux 10/Kubernetes Controlplane Node
#   Workers      : AlmaLinux 10/Kubernetes Worker Node
#
# Requirements:
#   Foreman credentials set in vars/foreman.yml or Ansible Vault

- name: Provision Kubernetes nodes in Proxmox via Foreman
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/foreman.yml      # Foreman connection settings
    - vars/vm_defaults.yml  # Default VM hardware specs
    - vars/vms.yml          # Node definitions (names, IPs, hostgroups)

  tasks:

    # ------------------------------------------------------------------
    # 1. Validate required variables are present for each VM
    # ------------------------------------------------------------------
    - name: Validate VM definitions
      ansible.builtin.assert:
        that:
          - item.name is defined and item.name | length > 0
          - item.ip is defined and item.ip | ansible.utils.ipaddr
          - item.hostgroup is defined and item.hostgroup | length > 0
        fail_msg: >-
          VM entry is missing required fields (name, ip, hostgroup)
          or ip is invalid: {{ item | to_json }}
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"

    # ------------------------------------------------------------------
    # 2. Fetch Foreman host group IDs
    # ------------------------------------------------------------------
    - name: Look up Foreman hostgroup IDs
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hostgroups"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        return_content: true
        headers:
          Content-Type: application/json
          Accept: application/json
        # Using 'title' matches nested groups like "Parent/Child".
        # The uri module handles encoding of the query string automatically.
        body_format: form-urlencoded
        body:
          search: "title = \"{{ item }}\""
          per_page: 1
      register: hostgroup_results
      loop: "{{ vms | map(attribute='hostgroup') | unique | list }}"
      loop_control:
        label: "{{ item }}"

    - name: Build hostgroup name-to-id map
      ansible.builtin.set_fact:
        hostgroup_id_map: >-
          {{
            hostgroup_id_map | default({}) | combine(
              { item.item: (item.json.results[0].id | string) }
            )
          }}
      loop: "{{ hostgroup_results.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.json.results | length > 0

    - name: Fail if any hostgroup was not found
      ansible.builtin.fail:
        msg: "Hostgroup '{{ item.hostgroup }}' not found in Foreman."
      when: item.hostgroup not in (hostgroup_id_map | default({}))
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"

    # ------------------------------------------------------------------
    # 3. Check whether each host already exists in Foreman
    # ------------------------------------------------------------------
    - name: Check existing Foreman hosts
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.name }}.{{ foreman_domain }}"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        status_code: [200, 404]
        headers:
          Content-Type: application/json
          Accept: application/json
      register: existing_hosts
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"

    # ------------------------------------------------------------------
    # 4. Create hosts in Foreman (skips hosts that already exist)
    # ------------------------------------------------------------------
    - name: Create VM in Foreman / Proxmox
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts"
        method: POST
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        body_format: json
        status_code: 201
        headers:
          Content-Type: application/json
          Accept: application/json
        body:
          host:
            name: "{{ item.0.name }}"
            hostgroup_id: "{{ hostgroup_id_map[item.0.hostgroup] }}"
            domain_id: "{{ foreman_domain_id }}"
            subnet_id: "{{ foreman_subnet_id }}"
            operatingsystem_id: "{{ foreman_os_id }}"
            ptable_id: "{{ foreman_ptable_id }}"
            medium_id: "{{ foreman_medium_id }}"
            environment_id: "{{ foreman_environment_id }}"
            compute_resource_id: "{{ foreman_compute_resource_id }}"
            compute_profile_id: "{{ foreman_compute_profile_id }}"
            build: true
            managed: true
            ip: "{{ item.0.ip }}"
            compute_attributes:
              cores: "{{ item.0.cores | default(default_cores) }}"
              memory: "{{ ((item.0.memory_mb | default(default_memory_mb)) * 1024 * 1024) | int }}"
              # Proxmox-specific disk config — adjust pool/storage name as needed
              volumes_attributes:
                "0":
                  size_gb: "{{ item.0.disk_gb | default(default_disk_gb) }}"
                  storage: "{{ proxmox_storage }}"
                  cache: "{{ proxmox_disk_cache }}"
      loop: "{{ vms | zip(existing_hosts.results) | list }}"
      loop_control:
        label: "{{ item.0.name }}"
      when: item.1.status == 404
      register: created_hosts

    # ------------------------------------------------------------------
    # 5. Report results
    # ------------------------------------------------------------------
    - name: Report skipped VMs (already exist)
      ansible.builtin.debug:
        msg: "SKIPPED — host already exists in Foreman: {{ item.0.name }}"
      loop: "{{ vms | zip(existing_hosts.results) | list }}"
      loop_control:
        label: "{{ item.0.name }}"
      when: item.1.status == 200

    - name: Report created VMs
      ansible.builtin.debug:
        msg: >-
          CREATED — {{ item.item.0.name }}
          (IP: {{ item.item.0.ip }}, Group: {{ item.item.0.hostgroup }})
          Foreman ID: {{ item.json.id | default('unknown') }}
      loop: "{{ created_hosts.results }}"
      loop_control:
        label: "{{ item.item.0.name }}"
      when:
        - created_hosts is defined
        - item.skipped is not defined or not item.skipped

    # ------------------------------------------------------------------
    # 6. Optional — wait for hosts to finish building
    # ------------------------------------------------------------------
    - name: Wait for hosts to finish building (build flag clears)
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.name }}.{{ foreman_domain }}"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        headers:
          Accept: application/json
        return_content: true
      register: build_status
      until: build_status.json.build == false
      retries: "{{ build_wait_retries }}"
      delay: "{{ build_wait_delay_seconds }}"
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - wait_for_build | default(false)
        - created_hosts is defined
