---
# =============================================================================
# Ansible Playbook: Join Kubernetes Worker Nodes to a Cluster
# =============================================================================
# Prerequisites:
#   - kubeadm, kubelet, and kubectl installed on all nodes
#   - A running control plane (master node)
#   - Inventory with groups: [k8s_master] and [k8s_workers]
#   - SSH access and sudo privileges on all nodes
#
# Usage:
#   ansible-playbook join_k8s_workers.yml -i inventory.ini
# =============================================================================

# -----------------------------------------------------------------------------
# PLAY 1: Retrieve join command from the control plane
# -----------------------------------------------------------------------------
- name: Generate kubeadm join command on master
  hosts: arthas.example.com
  become: true
  gather_facts: false

  tasks:
    - name: Check that kubeadm is available
      command: which kubeadm
      changed_when: false

    - name: Generate a fresh bootstrap token and join command
      command: kubeadm token create --print-join-command
      register: kubeadm_join_cmd
      changed_when: true

    - name: Store join command as a host fact for workers to consume
      set_fact:
        join_command: "{{ kubeadm_join_cmd.stdout }}"

    - name: Display generated join command (for audit/debug)
      debug:
        msg: "Join command: {{ join_command }}"


# -----------------------------------------------------------------------------
# PLAY 2: Prepare and join each worker node
# -----------------------------------------------------------------------------
- name: Join worker nodes to the Kubernetes cluster
  hosts: foreman_almalinux10_kubernetesworkernode
  become: true
  gather_facts: true
  serial: 1          # Join one node at a time to avoid race conditions

  vars:
    kubeadm_join_command: >-
      {{ hostvars[groups['k8s_master'][0]]['join_command'] }}

  pre_tasks:
    - name: Verify kubelet service exists
      service_facts:

    - name: Fail if kubelet is not installed
      fail:
        msg: "kubelet service not found on {{ inventory_hostname }}. Install kubeadm/kubelet first."
      when: "'kubelet.service' not in ansible_facts.services"

    - name: Check if node is already part of a cluster
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Skip join if node is already configured
      debug:
        msg: "Node {{ inventory_hostname }} already has kubelet.conf — skipping join."
      when: kubelet_conf.stat.exists

  tasks:
    - name: Reset any previous kubeadm state (idempotent safety)
      command: kubeadm reset --force
      when: not kubelet_conf.stat.exists
      changed_when: true

    - name: Ensure required kernel modules are loaded
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules across reboots
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: "0644"

    - name: Apply required sysctl parameters
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }

    - name: Disable swap (required by kubelet)
      command: swapoff -a
      changed_when: true
      when: ansible_swaptotal_mb > 0

    - name: Remove swap entries from /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Enable and start kubelet
      service:
        name: kubelet
        enabled: true
        state: started

    - name: Join node to the cluster
      command: "{{ kubeadm_join_command }}"
      when: not kubelet_conf.stat.exists
      register: join_result
      changed_when: join_result.rc == 0

    - name: Show join output
      debug:
        var: join_result.stdout_lines
      when:
        - join_result is defined
        - not kubelet_conf.stat.exists

  post_tasks:
    - name: Pause to allow kubelet to initialize
      pause:
        seconds: 15
      when: not kubelet_conf.stat.exists

    - name: Confirm kubelet is running after join
      service_facts:

    - name: Assert kubelet is active
      assert:
        that: ansible_facts.services['kubelet.service'].state == 'running'
        fail_msg: "kubelet is NOT running on {{ inventory_hostname }} after join!"
        success_msg: "kubelet is running on {{ inventory_hostname }}."


# -----------------------------------------------------------------------------
# PLAY 3: Verify new nodes are visible from the master
# -----------------------------------------------------------------------------
- name: Verify worker nodes are registered in the cluster
  hosts: arthas.example.com
  become: true
  gather_facts: false

  tasks:
    - name: Wait for all worker nodes to appear as Ready
      command: kubectl get nodes --no-headers
      register: node_list
      retries: 12
      delay: 10
      until: >-
        groups['foreman_almalinux10_kubernetesworkernode'] | map('extract', hostvars, 'inventory_hostname') | list
        | difference(node_list.stdout_lines | map('regex_search', '^(\S+)') | list)
        | length == 0
      changed_when: false
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Display current node status
      command: kubectl get nodes -o wide
      changed_when: false
      register: nodes_wide
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Print node list
      debug:
        var: nodes_wide.stdout_lines
