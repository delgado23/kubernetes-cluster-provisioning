---
# =============================================================================
# Ansible Playbook: Join Kubernetes Worker Nodes to a Cluster
# =============================================================================

# -----------------------------------------------------------------------------
# PLAY 1: Group hosts by Foreman k8s_role parameter
# -----------------------------------------------------------------------------
- name: Group hosts by Foreman k8s_role parameter
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  gather_facts: true

  tasks:
    - name: Group by k8s_role foreman parameter
      ansible.builtin.group_by:
        key: "k8s_role_{{ foreman_params.k8s_role }}"


# -----------------------------------------------------------------------------
# PLAY 2: Retrieve join command from the primary control plane
# -----------------------------------------------------------------------------
- name: Generate kubeadm join command on primary control plane
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Check that kubeadm is available
      ansible.builtin.command: which kubeadm
      changed_when: false

    - name: Generate a fresh bootstrap token and join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: kubeadm_join_cmd
      changed_when: true

    - name: Store join command as a host fact for workers to consume
      ansible.builtin.set_fact:
        join_command: "{{ kubeadm_join_cmd.stdout }}"

    - name: Display generated join command (for audit/debug)
      ansible.builtin.debug:
        msg: "Join command: {{ join_command }}"


# -----------------------------------------------------------------------------
# PLAY 3: Prepare and join each worker node
# -----------------------------------------------------------------------------
- name: Join worker nodes to the Kubernetes cluster
  hosts: foreman_almalinux10_kubernetesworkernode
  become: true
  gather_facts: true
  serial: 1

  vars:
    kubeadm_join_command: >-
      {{ hostvars[groups['k8s_role_primary'][0]]['join_command'] }}

  pre_tasks:
    - name: Verify kubelet service exists
      ansible.builtin.service_facts:

    - name: Fail if kubelet is not installed
      ansible.builtin.fail:
        msg: "kubelet service not found on {{ inventory_hostname }}. Install kubeadm/kubelet first."
      when: "'kubelet.service' not in ansible_facts.services"

    - name: Check if node is already part of a cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Skip join if node is already configured
      ansible.builtin.debug:
        msg: "Node {{ inventory_hostname }} already has kubelet.conf — skipping join."
      when: kubelet_conf.stat.exists

  tasks:
    - name: Reset any previous kubeadm state (idempotent safety)
      ansible.builtin.command: kubeadm reset --force
      when: not kubelet_conf.stat.exists
      changed_when: true

    - name: Ensure required kernel modules are loaded
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules across reboots
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: "0644"

    - name: Apply required sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }

    - name: Disable swap (required by kubelet)
      ansible.builtin.command: swapoff -a
      changed_when: true
      when: ansible_swaptotal_mb > 0

    - name: Remove swap entries from /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Enable and start kubelet
      ansible.builtin.service:
        name: kubelet
        enabled: true
        state: started

    - name: Join node to the cluster
      ansible.builtin.command: "{{ kubeadm_join_command }}"
      when: not kubelet_conf.stat.exists
      register: join_result
      changed_when: join_result.rc == 0

    - name: Show join output
      ansible.builtin.debug:
        var: join_result.stdout_lines
      when:
        - join_result is defined
        - not kubelet_conf.stat.exists

  post_tasks:
    - name: Pause to allow kubelet to initialize
      ansible.builtin.pause:
        seconds: 15
      when: not kubelet_conf.stat.exists

    - name: Confirm kubelet is running after join
      ansible.builtin.service_facts:

    - name: Assert kubelet is active
      ansible.builtin.assert:
        that: ansible_facts.services['kubelet.service'].state == 'running'
        fail_msg: "kubelet is NOT running on {{ inventory_hostname }} after join!"
        success_msg: "kubelet is running on {{ inventory_hostname }}."


# -----------------------------------------------------------------------------
# PLAY 4: Verify new nodes are visible from the primary control plane
# -----------------------------------------------------------------------------
- name: Verify worker nodes are registered in the cluster
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Wait for all worker nodes to appear as Ready
      ansible.builtin.command: kubectl get nodes --no-headers
      register: node_list
      retries: 12
      delay: 10
      until: >-
        groups['foreman_almalinux10_kubernetesworkernode'] | map('extract', hostvars, 'inventory_hostname') | list
        | difference(node_list.stdout_lines | map('regex_search', '^(\S+)') | list)
        | length == 0
      changed_when: false
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Display current node status
      ansible.builtin.command: kubectl get nodes -o wide
      changed_when: false
      register: nodes_wide
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Print node list
      ansible.builtin.debug:
        var: nodes_wide.stdout_lines

# -----------------------------------------------------------------------------
# PLAY 5: Label worker nodes with node-role.kubernetes.io/worker
# -----------------------------------------------------------------------------
- name: Label worker nodes
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Label each worker node
      ansible.builtin.command: >
        kubectl label node {{ item }}
        node-role.kubernetes.io/worker=worker
        --overwrite
      loop: "{{ groups['foreman_almalinux10_kubernetesworkernode'] }}"
      changed_when: true
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Verify worker labels applied
      ansible.builtin.command: kubectl get nodes -o wide
      changed_when: false
      register: nodes_labeled
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Print labeled node list
      ansible.builtin.debug:
        var: nodes_labeled.stdout_lines

# -----------------------------------------------------------------------------
# PLAY 6: Install metrics-server
# -----------------------------------------------------------------------------
- name: Install metrics-server
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Install metrics-server
      ansible.builtin.command:
        cmd: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
      environment:
        KUBECONFIG: /root/.kube/config
      register: metrics_server_output
      changed_when: true

    - name: Print metrics-server install output
      ansible.builtin.debug:
        var: metrics_server_output.stdout_lines

    - name: Wait for metrics-server to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Available deployment/metrics-server
          --namespace kube-system
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

# -----------------------------------------------------------------------------
# PLAY 7: Install MetalLB and apply IP address pool
# -----------------------------------------------------------------------------
- name: Install MetalLB and configure IP address pool
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Install MetalLB
      ansible.builtin.command:
        cmd: kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.15.3/config/manifests/metallb-native.yaml
      environment:
        KUBECONFIG: /root/.kube/config
      register: metallb_install_output
      changed_when: true

    - name: Print MetalLB install output
      ansible.builtin.debug:
        var: metallb_install_output.stdout_lines

    - name: Wait for MetalLB controller to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Available deployment/controller
          --namespace metallb-system
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Wait for MetalLB webhook service to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Ready pod
          --selector=component=controller
          --namespace metallb-system
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Render and apply MetalLB IP address pool
      ansible.builtin.template:
        src: templates/metallb-pool.yml.j2
        dest: /tmp/metallb-pool.yml
        mode: "0600"

    - name: Apply MetalLB IP address pool
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/metallb-pool.yml
      environment:
        KUBECONFIG: /root/.kube/config
      register: metallb_pool_output
      changed_when: true

    - name: Print MetalLB pool apply output
      ansible.builtin.debug:
        var: metallb_pool_output.stdout_lines

    - name: Remove rendered MetalLB pool manifest
      ansible.builtin.file:
        path: /tmp/metallb-pool.yml
        state: absent

# =============================================================================
# PLAY 8: Install cert-manager with Cloudflare DNS-01 challenge
# =============================================================================
# Prerequisites in vars/vault.yml:
#   vault_cloudflare_api_token: "<your Cloudflare API token>"
#     Required token permissions:
#       Zone / Zone / Read
#       Zone / DNS  / Edit
#     Scope: the example.com zone only.
#
# The wildcard certificate *.example.com is requested once and stored
# as a Kubernetes TLS secret 'example-com-wildcard-tls' in the
# 'cert-manager' namespace. Traefik and Longhorn ingresses reference it.
# =============================================================================
- name: Install cert-manager with Cloudflare DNS-01 challenge
  hosts: k8s_role_primary
  become: true
  gather_facts: false
  vars_files:
    - vars/vault.yml   # vault_cloudflare_api_token

  vars:
    cert_manager_version: "v1.16.3"
    cert_manager_namespace: cert-manager
    cloudflare_email: "daniel@example.com"   # update if different
    domain: "example.com"
    wildcard_secret_name: "example-com-wildcard-tls"
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

  tasks:
    # -------------------------------------------------------------------------
    # Install cert-manager via Helm
    #   --set crds.enabled=true        installs CRDs as part of the release
    #                                  so they are upgraded/removed with the chart
    #   --dns01-recursive-nameservers-only  forces cert-manager to use only the
    #                                  specified resolvers for DNS-01 checks,
    #                                  bypassing split-horizon/internal DNS that
    #                                  might not see the public TXT record yet
    #   --dns01-recursive-nameservers  uses Google (8.8.8.8) and Cloudflare
    #                                  (1.1.1.1) public resolvers
    # -------------------------------------------------------------------------
    - name: Check if Helm is installed
      ansible.builtin.command: which helm
      changed_when: false
      register: helm_check
      failed_when: false

    - name: Install Helm if missing
      ansible.builtin.shell:
        cmd: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_check.rc != 0
      changed_when: true

    - name: Add cert-manager Helm repo
      ansible.builtin.command:
        cmd: /usr/local/bin/helm repo add jetstack https://charts.jetstack.io
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      failed_when: false

    - name: Update Helm repos
      ansible.builtin.command:
        cmd: /usr/local/bin/helm repo update
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Create cert-manager namespace
      ansible.builtin.command:
        cmd: kubectl create namespace {{ cert_manager_namespace }} --dry-run=client -o yaml
      register: certmgr_ns_yaml
      changed_when: false

    - name: Apply cert-manager namespace
      ansible.builtin.shell:
        cmd: "echo '{{ certmgr_ns_yaml.stdout }}' | kubectl apply -f -"
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

    - name: Install or upgrade cert-manager via Helm
      ansible.builtin.command:
        cmd: >
          /usr/local/bin/helm upgrade --install cert-manager jetstack/cert-manager
          --namespace {{ cert_manager_namespace }}
          --version {{ cert_manager_version }}
          --set crds.enabled=true
          --set extraArgs={--dns01-recursive-nameservers-only\,--dns01-recursive-nameservers=8.8.8.8:53\,1.1.1.1:53}
          --wait
          --timeout 5m
      environment:
        KUBECONFIG: /root/.kube/config
      register: certmgr_output
      changed_when: true

    - name: Print cert-manager install output
      ansible.builtin.debug:
        var: certmgr_output.stdout_lines

    - name: Wait for cert-manager webhook to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Available deployment/cert-manager-webhook
          --namespace {{ cert_manager_namespace }}
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Wait for cert-manager controller to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Available deployment/cert-manager
          --namespace {{ cert_manager_namespace }}
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    # -------------------------------------------------------------------------
    # Cloudflare API token secret
    # -------------------------------------------------------------------------
    - name: Create Cloudflare API token secret
      ansible.builtin.command:
        cmd: >
          kubectl create secret generic cloudflare-api-token
          --namespace {{ cert_manager_namespace }}
          --from-literal=api-token={{ vault_cloudflare_api_token }}
          --dry-run=client -o yaml
      register: cf_secret_yaml
      changed_when: false
      no_log: true

    - name: Apply Cloudflare API token secret
      ansible.builtin.shell:
        cmd: "echo '{{ cf_secret_yaml.stdout }}' | kubectl apply -f -"
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true
      no_log: true

    # -------------------------------------------------------------------------
    # ClusterIssuer — Let's Encrypt production with Cloudflare DNS-01
    # -------------------------------------------------------------------------
    - name: Write ClusterIssuer manifest
      ansible.builtin.copy:
        dest: /tmp/clusterissuer-cloudflare.yml
        mode: "0600"
        content: |
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-cloudflare
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: {{ cloudflare_email }}
              privateKeySecretRef:
                name: letsencrypt-cloudflare-account-key
              solvers:
                - dns01:
                    cloudflare:
                      email: {{ cloudflare_email }}
                      apiTokenSecretRef:
                        name: cloudflare-api-token
                        key: api-token
                      # zone is required so cert-manager can construct the
                      # correct /zones/<id>/dns_records path when cleaning up
                      # the DNS-01 TXT challenge record. Without it the zone ID
                      # is empty and Cloudflare returns error 7003.
                      zone: "{{ domain }}"
                  selector:
                    dnsZones:
                      - "{{ domain }}"

    - name: Apply ClusterIssuer
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/clusterissuer-cloudflare.yml
      environment:
        KUBECONFIG: /root/.kube/config
      register: issuer_output
      changed_when: true

    - name: Print ClusterIssuer apply output
      ansible.builtin.debug:
        var: issuer_output.stdout_lines

    - name: Remove ClusterIssuer manifest
      ansible.builtin.file:
        path: /tmp/clusterissuer-cloudflare.yml
        state: absent

    # -------------------------------------------------------------------------
    # Wildcard Certificate — *.example.com
    # Stored in cert-manager namespace; Traefik and Longhorn ingresses
    # reference it via a cross-namespace secret copy or directly.
    # -------------------------------------------------------------------------
    - name: Write wildcard Certificate manifest
      ansible.builtin.copy:
        dest: /tmp/wildcard-cert.yml
        mode: "0600"
        content: |
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: garaventaville-wildcard
            namespace: {{ cert_manager_namespace }}
          spec:
            secretName: {{ wildcard_secret_name }}
            issuerRef:
              name: letsencrypt-cloudflare
              kind: ClusterIssuer
            commonName: "*.{{ domain }}"
            dnsNames:
              - "*.{{ domain }}"
              - "{{ domain }}"

    - name: Apply wildcard Certificate
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/wildcard-cert.yml
      environment:
        KUBECONFIG: /root/.kube/config
      register: cert_output
      changed_when: true

    - name: Print Certificate apply output
      ansible.builtin.debug:
        var: cert_output.stdout_lines

    - name: Remove wildcard Certificate manifest
      ansible.builtin.file:
        path: /tmp/wildcard-cert.yml
        state: absent

    - name: Wait for wildcard certificate to be issued (up to 10 min)
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Ready certificate/garaventaville-wildcard
          --namespace {{ cert_manager_namespace }}
          --timeout=600s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    # -------------------------------------------------------------------------
    # Copy wildcard TLS secret into the traefik and longhorn namespaces
    # so ingress resources in those namespaces can reference it directly.
    # kubectl create secret is used with --dry-run to make this idempotent.
    # -------------------------------------------------------------------------
    - name: Copy wildcard secret into traefik namespace
      ansible.builtin.shell:
        cmd: |
          kubectl get secret {{ wildcard_secret_name }} \
            --namespace {{ cert_manager_namespace }} \
            -o json \
          | jq 'del(.metadata.namespace, .metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.annotations, .metadata.managedFields) | .metadata.namespace = "traefik"' \
          | kubectl apply -f -
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

    - name: Copy wildcard secret into longhorn-system namespace
      ansible.builtin.shell:
        cmd: |
          kubectl get secret {{ wildcard_secret_name }} \
            --namespace {{ cert_manager_namespace }} \
            -o json \
          | jq 'del(.metadata.namespace, .metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.annotations, .metadata.managedFields) | .metadata.namespace = "longhorn-system"' \
          | kubectl apply -f -
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

# =============================================================================
# PLAY 9: Install Traefik ingress controller via Helm and expose its dashboard
# =============================================================================
# Traefik is installed into the 'traefik' namespace via the official Helm chart.
# It is configured to:
#   - Use MetalLB for its LoadBalancer service (gets a real LAN IP)
#   - Expose the dashboard at https://traefik.example.com
#   - Use the wildcard TLS secret copied in Play 8
#   - Protect the dashboard with basic auth (set vault_traefik_dashboard_password
#     in vars/vault.yml — stored as a htpasswd bcrypt hash)
#
# Additional vars/vault.yml keys needed:
#   vault_traefik_dashboard_password: "<bcrypt htpasswd string>"
#     Generate with: htpasswd -nbB admin 'yourpassword'
# =============================================================================
- name: Install Traefik ingress controller
  hosts: k8s_role_primary
  become: true
  gather_facts: false
  vars_files:
    - vars/vault.yml

  vars:
    traefik_namespace: traefik
    traefik_chart_version: "33.2.1"   # pin — check https://artifacthub.io/packages/helm/traefik/traefik
    wildcard_secret_name: "example-com-wildcard-tls"
    domain: "example.com"

  tasks:
    - name: Ensure jq is installed (needed for secret copy in Play 8)
      ansible.builtin.command: which jq
      changed_when: false
      failed_when: false
      register: jq_check

    - name: Install jq if missing
      ansible.builtin.dnf:
        name: jq
        state: present
      when: jq_check.rc != 0

    - name: Ensure helm is installed
      ansible.builtin.command: which helm
      changed_when: false
      register: helm_check
      failed_when: false

    - name: Install Helm if missing
      ansible.builtin.shell:
        cmd: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_check.rc != 0
      changed_when: true

    - name: Add Traefik Helm repo
      ansible.builtin.command:
        cmd: /usr/local/bin/helm repo add traefik https://traefik.github.io/charts
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false
      failed_when: false

    - name: Update Helm repos
      ansible.builtin.command:
        cmd: /usr/local/bin/helm repo update
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Create traefik namespace
      ansible.builtin.command:
        cmd: kubectl create namespace {{ traefik_namespace }} --dry-run=client -o yaml
      register: traefik_ns_yaml
      changed_when: false

    - name: Apply traefik namespace
      ansible.builtin.shell:
        cmd: "echo '{{ traefik_ns_yaml.stdout }}' | kubectl apply -f -"
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

    # Create the basic auth secret for the Traefik dashboard.
    # vault_traefik_dashboard_password must be a bcrypt htpasswd string,
    # e.g. the output of: htpasswd -nbB admin 'yourpassword'
    - name: Create Traefik dashboard basic auth secret
      ansible.builtin.command:
        cmd: >
          kubectl create secret generic traefik-dashboard-auth
          --namespace {{ traefik_namespace }}
          --from-literal=users={{ vault_traefik_dashboard_password }}
          --dry-run=client -o yaml
      register: traefik_auth_yaml
      changed_when: false
      no_log: true

    - name: Apply Traefik dashboard basic auth secret
      ansible.builtin.shell:
        cmd: "echo '{{ traefik_auth_yaml.stdout }}' | kubectl apply -f -"
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true
      no_log: true

    - name: Write Traefik Helm values
      ansible.builtin.copy:
        dest: /tmp/traefik-values.yml
        mode: "0600"
        content: |
          deployment:
            replicas: 2

          service:
            type: LoadBalancer
            loadBalancerIP: "172.16.0.50"

          ingressClass:
            enabled: true
            isDefaultClass: true

          providers:
            kubernetesCRD:
              enabled: true
              allowCrossNamespace: true
            kubernetesIngress:
              enabled: true

          # Redirect all HTTP to HTTPS globally
          ports:
            web:
              redirectTo:
                port: websecure
            websecure:
              tls:
                enabled: true

          # Enable the Traefik dashboard (access controlled via IngressRoute below)
          api:
            dashboard: true
            insecure: false

          logs:
            general:
              level: INFO
            access:
              enabled: true

          # Persist ACME/TLS data — not needed here since cert-manager manages certs,
          # but useful if you ever add Traefik-native resolvers later.
          persistence:
            enabled: false

          # Tolerate controlplane taint if you want Traefik on controlplane nodes too.
          # Remove this block if you only want Traefik on workers.
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule

    - name: Install or upgrade Traefik via Helm
      ansible.builtin.command:
        cmd: >
          /usr/local/bin/helm upgrade --install traefik traefik/traefik
          --namespace {{ traefik_namespace }}
          --version {{ traefik_chart_version }}
          --values /tmp/traefik-values.yml
          --wait
          --timeout 5m
      environment:
        KUBECONFIG: /root/.kube/config
      register: traefik_helm_output
      changed_when: true

    - name: Print Traefik Helm output
      ansible.builtin.debug:
        var: traefik_helm_output.stdout_lines

    - name: Remove Traefik values file
      ansible.builtin.file:
        path: /tmp/traefik-values.yml
        state: absent

    # -------------------------------------------------------------------------
    # Traefik dashboard IngressRoute + Middleware
    # Exposed at: https://traefik.example.com
    # Protected by basic auth via the secret created above.
    # -------------------------------------------------------------------------
    - name: Write Traefik dashboard IngressRoute manifest
      ansible.builtin.copy:
        dest: /tmp/traefik-dashboard-ingress.yml
        mode: "0600"
        content: |
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: traefik-dashboard-auth
            namespace: {{ traefik_namespace }}
          spec:
            basicAuth:
              secret: traefik-dashboard-auth

          ---
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: traefik-dashboard
            namespace: {{ traefik_namespace }}
          spec:
            entryPoints:
              - websecure
            routes:
              - match: Host(`traefik.{{ domain }}`)
                kind: Rule
                middlewares:
                  - name: traefik-dashboard-auth
                services:
                  - name: api@internal
                    kind: TraefikService
            tls:
              secretName: {{ wildcard_secret_name }}

    - name: Apply Traefik dashboard IngressRoute
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/traefik-dashboard-ingress.yml
      environment:
        KUBECONFIG: /root/.kube/config
      register: traefik_ingress_output
      changed_when: true

    - name: Print Traefik IngressRoute apply output
      ansible.builtin.debug:
        var: traefik_ingress_output.stdout_lines

    - name: Remove Traefik dashboard IngressRoute manifest
      ansible.builtin.file:
        path: /tmp/traefik-dashboard-ingress.yml
        state: absent

# =============================================================================
# PLAY 10: Expose Longhorn UI via Traefik IngressRoute
# =============================================================================
# Assumes Longhorn is already installed in the 'longhorn-system' namespace
# (typically via the Longhorn install playbook or Helm chart separately).
# The wildcard secret was copied into longhorn-system in Play 8.
#
# Exposed at: https://longhorn.example.com
# Protected by the same basic auth pattern as the Traefik dashboard.
#
# Additional vars/vault.yml keys needed:
#   vault_longhorn_dashboard_password: "<bcrypt htpasswd string>"
#     Generate with: htpasswd -nbB admin 'yourpassword'
# =============================================================================
- name: Expose Longhorn UI via Traefik IngressRoute
  hosts: k8s_role_primary
  become: true
  gather_facts: false
  vars_files:
    - vars/vault.yml

  vars:
    longhorn_namespace: longhorn-system
    wildcard_secret_name: "example-com-wildcard-tls"
    domain: "example.com"

  tasks:
    - name: Create Longhorn dashboard basic auth secret
      ansible.builtin.command:
        cmd: >
          kubectl create secret generic longhorn-dashboard-auth
          --namespace {{ longhorn_namespace }}
          --from-literal=users={{ vault_longhorn_dashboard_password }}
          --dry-run=client -o yaml
      register: longhorn_auth_yaml
      changed_when: false
      no_log: true

    - name: Apply Longhorn dashboard basic auth secret
      ansible.builtin.shell:
        cmd: "echo '{{ longhorn_auth_yaml.stdout }}' | kubectl apply -f -"
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true
      no_log: true

    - name: Write Longhorn IngressRoute manifest
      ansible.builtin.copy:
        dest: /tmp/longhorn-ingress.yml
        mode: "0600"
        content: |
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: longhorn-dashboard-auth
            namespace: {{ longhorn_namespace }}
          spec:
            basicAuth:
              secret: longhorn-dashboard-auth

          ---
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: longhorn-dashboard
            namespace: {{ longhorn_namespace }}
          spec:
            entryPoints:
              - websecure
            routes:
              - match: Host(`longhorn.{{ domain }}`)
                kind: Rule
                middlewares:
                  - name: longhorn-dashboard-auth
                services:
                  - name: longhorn-frontend
                    port: 80
            tls:
              secretName: {{ wildcard_secret_name }}

    - name: Apply Longhorn IngressRoute
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/longhorn-ingress.yml
      environment:
        KUBECONFIG: /root/.kube/config
      register: longhorn_ingress_output
      changed_when: true

    - name: Print Longhorn IngressRoute apply output
      ansible.builtin.debug:
        var: longhorn_ingress_output.stdout_lines

    - name: Remove Longhorn IngressRoute manifest
      ansible.builtin.file:
        path: /tmp/longhorn-ingress.yml
        state: absent

    # -------------------------------------------------------------------------
    # Final summary
    # -------------------------------------------------------------------------
    - name: Retrieve Traefik LoadBalancer IP
      ansible.builtin.command:
        cmd: >
          kubectl get svc traefik
          --namespace traefik
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      environment:
        KUBECONFIG: /root/.kube/config
      register: traefik_lb_ip
      changed_when: false

    - name: Print access summary
      ansible.builtin.debug:
        msg:
          - "================================================================="
          - "Cluster ingress setup complete."
          - "Traefik LoadBalancer IP : {{ traefik_lb_ip.stdout }}"
          - "Point *.{{ domain }} at this IP in Cloudflare DNS."
          - "-----------------------------------------------------------------"
          - "Traefik dashboard : https://traefik.{{ domain }}"
          - "Longhorn dashboard: https://longhorn.{{ domain }}"
          - "================================================================="

