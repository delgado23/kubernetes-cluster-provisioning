[defaults]
forks           = 20
pipelining      = True
host_key_checking = True
gathering       = smart
fact_caching    = jsonfile
fact_caching_connection = ~/.ansible/facts
fact_caching_timeout = 3600

[ssh_connection]
pipelining  = True
ssh_args    = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o StrictHostKeyChecking=accept-new
