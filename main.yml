---
# =============================================================================
# main.yml — Kubernetes Cluster Provisioning
# =============================================================================
# Full lifecycle: provision VMs, prepare nodes, bootstrap the control plane,
# join workers, and install cluster add-ons.
#
# Run the full pipeline:
#   ansible-playbook main.yml
#
# Run a specific phase using tags:
#   ansible-playbook main.yml --tags provision
#   ansible-playbook main.yml --tags prep
#   ansible-playbook main.yml --tags bootstrap
#   ansible-playbook main.yml --tags workers
#   ansible-playbook main.yml --tags addons
#
# Skip VM provisioning (re-runs against existing nodes):
#   ansible-playbook main.yml --skip-tags provision
# =============================================================================


# -----------------------------------------------------------------------------
# WIPE (conditional — only runs when wipe_cluster=true)
# -----------------------------------------------------------------------------

- name: Wipe cluster nodes from Foreman and FreeIPA
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    wipe_cluster: false
  vars_files:
    - vars/vault.yml
    - vars/vms.yml
    - vars/foreman.yml
    - vars/freeipa.yml
  pre_tasks:
    - name: Skip wipe — wipe_cluster is not set
      ansible.builtin.meta: end_play
      when: not (wipe_cluster | bool)

    - name: Query Foreman for existing control plane nodes
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts?search=name+%7E+%22{{ (controlplane_name_prefix + '-') | urlencode }}%22&per_page=250"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        headers:
          Accept: application/json
      register: _existing_cps_result

    - name: Query Foreman for existing worker nodes
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts?search=name+%7E+%22{{ (worker_name_prefix + '-') | urlencode }}%22&per_page=250"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        headers:
          Accept: application/json
      register: _existing_workers_result

    - name: Initialise vms list
      ansible.builtin.set_fact:
        vms: []

    - name: Build vms list from Foreman query results
      ansible.builtin.set_fact:
        vms: "{{ vms + [{'name': item | regex_replace('\\.' + foreman_domain + '$', '')}] }}"
      loop: >-
        {{
          (_existing_cps_result.json.results + _existing_workers_result.json.results)
          | map(attribute='name') | list
        }}

    - name: Report nodes to be wiped
      ansible.builtin.debug:
        msg: "Wiping {{ vms | length }} node(s): {{ vms | map(attribute='name') | join(', ') }}"

  roles:
    - role: cluster_cleanup


# -----------------------------------------------------------------------------
# PHASE 1: VM Provisioning
# -----------------------------------------------------------------------------

- name: Provision Kubernetes nodes via Foreman
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [provision]
  vars_files:
    - vars/vault.yml
    - vars/foreman.yml
    - vars/vms.yml
  roles:
    - role: vm_provisioning

- name: Configure Proxmox VM settings (EFI disk, rename, tags)
  hosts: k8s_nodes
  gather_facts: false
  serial: 1
  tags: [provision]
  vars_files:
    - vars/vault.yml
  vars:
    proxmox_api_token: "{{ vault_proxmox_api_token }}"
  roles:
    - role: proxmox_postconfig


# -----------------------------------------------------------------------------
# PHASE 2: Node Preparation
# -----------------------------------------------------------------------------

- name: Wait for nodes to become reachable
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  gather_facts: false
  tags: [prep]
  tasks:
    - name: Wait for SSH connectivity
      ansible.builtin.wait_for_connection:
        timeout: 600

- name: Linux base provisioning
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  become: true
  become_user: root
  gather_facts: true
  strategy: free
  tags: [prep]
  vars_files:
    - vars/vault.yml
  handlers:
    - import_tasks: handlers/main.yml
  pre_tasks:
    - name: Check for provisioned sentinel file
      ansible.builtin.stat:
        path: /root/.provisioned
      register: provisioned_file
    - name: Skip host if already provisioned
      ansible.builtin.meta: end_host
      when: provisioned_file.stat.exists
  tasks:
    - name: Provision an Enterprise Linux server
      ansible.builtin.include_role:
        name: enterprise_linux
      when: ansible_facts['os_family'] == 'RedHat'

- name: Enroll nodes into FreeIPA
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  become: true
  become_user: root
  gather_facts: false
  strategy: free
  tags: [prep]
  vars_files:
    - vars/vault.yml
    - vars/freeipa.yml
  pre_tasks:
    - name: Check for provisioned sentinel file
      ansible.builtin.stat:
        path: /root/.provisioned
      register: provisioned_file
    - name: Skip host if already provisioned
      ansible.builtin.meta: end_host
      when: provisioned_file.stat.exists
  tasks:
    - name: Enroll into FreeIPA
      ansible.builtin.include_role:
        name: freeipa.ansible_freeipa.ipaclient

- name: Post-enrollment configuration
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  become: true
  become_user: root
  gather_facts: false
  strategy: free
  tags: [prep]
  vars_files:
    - vars/vault.yml
  handlers:
    - import_tasks: handlers/main.yml
  pre_tasks:
    - name: Check for provisioned sentinel file
      ansible.builtin.stat:
        path: /root/.provisioned
      register: provisioned_file
    - name: Skip host if already provisioned
      ansible.builtin.meta: end_host
      when: provisioned_file.stat.exists
  tasks:
    - name: Reboot the system
      ansible.builtin.reboot:
    - name: Deploy DUO config
      ansible.builtin.template:
        src: templates/login_duo.conf.j2
        dest: /etc/duo/login_duo.conf
    - name: Deploy SSH config changes
      ansible.builtin.template:
        src: templates/00-duo.conf.j2
        dest: /etc/ssh/sshd_config.d/00-duo.conf
      notify:
        - Reload ssh
    - name: Create provisioned sentinel
      ansible.builtin.file:
        path: /root/.provisioned
        state: touch
        mode: "0600"

- name: Common Kubernetes prerequisites (all nodes)
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  become: true
  strategy: free
  tags: [prep]
  vars_files:
    - vars/vms.yml
  pre_tasks:
    - name: Check if node is already in the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
  tasks:
    - name: Apply common Kubernetes prerequisites
      ansible.builtin.include_role:
        name: common
      when: not kubelet_conf.stat.exists

- name: Controlplane infrastructure (HAProxy, keepalived, firewall)
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  strategy: free
  tags: [prep]
  vars_files:
    - vars/vault.yml
    - vars/foreman.yml
    - vars/vms.yml
  pre_tasks:
    - name: Check if node is already in the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Re-fetch host parameters from Foreman
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts/{{ inventory_hostname }}/parameters"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        headers:
          Accept: application/json
      register: _fresh_params
      delegate_to: localhost
      become: false
      when: not kubelet_conf.stat.exists

    - name: Merge fresh host parameters into foreman_params
      ansible.builtin.set_fact:
        foreman_params: >-
          {{
            (foreman_params | default({})) | combine(
              dict(
                _fresh_params.json.results | map(attribute='name')
                | zip(_fresh_params.json.results | map(attribute='value'))
              )
            )
          }}
      when:
        - not kubelet_conf.stat.exists
        - _fresh_params is defined
        - _fresh_params.status == 200
  tasks:
    - name: Apply controlplane infrastructure
      ansible.builtin.include_role:
        name: controlplane_infra
      when: not kubelet_conf.stat.exists

- name: Worker node storage (LVM/Longhorn)
  hosts: foreman_almalinux10_kubernetesworkernode
  become: true
  strategy: free
  tags: [prep]
  pre_tasks:
    - name: Check if node is already in the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
  tasks:
    - name: Apply worker node storage configuration
      ansible.builtin.include_role:
        name: worker_storage
      when: not kubelet_conf.stat.exists


# -----------------------------------------------------------------------------
# PHASE 3: Control Plane Bootstrap
# -----------------------------------------------------------------------------

- name: Initialize primary control plane
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [bootstrap]
  vars_files:
    - vars/vault.yml
    - vars/vms.yml
  pre_tasks:
    - name: Skip bootstrap when only adding workers
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
    - name: Run on primary control plane only
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'primary'
  tasks:
    - name: Bootstrap primary control plane
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: init_primary

- name: Join secondary control planes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  serial: 1
  tags: [bootstrap]
  vars_files:
    - vars/vault.yml
  pre_tasks:
    - name: Skip bootstrap when only adding workers
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
    - name: Skip non-secondary nodes
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'secondary'
  tasks:
    - name: Join secondary control plane node
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: join_secondary

- name: Install kubelet-serving-cert-approver
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [bootstrap]
  pre_tasks:
    - name: Skip bootstrap when only adding workers
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
    - name: Run on primary control plane only
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'primary'
  tasks:
    - name: Install kubelet-serving-cert-approver
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: cert_approver

- name: Install controlplane tooling (kubectl completion, Helm, k9s)
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [bootstrap]
  pre_tasks:
    - name: Skip bootstrap when only adding workers
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
  tasks:
    - name: Install controlplane tooling
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: tooling


# -----------------------------------------------------------------------------
# PHASE 4: Worker Bootstrap
# -----------------------------------------------------------------------------

- name: Join worker nodes to the cluster
  hosts: foreman_almalinux10_kubernetesworkernode
  become: true
  gather_facts: true
  strategy: free
  tags: [workers]
  roles:
    - role: worker_join

- name: Label worker nodes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [workers]
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
  pre_tasks:
    - name: Run on primary control plane only
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'primary'
  tasks:
    - name: Label worker nodes
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: label_workers


# -----------------------------------------------------------------------------
# PHASE 5: Cluster Add-ons
# -----------------------------------------------------------------------------

- name: Configure kube-apiserver OIDC for Headlamp
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [addons]
  vars_files:
    - vars/vault.yml
  tasks:
    - name: Patch kube-apiserver OIDC configuration
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: patch_apiserver_oidc

- name: Install cluster add-ons
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [addons]
  pre_tasks:
    - name: Skip cluster add-ons when only adding worker nodes
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
    - name: Run add-ons on primary control plane only
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'primary'
  vars_files:
    - vars/vault.yml
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
  tasks:
    - name: Fetch latest addon versions from GitHub
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: fetch_versions

    - name: Verify workers are registered and Ready
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: verify_workers

    - name: Label worker nodes
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: label_workers

    - name: Install Kyverno policy engine
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: kyverno

    - name: Install metrics-server
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: metrics_server

    - name: Install descheduler for pod rebalancing
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: descheduler

    - name: Install MetalLB and configure IP address pool
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: metallb

    - name: Install kube-router for NetworkPolicy enforcement
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: kube_router

    - name: Install Longhorn distributed storage
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: longhorn

    - name: Install reflector secret mirror operator
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: reflector

    - name: Install cert-manager with Cloudflare DNS-01
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: cert_manager

    - name: Install Prometheus monitoring stack
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: prometheus

    - name: Install Traefik ingress controller
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: traefik

    - name: Apply Prometheus IngressRoutes
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: prometheus_ingress

    - name: Install Headlamp Kubernetes dashboard
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: headlamp

    - name: Install ArgoCD GitOps controller
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: argocd

    - name: Apply Pod Security Standards namespace labels
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: pss

    - name: Expose Longhorn UI via Traefik IngressRoute
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: longhorn_ui

# -----------------------------------------------------------------------------
# DEBUG: Ingress diagnostics (ansible-playbook main.yml --tags debug)
# -----------------------------------------------------------------------------

- name: Ingress debug
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: true
  tags: [debug]
  vars_files:
    - vars/vault.yml
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
  tasks:
    - name: Dump foreman_params variable
      ansible.builtin.debug:
        var: foreman_params

    - name: Dump all groups containing this host
      ansible.builtin.debug:
        msg: "{{ group_names }}"

    - name: Run ingress diagnostics (first CP only)
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: debug_ingress
      run_once: true
