---
# =============================================================================
# main.yml — Kubernetes Cluster Provisioning
# =============================================================================
# Full lifecycle: provision VMs, prepare nodes, bootstrap the control plane,
# join workers, and install cluster add-ons.
#
# Run the full pipeline:
#   ansible-playbook main.yml
#
# Run a specific phase using tags:
#   ansible-playbook main.yml --tags provision
#   ansible-playbook main.yml --tags prep
#   ansible-playbook main.yml --tags bootstrap
#   ansible-playbook main.yml --tags workers
#   ansible-playbook main.yml --tags addons
#
# Skip VM provisioning (re-runs against existing nodes):
#   ansible-playbook main.yml --skip-tags provision
# =============================================================================


# -----------------------------------------------------------------------------
# PHASE 1: VM Provisioning
# -----------------------------------------------------------------------------

- name: Provision Kubernetes nodes via Foreman
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [provision]
  vars_files:
    - vars/vault.yml
    - vars/foreman.yml
    - vars/vms.yml
  roles:
    - role: vm_provisioning

- name: Configure Proxmox VM settings (EFI disk, rename, tags)
  hosts: k8s_nodes
  gather_facts: false
  serial: 1
  tags: [provision]
  vars_files:
    - vars/vault.yml
  vars:
    proxmox_api_token: "{{ vault_proxmox_api_token }}"
  roles:
    - role: proxmox_postconfig


# -----------------------------------------------------------------------------
# PHASE 2: Node Preparation
# -----------------------------------------------------------------------------

- name: Wait for nodes to become reachable
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  gather_facts: false
  tags: [prep]
  tasks:
    - name: Wait for SSH connectivity
      ansible.builtin.wait_for_connection:
        timeout: 600

- name: Common Kubernetes prerequisites (all nodes)
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  become: true
  strategy: free
  tags: [prep]
  pre_tasks:
    - name: Check if node is already in the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
  tasks:
    - name: Apply common Kubernetes prerequisites
      ansible.builtin.include_role:
        name: common
      when: not kubelet_conf.stat.exists

- name: Controlplane infrastructure (HAProxy, keepalived, firewall)
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  strategy: free
  tags: [prep]
  vars_files:
    - vars/vault.yml
  pre_tasks:
    - name: Check if node is already in the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
  tasks:
    - name: Apply controlplane infrastructure
      ansible.builtin.include_role:
        name: controlplane_infra
      when: not kubelet_conf.stat.exists

- name: Worker node storage (LVM/Longhorn)
  hosts: foreman_almalinux10_kubernetesworkernode
  become: true
  strategy: free
  tags: [prep]
  pre_tasks:
    - name: Check if node is already in the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
  tasks:
    - name: Apply worker node storage configuration
      ansible.builtin.include_role:
        name: worker_storage
      when: not kubelet_conf.stat.exists


# -----------------------------------------------------------------------------
# PHASE 3: Control Plane Bootstrap
# -----------------------------------------------------------------------------

- name: Initialize primary control plane
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [bootstrap]
  vars_files:
    - vars/vault.yml
  pre_tasks:
    - name: Skip bootstrap when only adding workers
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
    - name: Run on primary control plane only
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'primary'
  tasks:
    - name: Bootstrap primary control plane
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: init_primary

- name: Join secondary control planes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  serial: 1
  tags: [bootstrap]
  vars_files:
    - vars/vault.yml
  pre_tasks:
    - name: Skip bootstrap when only adding workers
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
    - name: Skip non-secondary nodes
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'secondary'
  tasks:
    - name: Join secondary control plane node
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: join_secondary

- name: Install kubelet-serving-cert-approver
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [bootstrap]
  pre_tasks:
    - name: Skip bootstrap when only adding workers
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
    - name: Run on primary control plane only
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'primary'
  tasks:
    - name: Install kubelet-serving-cert-approver
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: cert_approver

- name: Install controlplane tooling (kubectl completion, Helm, k9s)
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [bootstrap]
  pre_tasks:
    - name: Skip bootstrap when only adding workers
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
  tasks:
    - name: Install controlplane tooling
      ansible.builtin.include_role:
        name: cluster_bootstrap
        tasks_from: tooling


# -----------------------------------------------------------------------------
# PHASE 4: Worker Bootstrap
# -----------------------------------------------------------------------------

- name: Join worker nodes to the cluster
  hosts: foreman_almalinux10_kubernetesworkernode
  become: true
  gather_facts: true
  serial: 1
  tags: [workers]
  roles:
    - role: worker_join

- name: Label worker nodes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [workers]
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
  pre_tasks:
    - name: Run on primary control plane only
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'primary'
  tasks:
    - name: Label worker nodes
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: label_workers


# -----------------------------------------------------------------------------
# PHASE 5: Cluster Add-ons
# -----------------------------------------------------------------------------

- name: Install cluster add-ons
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  tags: [addons]
  pre_tasks:
    - name: Skip cluster add-ons when only adding worker nodes
      ansible.builtin.meta: end_play
      when: controlplane_node_count | int == 0
    - name: Run add-ons on primary control plane only
      ansible.builtin.meta: end_host
      when: foreman_params.k8s_role != 'primary'
  vars_files:
    - vars/vault.yml
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
  tasks:
    - name: Fetch latest addon versions from GitHub
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: fetch_versions

    - name: Verify workers are registered and Ready
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: verify_workers

    - name: Label worker nodes
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: label_workers

    - name: Install Kyverno policy engine
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: kyverno

    - name: Install metrics-server
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: metrics_server

    - name: Install MetalLB and configure IP address pool
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: metallb

    - name: Install Traefik ingress controller
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: traefik

    - name: Install Longhorn distributed storage
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: longhorn

    - name: Install reflector secret mirror operator
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: reflector

    - name: Install cert-manager with Cloudflare DNS-01
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: cert_manager

    - name: Install Headlamp Kubernetes dashboard
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: headlamp

    - name: Install ArgoCD GitOps controller
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: argocd

    - name: Apply Pod Security Standards namespace labels
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: pss

    - name: Expose Longhorn UI via Traefik IngressRoute
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: longhorn_ui

# -----------------------------------------------------------------------------
# DEBUG: Ingress diagnostics (ansible-playbook main.yml --tags debug)
# -----------------------------------------------------------------------------

- name: Ingress debug
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: true
  tags: [debug]
  vars_files:
    - vars/vault.yml
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
  tasks:
    - name: Dump foreman_params variable
      ansible.builtin.debug:
        var: foreman_params

    - name: Dump all groups containing this host
      ansible.builtin.debug:
        msg: "{{ group_names }}"

    - name: Run ingress diagnostics (first CP only)
      ansible.builtin.include_role:
        name: cluster_addons
        tasks_from: debug_ingress
      run_once: true
