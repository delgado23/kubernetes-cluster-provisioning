---
# =============================================================================
# Proxmox K8s VM Configuration Playbook
# =============================================================================
# No collection dependencies — uses only ansible.builtin.uri against the
# Proxmox VE REST API with API token authentication throughout.
#
# What this playbook does (in order):
#   1. Discovers VM IDs from Proxmox by matching inventory hostnames
#   2. Shuts down each VM gracefully (ACPI) and waits for it to stop
#   3. Adds a 4M EFI disk with pre-enrolled secure boot keys on 'linstor'
#   4. Strips '.example.com' from the VM name
#   5. Applies tags: k8s;worker (workers) or k8s;controlplane (control planes)
#   6. Powers each VM back on and waits until it reports running
#
# Inventory groups consumed (from Foreman via AWX):
#   foreman_almalinux10_kubernetescontrolplanenode
#   foreman_almalinux10_kubernetesworkernode
#
# AWX credentials / vault secrets required:
#   vault_proxmox_api_token   the API token secret UUID
#
# Create the token in PVE:
#   Datacenter → Permissions → API Tokens → Add
#   User: root@pam  Token ID: ansible  Privilege Separation: No
#   Copy the displayed secret it is shown only once.
# =============================================================================

- name: Configure Proxmox K8s VMs
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  gather_facts: false
  serial: 1   # one VM at a time — safe for linstor disk allocation

  vars:
    # ------------------------------------------------------------------
    # Proxmox connection — set in AWX extra vars or vault
    # ------------------------------------------------------------------
    proxmox_host: "proxmox.example.com"       # PVE FQDN or IP
    proxmox_user: "root@pam"                  # PVE user the token belongs to
    proxmox_token_id: "ansible"               # token label (user@realm!token_id)
    proxmox_api_token: "{{ vault_proxmox_api_token }}"  # token secret UUID
    proxmox_node: "pve"                       # PVE node name
    proxmox_validate_certs: true

    # Convenience — built once, reused in every uri task
    _auth: "PVEAPIToken={{ proxmox_user }}!{{ proxmox_token_id }}={{ proxmox_api_token }}"
    _base: "https://{{ proxmox_host }}/api2/json/nodes/{{ proxmox_node }}"

    # ------------------------------------------------------------------
    # EFI disk
    # ------------------------------------------------------------------
    efi_storage: "linstor"

    # ------------------------------------------------------------------
    # Tags (Proxmox uses semicolon as separator)
    # ------------------------------------------------------------------
    controlplane_tags: "k8s;controlplane"
    worker_tags: "k8s;worker"

    # ------------------------------------------------------------------
    # Timeouts (seconds)
    # ------------------------------------------------------------------
    shutdown_timeout: 120
    startup_timeout: 120

  tasks:

    # ================================================================== #
    #  STEP 0 — Discover VMID                                            #
    # ================================================================== #
    - name: Get full VM list from Proxmox node
      ansible.builtin.uri:
        url: "{{ _base }}/qemu"
        method: GET
        headers:
          Authorization: "{{ _auth }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        return_content: true
      register: proxmox_vm_list
      delegate_to: localhost

    - name: Resolve short hostname (strip domain suffix)
      ansible.builtin.set_fact:
        short_hostname: "{{ inventory_hostname | regex_replace('\\..*$', '') }}"

    - name: Find VM entry matching this host
      ansible.builtin.set_fact:
        vm_info: >-
          {{
            proxmox_vm_list.json.data
            | selectattr('name', 'defined')
            | selectattr('name', 'search', short_hostname)
            | list
            | first
          }}

    - name: Fail clearly if VM not found
      ansible.builtin.fail:
        msg: >
          Could not find a VM on node '{{ proxmox_node }}' whose name
          contains '{{ short_hostname }}'. Verify proxmox_node and that
          the VM exists.
      when: vm_info is not defined or vm_info | length == 0

    - name: Set VMID and current name as facts
      ansible.builtin.set_fact:
        vmid: "{{ vm_info.vmid }}"
        vm_current_name: "{{ vm_info.name }}"

    - name: Display discovered VM
      ansible.builtin.debug:
        msg: "Matched '{{ inventory_hostname }}' → '{{ vm_current_name }}' (VMID {{ vmid }})"

    # ================================================================== #
    #  STEP 1 — Graceful shutdown                                        #
    #  POST /nodes/{node}/qemu/{vmid}/status/shutdown                    #
    #  forceStop=0 triggers ACPI shutdown; the VM shuts itself down.     #
    # ================================================================== #
    - name: Send ACPI shutdown signal
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/status/shutdown"
        method: POST
        headers:
          Authorization: "{{ _auth }}"
        body_format: form-urlencoded
        body:
          forceStop: 0
          timeout: "{{ shutdown_timeout }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      register: shutdown_task
      delegate_to: localhost

    - name: Wait for VM to reach stopped state
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/status/current"
        method: GET
        headers:
          Authorization: "{{ _auth }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        return_content: true
      register: vm_status
      until: vm_status.json.data.status == 'stopped'
      retries: "{{ (shutdown_timeout / 5) | int }}"
      delay: 5
      delegate_to: localhost

    # ================================================================== #
    #  STEP 2 — Add EFI disk on linstor                                  #
    #  PUT /nodes/{node}/qemu/{vmid}/config                              #
    #  efidisk0 format: <storage>:0,efitype=4m,pre-enrolled-keys=1      #
    # ================================================================== #
    - name: Check if efidisk0 already exists
      ansible.builtin.set_fact:
        efidisk_exists: "{{ 'efidisk0' in vm_info }}"

    - name: Add EFI disk (skip if already present)
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/config"
        method: PUT
        headers:
          Authorization: "{{ _auth }}"
        body_format: form-urlencoded
        body:
          efidisk0: "{{ efi_storage }}:0,efitype=4m,pre-enrolled-keys=1"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost
      when: not efidisk_exists

    - name: Skip EFI disk notice (already present)
      ansible.builtin.debug:
        msg: "efidisk0 already exists on VMID {{ vmid }} — skipping."
      when: efidisk_exists

    # ================================================================== #
    #  STEP 3 — Rename VM: strip .example.com                     #
    #  POST /nodes/{node}/qemu/{vmid}/config — name is a config field   #
    # ================================================================== #
    - name: Compute cleaned VM name
      ansible.builtin.set_fact:
        vm_new_name: "{{ vm_current_name | regex_replace('\\.garaventaville\\.com$', '') }}"

    - name: Rename VM (strip .example.com)
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/config"
        method: PUT
        headers:
          Authorization: "{{ _auth }}"
        body_format: form-urlencoded
        body:
          name: "{{ vm_new_name }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost
      when: vm_new_name != vm_current_name

    - name: Skip rename notice (name already clean)
      ansible.builtin.debug:
        msg: "VM name '{{ vm_current_name }}' has no .example.com suffix — skipping rename."
      when: vm_new_name == vm_current_name

    # ================================================================== #
    #  STEP 4 — Apply tags                                               #
    #  PUT /nodes/{node}/qemu/{vmid}/config                              #
    #  tags field: semicolon-separated string                            #
    # ================================================================== #
    - name: Resolve tags for control plane nodes
      ansible.builtin.set_fact:
        vm_tags: "{{ controlplane_tags }}"
      when: inventory_hostname in groups['foreman_almalinux10_kubernetescontrolplanenode']

    - name: Resolve tags for worker nodes
      ansible.builtin.set_fact:
        vm_tags: "{{ worker_tags }}"
      when: inventory_hostname in groups['foreman_almalinux10_kubernetesworkernode']

    - name: Apply tags to VM
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/config"
        method: PUT
        headers:
          Authorization: "{{ _auth }}"
        body_format: form-urlencoded
        body:
          tags: "{{ vm_tags }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost

    - name: Display applied tags
      ansible.builtin.debug:
        msg: "Applied tags '{{ vm_tags }}' to '{{ vm_new_name }}' (VMID {{ vmid }})"

    # ================================================================== #
    #  STEP 5 — Power on                                                 #
    #  POST /nodes/{node}/qemu/{vmid}/status/start                       #
    # ================================================================== #
    - name: Start VM
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/status/start"
        method: POST
        headers:
          Authorization: "{{ _auth }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost

    - name: Wait for VM to reach running state
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/status/current"
        method: GET
        headers:
          Authorization: "{{ _auth }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        return_content: true
      register: vm_started
      until: vm_started.json.data.status == 'running'
      retries: "{{ (startup_timeout / 5) | int }}"
      delay: 5
      delegate_to: localhost

    # ================================================================== #
    #  Summary                                                           #
    # ================================================================== #
    - name: Summary
      ansible.builtin.debug:
        msg: >
          ✓ VMID {{ vmid }} | Name: {{ vm_new_name }} | Tags: {{ vm_tags }}
          | EFI disk: {{ efi_storage }} (4m, pre-enrolled) | Status: running