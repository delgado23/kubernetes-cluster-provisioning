---
# =============================================================================
# Proxmox K8s VM Configuration Playbook
# =============================================================================
# Prerequisites:
#   ansible-galaxy collection install community.general
#
# What this playbook does (in order):
#   1. Discovers VM IDs from Proxmox by matching inventory hostnames
#   2. Shuts down each VM gracefully (ACPI) and waits for it to stop
#   3. Adds a 4M EFI disk with pre-enrolled secure boot keys on 'linstor'
#   4. Strips '.example.com' from the VM name
#   5. Applies tags: k8s+worker (workers) or k8s+controlplane (control planes)
#   6. Powers each VM back on and waits until the agent reports it running
#
# Inventory groups consumed (from Foreman via AWX):
#   foreman_almalinux10_kubernetescontrolplanenode
#   foreman_almalinux10_kubernetesworkernode
# =============================================================================

- name: Configure Proxmox K8s VMs
  hosts: foreman_almalinux10_kubernetescontrolplanenode:foreman_almalinux10_kubernetesworkernode
  gather_facts: false
  serial: 1   # process one VM at a time to avoid hammering Proxmox API

  vars:
    # ------------------------------------------------------------------
    # Proxmox connection — override these in AWX credentials / extra vars
    # ------------------------------------------------------------------
    proxmox_host: "proxmox.example.com"       # FQDN or IP of your PVE host/cluster
    proxmox_user: "root@pam"
    proxmox_password: "{{ vault_proxmox_password }}"   # store in AWX credential / vault
    proxmox_node: "pve"                        # Proxmox node name where VMs live
    proxmox_validate_certs: true

    # ------------------------------------------------------------------
    # EFI disk settings
    # ------------------------------------------------------------------
    efi_storage: "linstor"
    efi_type: "4m"          # 4M with pre-enrolled secure boot keys

    # ------------------------------------------------------------------
    # Tag assignments (resolved per-host in tasks via group membership)
    # ------------------------------------------------------------------
    controlplane_tags: "k8s;controlplane"
    worker_tags: "k8s;worker"

    # ------------------------------------------------------------------
    # Timeouts
    # ------------------------------------------------------------------
    shutdown_timeout: 120   # seconds to wait for VM to stop
    startup_timeout: 120    # seconds to wait for VM to start

  tasks:

    # ------------------------------------------------------------------ #
    #  STEP 0 — Discover the VM ID from Proxmox matching this inventory   #
    #           hostname (strips domain suffix for the match)             #
    # ------------------------------------------------------------------ #
    - name: Get full VM list from Proxmox node
      community.general.proxmox_vm_info:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        node: "{{ proxmox_node }}"
        type: qemu
      register: proxmox_vms
      delegate_to: localhost

    - name: Resolve short hostname (strip domain suffix if present)
      ansible.builtin.set_fact:
        short_hostname: "{{ inventory_hostname | regex_replace('\\..*$', '') }}"

    - name: Find VM entry matching this host
      ansible.builtin.set_fact:
        vm_info: >-
          {{
            proxmox_vms.proxmox_vms
            | selectattr('name', 'defined')
            | selectattr('name', 'search', short_hostname)
            | list
            | first
          }}

    - name: Fail clearly if VM was not found in Proxmox
      ansible.builtin.fail:
        msg: >
          Could not find a VM on node '{{ proxmox_node }}' whose name
          contains '{{ short_hostname }}'. Check that proxmox_node is correct
          and that the VM exists.
      when: vm_info is not defined or vm_info | length == 0

    - name: Set VM ID and current name as facts
      ansible.builtin.set_fact:
        vmid: "{{ vm_info.vmid }}"
        vm_current_name: "{{ vm_info.name }}"

    - name: Display discovered VM details
      ansible.builtin.debug:
        msg: "Matched inventory host '{{ inventory_hostname }}' → VM '{{ vm_current_name }}' (VMID {{ vmid }})"

    # ------------------------------------------------------------------ #
    #  STEP 1 — Graceful shutdown                                         #
    # ------------------------------------------------------------------ #
    - name: Shut down VM gracefully (ACPI)
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        state: stopped
        force: false        # false = ACPI shutdown, not hard kill
        timeout: "{{ shutdown_timeout }}"
      delegate_to: localhost

    - name: Wait for VM to reach stopped state
      community.general.proxmox_vm_info:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        type: qemu
      register: vm_status
      until: vm_status.proxmox_vms[0].status == 'stopped'
      retries: "{{ (shutdown_timeout / 5) | int }}"
      delay: 5
      delegate_to: localhost

    # ------------------------------------------------------------------ #
    #  STEP 2 — Add EFI disk on linstor storage                          #
    # ------------------------------------------------------------------ #
    - name: Add EFI disk (4M, pre-enrolled secure boot keys) on linstor
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        efidisk0:
          storage: "{{ efi_storage }}"
          efitype: "{{ efi_type }}"
          pre_enrolled_keys: true
        update: true        # update existing VM config, don't recreate
      delegate_to: localhost

    # ------------------------------------------------------------------ #
    #  STEP 3 — Rename VM: remove .example.com                     #
    # ------------------------------------------------------------------ #
    - name: Compute cleaned VM name
      ansible.builtin.set_fact:
        vm_new_name: "{{ vm_current_name | regex_replace('\\.garaventaville\\.com$', '') }}"

    - name: Rename VM (strip .example.com)
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        name: "{{ vm_new_name }}"
        update: true
      delegate_to: localhost
      when: vm_new_name != vm_current_name

    - name: Skip rename notice (name already clean)
      ansible.builtin.debug:
        msg: "VM name '{{ vm_current_name }}' does not contain .example.com — skipping rename."
      when: vm_new_name == vm_current_name

    # ------------------------------------------------------------------ #
    #  STEP 4 — Apply tags based on Foreman inventory group membership    #
    # ------------------------------------------------------------------ #
    - name: Resolve tags for control plane nodes
      ansible.builtin.set_fact:
        vm_tags: "{{ controlplane_tags }}"
      when: inventory_hostname in groups['foreman_almalinux10_kubernetescontrolplanenode']

    - name: Resolve tags for worker nodes
      ansible.builtin.set_fact:
        vm_tags: "{{ worker_tags }}"
      when: inventory_hostname in groups['foreman_almalinux10_kubernetesworkernode']

    - name: Apply tags to VM
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        tags: "{{ vm_tags }}"
        update: true
      delegate_to: localhost

    - name: Display applied tags
      ansible.builtin.debug:
        msg: "Applied tags '{{ vm_tags }}' to VM '{{ vm_new_name }}' (VMID {{ vmid }})"

    # ------------------------------------------------------------------ #
    #  STEP 5 — Power VM back on                                          #
    # ------------------------------------------------------------------ #
    - name: Start VM
      community.general.proxmox_kvm:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        state: started
        timeout: "{{ startup_timeout }}"
      delegate_to: localhost

    - name: Wait for VM to reach running state
      community.general.proxmox_vm_info:
        api_host: "{{ proxmox_host }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vmid }}"
        type: qemu
      register: vm_started
      until: vm_started.proxmox_vms[0].status == 'running'
      retries: "{{ (startup_timeout / 5) | int }}"
      delay: 5
      delegate_to: localhost

    - name: Summary
      ansible.builtin.debug:
        msg: >
          ✓ VMID {{ vmid }} | Name: {{ vm_new_name }} | Tags: {{ vm_tags }}
          | EFI disk added on {{ efi_storage }} | Status: running