---
# =============================================================================
# site_k8s_provision.yml
# =============================================================================
# Full lifecycle: provision Kubernetes nodes in Proxmox via Foreman, then
# configure each VM (EFI disk, rename, tags) once the OS build completes.
#
# Play 1 — runs on localhost
#   1. Validates VM definitions
#   2. Resolves Foreman hostgroup IDs, location IDs, and organization IDs
#   3. Skips hosts that already exist; creates new ones via Foreman → Proxmox
#   4. Sets per-host Foreman parameters
#   5. Powers VMs on so Foreman triggers the PXE/cloud-init build
#   6. Waits for the Foreman build flag to clear (build complete)
#   7. Registers all VMs into an in-memory group via add_host so Play 2
#      can target them regardless of dynamic inventory timing.
#
# Play 2 — runs against the in-memory 'k8s_nodes' group built in Play 1
#   Ansible loads inventory once at startup; hosts created during Play 1
#   do not appear in Foreman dynamic inventory groups until the next run.
#   add_host sidesteps this by injecting hosts into the live inventory.
#   1. Discovers VMID by matching inventory hostname in Proxmox
#   2. Gracefully shuts the VM down (ACPI)
#   3. Adds a 4 M EFI disk with pre-enrolled Secure Boot keys on 'linstor'
#   4. Strips '.example.com' from the Proxmox VM name
#   5. Applies tags: k8s;controlplane or k8s;worker
#   6. Powers the VM back on and waits until it reports running
#
# Requirements
#   vars/vault.yml          — vault_proxmox_api_token (and any other secrets)
#   vars/foreman.yml        — Foreman connection settings
#   vars/vm_defaults.yml    — default VM hardware specs
#   vars/vms.yml            — node definitions (names and hostgroups)
#                             Each entry must include a 'hostgroup' field
#                             matching one of the two AlmaLinux 10 groups:
#                               AlmaLinux 10/Kubernetes Controlplane Node
#                               AlmaLinux 10/Kubernetes Worker Node
#
# Proxmox API token setup (one-time):
#   Datacenter → Permissions → API Tokens → Add
#   User: root@pam  Token ID: ansible  Privilege Separation: No
#   Copy the displayed secret — it is shown only once.
# =============================================================================


# ---------------------------------------------------------------------------
# PLAY 1 — Provision hosts in Foreman / Proxmox
# ---------------------------------------------------------------------------
- name: Provision Kubernetes nodes in Proxmox via Foreman
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/vault.yml
    - vars/foreman.yml      # foreman_url, foreman_user, foreman_password,
                            # foreman_validate_certs, foreman_domain,
                            # foreman_compute_resource_id,
                            # foreman_compute_profile_id
    - vars/vm_defaults.yml  # default VM hardware specs
    - vars/vms.yml          # vms list — each entry: name, hostgroup,
                            # optionally host_parameters[]

  vars:
    # How long to poll for the Foreman build flag to clear.
    # Override on the CLI: -e wait_for_build=true
    wait_for_build: true          # must be true for Play 2 to be safe
    build_wait_retries: 60        # 60 × 30 s = 30 min maximum wait
    build_wait_delay_seconds: 30

  tasks:

    # ------------------------------------------------------------------
    # 1. Validate required variables are present for each VM
    # ------------------------------------------------------------------
    - name: Validate VM definitions
      ansible.builtin.assert:
        that:
          - item.name is defined and item.name | length > 0
          - item.hostgroup is defined and item.hostgroup | length > 0
        fail_msg: >-
          VM entry is missing required fields (name or hostgroup).
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"

    # ------------------------------------------------------------------
    # 2. Fetch Foreman host group IDs
    # ------------------------------------------------------------------
    - name: Look up Foreman hostgroup IDs
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hostgroups?search=title+%3D+%22{{ item | urlencode }}%22&per_page=1"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        return_content: true
        headers:
          Accept: application/json
      register: hostgroup_results
      loop: "{{ vms | map(attribute='hostgroup') | unique | list }}"
      loop_control:
        label: "{{ item }}"

    - name: Build hostgroup name-to-id map
      ansible.builtin.set_fact:
        hostgroup_id_map: >-
          {{
            hostgroup_id_map | default({}) | combine({
              item.item: { 'id': item.json.results[0].id | string }
            })
          }}
      loop: "{{ hostgroup_results.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.json.results | length > 0

    # The index endpoint omits location/org; fetch each group individually.
    - name: Fetch full hostgroup details (location and organization)
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hostgroups/{{ hostgroup_id_map[item].id }}"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        return_content: true
        headers:
          Accept: application/json
      register: hostgroup_details
      loop: "{{ vms | map(attribute='hostgroup') | unique | list }}"
      loop_control:
        label: "{{ item }}"

    - name: Enrich hostgroup map with location_id and organization_id
      ansible.builtin.set_fact:
        hostgroup_id_map: >-
          {{
            hostgroup_id_map | combine({
              item.item: hostgroup_id_map[item.item] | combine({
                'location_id':     item.json.locations[0].id | string,
                'organization_id': item.json.organizations[0].id | string
              })
            })
          }}
      loop: "{{ hostgroup_details.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.json.locations | length > 0 and item.json.organizations | length > 0

    - name: Fail if any hostgroup was not found in Foreman
      ansible.builtin.fail:
        msg: "Hostgroup '{{ item.hostgroup }}' not found in Foreman."
      when: item.hostgroup not in (hostgroup_id_map | default({}))
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"

    # ------------------------------------------------------------------
    # 3. Check whether each host already exists in Foreman
    # ------------------------------------------------------------------
    - name: Check existing Foreman hosts
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.name }}.{{ foreman_domain }}"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        status_code: [200, 404]
        headers:
          Content-Type: application/json
          Accept: application/json
      register: existing_hosts
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"

    # ------------------------------------------------------------------
    # 4. Create hosts in Foreman / Proxmox (skips hosts that exist)
    # ------------------------------------------------------------------
    - name: Create VM in Foreman / Proxmox
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts"
        method: POST
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        body_format: json
        status_code: 201
        headers:
          Content-Type: application/json
          Accept: application/json
        body:
          host:
            name: "{{ item.0.name }}"
            hostgroup_id: "{{ hostgroup_id_map[item.0.hostgroup].id }}"
            location_id: "{{ hostgroup_id_map[item.0.hostgroup].location_id }}"
            organization_id: "{{ hostgroup_id_map[item.0.hostgroup].organization_id }}"
            compute_resource_id: "{{ foreman_compute_resource_id }}"
            compute_profile_id: "{{ foreman_compute_profile_id }}"
            build: true
            managed: true
      loop: "{{ vms | zip(existing_hosts.results) | list }}"
      loop_control:
        label: "{{ item.0.name }}"
      when: item.1.status == 404
      register: created_hosts

    - name: Set host parameters in Foreman
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.0.name }}.{{ foreman_domain }}/parameters"
        method: POST
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        body_format: json
        status_code: [201, 422]   # 422 = parameter already exists
        headers:
          Content-Type: application/json
          Accept: application/json
        body:
          parameter:
            name: "{{ item.1.name }}"
            value: "{{ item.1.value | string }}"
      loop: >-
        {{
          vms
          | selectattr('host_parameters', 'defined')
          | subelements('host_parameters')
        }}
      loop_control:
        label: "{{ item.0.name }} — {{ item.1.name }}"

    # ------------------------------------------------------------------
    # 5. Report pre-power-on status
    # ------------------------------------------------------------------
    - name: Report skipped VMs (already existed in Foreman)
      ansible.builtin.debug:
        msg: "SKIPPED — host already exists in Foreman: {{ item.0.name }}"
      loop: "{{ vms | zip(existing_hosts.results) | list }}"
      loop_control:
        label: "{{ item.0.name }}"
      when: item.1.status == 200

    - name: Report created VMs
      ansible.builtin.debug:
        msg: >-
          CREATED — {{ item.item.0.name }}
          (Group: {{ item.item.0.hostgroup }})
          Foreman ID: {{ item.json.id | default('unknown') }}
      loop: "{{ created_hosts.results }}"
      loop_control:
        label: "{{ item.item.0.name }}"
      when:
        - created_hosts is defined
        - item.skipped is not defined or not item.skipped

    # ------------------------------------------------------------------
    # 6. Power on VMs so Foreman triggers the PXE/cloud-init build
    # ------------------------------------------------------------------
    - name: Power on VMs
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.name }}.{{ foreman_domain }}/power"
        method: PUT
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        body_format: json
        status_code: [200, 201]
        headers:
          Content-Type: application/json
          Accept: application/json
        body:
          power_action: "start"
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      register: power_results

    - name: Report power-on results
      ansible.builtin.debug:
        msg: "POWERED ON — {{ item.item.name }}: {{ item.json.power | default('started') }}"
      loop: "{{ power_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.skipped is not defined or not item.skipped

    # ------------------------------------------------------------------
    # 7. Register hosts into in-memory inventory for Play 2
    #    Done unconditionally so re-runs (where created_hosts is not
    #    defined) still populate the group and Play 2 runs correctly.
    #    The hostgroup name is stored as a host var so Play 2 can
    #    derive the correct Proxmox tag without the Foreman inventory
    #    group names being present.
    # ------------------------------------------------------------------
    - name: Add VMs to in-memory k8s_nodes group
      ansible.builtin.add_host:
        name: "{{ item.name }}.{{ foreman_domain }}"
        groups: k8s_nodes
        foreman_hostgroup: "{{ item.hostgroup }}"
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false   # add_host always reports changed; suppress noise

    # ------------------------------------------------------------------
    # 8. Wait for Foreman build flag to clear before Play 2 begins.
    #    Skipped when wait_for_build is false (e.g. re-runs, debugging).
    #    Play 2 MUST NOT run until this step succeeds for new builds.
    # ------------------------------------------------------------------
    - name: Wait for hosts to finish building (build flag clears)
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.name }}.{{ foreman_domain }}"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        headers:
          Accept: application/json
        return_content: true
      register: build_status
      until: build_status.json.build == false
      retries: "{{ build_wait_retries }}"
      delay: "{{ build_wait_delay_seconds }}"
      loop: "{{ vms }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - wait_for_build | default(true)
        - created_hosts is defined


# ---------------------------------------------------------------------------
# PLAY 2 — Configure Proxmox VMs after OS build completes
# ---------------------------------------------------------------------------
- name: Configure Proxmox K8s VMs
  hosts: k8s_nodes    # populated by add_host in Play 1
  gather_facts: false
  serial: 1     # one VM at a time — safe for linstor disk allocation

  vars_files:
    - vars/vault.yml    # vault_proxmox_api_token

  vars:
    # ------------------------------------------------------------------
    # Proxmox connection
    # ------------------------------------------------------------------
    proxmox_host: "pve-01.example.com:8006"
    proxmox_user: "user@Authentik"
    proxmox_token_id: "foreman"
    proxmox_api_token: "{{ vault_proxmox_api_token }}"
    proxmox_node: "pve-01"
    proxmox_validate_certs: true

    # Convenience — built once, reused in every uri task
    _auth: "PVEAPIToken={{ proxmox_user }}!{{ proxmox_token_id }}={{ proxmox_api_token }}"
    _base: "https://{{ proxmox_host }}/api2/json/nodes/{{ proxmox_node }}"

    # ------------------------------------------------------------------
    # EFI disk
    # ------------------------------------------------------------------
    efi_storage: "linstor"

    # ------------------------------------------------------------------
    # Tags (Proxmox uses semicolon as separator)
    # ------------------------------------------------------------------
    controlplane_tags: "k8s;controlplane"
    worker_tags: "k8s;worker"

    # ------------------------------------------------------------------
    # Timeouts (seconds)
    # ------------------------------------------------------------------
    shutdown_timeout: 120
    startup_timeout: 120

  tasks:

    # ================================================================== #
    #  STEP 0 — Discover VMID                                            #
    # ================================================================== #
    - name: Get full VM list from Proxmox node
      ansible.builtin.uri:
        url: "{{ _base }}/qemu"
        method: GET
        headers:
          Authorization: "{{ _auth }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        return_content: true
      register: proxmox_vm_list
      delegate_to: localhost

    - name: Resolve short hostname (strip domain suffix)
      ansible.builtin.set_fact:
        short_hostname: "{{ inventory_hostname | regex_replace('\\..*$', '') }}"

    - name: Find VM entry matching this host
      ansible.builtin.set_fact:
        vm_info: >-
          {{
            proxmox_vm_list.json.data
            | selectattr('name', 'defined')
            | selectattr('name', 'search', short_hostname)
            | list
            | first
          }}

    - name: Fail clearly if VM not found in Proxmox
      ansible.builtin.fail:
        msg: >
          Could not find a VM on node '{{ proxmox_node }}' whose name
          contains '{{ short_hostname }}'. Verify proxmox_node and that
          the VM exists.
      when: vm_info is not defined or vm_info | length == 0

    - name: Set VMID and current name as facts
      ansible.builtin.set_fact:
        vmid: "{{ vm_info.vmid }}"
        vm_current_name: "{{ vm_info.name }}"

    - name: Display discovered VM
      ansible.builtin.debug:
        msg: "Matched '{{ inventory_hostname }}' → '{{ vm_current_name }}' (VMID {{ vmid }})"

    # ================================================================== #
    #  STEP 1 — Graceful shutdown                                        #
    # ================================================================== #
    - name: Send ACPI shutdown signal
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/status/shutdown"
        method: POST
        headers:
          Authorization: "{{ _auth }}"
        body_format: form-urlencoded
        body:
          forceStop: 0
          timeout: "{{ shutdown_timeout }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost

    - name: Wait for VM to reach stopped state
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/status/current"
        method: GET
        headers:
          Authorization: "{{ _auth }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        return_content: true
      register: vm_status
      until: vm_status.json.data.status == 'stopped'
      retries: "{{ (shutdown_timeout / 5) | int }}"
      delay: 5
      delegate_to: localhost

    # ================================================================== #
    #  STEP 2 — Add EFI disk on linstor                                  #
    # ================================================================== #
    - name: Check if efidisk0 already exists
      ansible.builtin.set_fact:
        efidisk_exists: "{{ 'efidisk0' in vm_info }}"

    - name: Add EFI disk (skip if already present)
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/config"
        method: PUT
        headers:
          Authorization: "{{ _auth }}"
        body_format: form-urlencoded
        body:
          efidisk0: "{{ efi_storage }}:0,efitype=4m,pre-enrolled-keys=1"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost
      when: not efidisk_exists

    - name: Skip EFI disk notice (already present)
      ansible.builtin.debug:
        msg: "efidisk0 already exists on VMID {{ vmid }} — skipping."
      when: efidisk_exists

    # ================================================================== #
    #  STEP 3 — Rename VM: strip .example.com                     #
    # ================================================================== #
    - name: Compute cleaned VM name
      ansible.builtin.set_fact:
        vm_new_name: "{{ vm_current_name | regex_replace('\\.garaventaville\\.com$', '') }}"

    - name: Rename VM (strip .example.com suffix)
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/config"
        method: PUT
        headers:
          Authorization: "{{ _auth }}"
        body_format: form-urlencoded
        body:
          name: "{{ vm_new_name }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost
      when: vm_new_name != vm_current_name

    - name: Skip rename notice (name already clean)
      ansible.builtin.debug:
        msg: "VM name '{{ vm_current_name }}' has no .example.com suffix — skipping."
      when: vm_new_name == vm_current_name

    # ================================================================== #
    #  STEP 4 — Apply tags                                               #
    #  foreman_hostgroup is set per-host by add_host in Play 1.         #
    #  Matching on the hostgroup title avoids depending on Foreman       #
    #  dynamic inventory group names being present at runtime.           #
    # ================================================================== #
    - name: Resolve tags for control plane nodes
      ansible.builtin.set_fact:
        vm_tags: "{{ controlplane_tags }}"
      when: "'Controlplane' in foreman_hostgroup"

    - name: Resolve tags for worker nodes
      ansible.builtin.set_fact:
        vm_tags: "{{ worker_tags }}"
      when: "'Worker' in foreman_hostgroup"

    - name: Fail if vm_tags could not be resolved
      ansible.builtin.fail:
        msg: >-
          Could not determine Proxmox tags for '{{ inventory_hostname }}'.
          foreman_hostgroup='{{ foreman_hostgroup }}' did not match
          'Controlplane' or 'Worker'. Check vms.yml hostgroup values.
      when: vm_tags is not defined

    - name: Apply tags to VM
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/config"
        method: PUT
        headers:
          Authorization: "{{ _auth }}"
        body_format: form-urlencoded
        body:
          tags: "{{ vm_tags }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost

    - name: Display applied tags
      ansible.builtin.debug:
        msg: "Applied tags '{{ vm_tags }}' to '{{ vm_new_name }}' (VMID {{ vmid }})"

    # ================================================================== #
    #  STEP 5 — Power on                                                 #
    # ================================================================== #
    - name: Start VM
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/status/start"
        method: POST
        headers:
          Authorization: "{{ _auth }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        status_code: [200]
      delegate_to: localhost

    - name: Wait for VM to reach running state
      ansible.builtin.uri:
        url: "{{ _base }}/qemu/{{ vmid }}/status/current"
        method: GET
        headers:
          Authorization: "{{ _auth }}"
        validate_certs: "{{ proxmox_validate_certs }}"
        return_content: true
      register: vm_started
      until: vm_started.json.data.status == 'running'
      retries: "{{ (startup_timeout / 5) | int }}"
      delay: 5
      delegate_to: localhost

    # ================================================================== #
    #  Summary                                                           #
    # ================================================================== #
    - name: Summary
      ansible.builtin.debug:
        msg: >
          ✓ VMID {{ vmid }} | Name: {{ vm_new_name }} | Tags: {{ vm_tags }}
          | EFI disk: {{ efi_storage }} (4m, pre-enrolled) | Status: running