frontend kubernetes-frontend
    bind *:7443
    mode tcp
    option tcplog
    timeout client  1m
    default_backend kubernetes-backend

backend kubernetes-backend
    mode tcp
    option tcp-check
    balance roundrobin
    timeout connect 10s
    timeout server  1m
    server arthas      172.16.0.30:6443 check fall 3 rise 2
    server kel-thuzad  172.16.0.31:6443 check fall 3 rise 2
    server sapphiron   172.16.0.32:6443 check fall 3 rise 2