---
- name: Authenticate to FreeIPA API
  ansible.builtin.uri:
    url: "https://{{ vault_ipa_server }}/ipa/session/login_password"
    method: POST
    body_format: form-urlencoded
    body:
      user: admin
      password: "{{ vault_ipaadmin_password }}"
    validate_certs: true
    status_code: 200
  register: _ipa_login
  no_log: true

- name: Remove k8s-api A record from FreeIPA
  ansible.builtin.uri:
    url: "https://{{ vault_ipa_server }}/ipa/session/json"
    method: POST
    headers:
      Cookie: "ipa_session={{ _ipa_login.cookies.ipa_session }}"
      Referer: "https://{{ vault_ipa_server }}/ipa"
    body_format: json
    body:
      id: 0
      method: dnsrecord_del
      params:
        - - "{{ vault_ipadomain }}"
          - "{{ k8s_api_endpoint | regex_replace('\\.' + vault_ipadomain + '$', '') }}"
        - del_all: true
    validate_certs: true
    status_code: 200
  register: _del_k8s_api
  failed_when: _del_k8s_api.json.error is not none and _del_k8s_api.json.error.code | default(0) != 4001

- name: Remove *.k8s wildcard A record from FreeIPA
  ansible.builtin.uri:
    url: "https://{{ vault_ipa_server }}/ipa/session/json"
    method: POST
    headers:
      Cookie: "ipa_session={{ _ipa_login.cookies.ipa_session }}"
      Referer: "https://{{ vault_ipa_server }}/ipa"
    body_format: json
    body:
      id: 0
      method: dnsrecord_del
      params:
        - - "{{ vault_ipadomain }}"
          - "*.k8s"
        - del_all: true
    validate_certs: true
    status_code: 200
  register: _del_wildcard
  failed_when: _del_wildcard.json.error is not none and _del_wildcard.json.error.code | default(0) != 4001

- name: Remove host from Foreman
  theforeman.foreman.host:
    username: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    server_url: "{{ foreman_url }}"
    validate_certs: "{{ foreman_validate_certs }}"
    name: "{{ item.name }}.{{ foreman_domain }}"
    state: absent
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"

- name: Remove host from FreeIPA
  community.general.ipa_host:
    ipa_user: admin
    ipa_pass: "{{ vault_ipaadmin_password }}"
    ipa_host: "{{ vault_ipa_server }}"
    name: "{{ item.name }}.{{ foreman_domain }}"
    state: absent
    update_dns: true
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"
