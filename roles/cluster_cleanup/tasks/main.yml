---
- name: Authenticate to FreeIPA API
  ansible.builtin.uri:
    url: "https://{{ vault_ipa_server }}/ipa/session/login_password"
    method: POST
    headers:
      Referer: "https://{{ vault_ipa_server }}/ipa"
    body_format: form-urlencoded
    body:
      user: admin
      password: "{{ vault_ipaadmin_password }}"
    validate_certs: true
    status_code: 200
  register: _ipa_login
  no_log: true

- name: Find k8s-api A record in FreeIPA by IP
  ansible.builtin.uri:
    url: "https://{{ vault_ipa_server }}/ipa/session/json"
    method: POST
    headers:
      Cookie: "ipa_session={{ _ipa_login.cookies.ipa_session }}"
      Referer: "https://{{ vault_ipa_server }}/ipa"
    body_format: json
    body:
      id: 0
      method: dnsrecord_find
      params:
        - - "{{ vault_ipadomain }}"
        - arecord: "{{ k8s_api_endpoint_ip }}"
    validate_certs: true
    status_code: 200
  register: _k8s_api_find
  failed_when: false

- name: Remove k8s-api A record from FreeIPA
  ansible.builtin.uri:
    url: "https://{{ vault_ipa_server }}/ipa/session/json"
    method: POST
    headers:
      Cookie: "ipa_session={{ _ipa_login.cookies.ipa_session }}"
      Referer: "https://{{ vault_ipa_server }}/ipa"
    body_format: json
    body:
      id: 0
      method: dnsrecord_del
      params:
        - - "{{ vault_ipadomain }}"
          - "{{ item.idnsname[0]['__dns_name__'] }}"
        - arecord:
            - "{{ k8s_api_endpoint_ip }}"
    validate_certs: true
    status_code: 200
  loop: "{{ _k8s_api_find.json.result.result | default([]) }}"
  when:
    - _k8s_api_find.json.error is none
    - (_k8s_api_find.json.result.count | default(0)) > 0
  failed_when: false

- name: Look up k8s-api PTR record in FreeIPA
  ansible.builtin.uri:
    url: "https://{{ vault_ipa_server }}/ipa/session/json"
    method: POST
    headers:
      Cookie: "ipa_session={{ _ipa_login.cookies.ipa_session }}"
      Referer: "https://{{ vault_ipa_server }}/ipa"
    body_format: json
    body:
      id: 0
      method: dnsrecord_show
      params:
        - - "{{ k8s_api_endpoint_ip.split('.')[2] }}.{{ k8s_api_endpoint_ip.split('.')[1] }}.{{ k8s_api_endpoint_ip.split('.')[0] }}.in-addr.arpa"
          - "{{ k8s_api_endpoint_ip.split('.')[3] }}"
        - {}
    validate_certs: true
    status_code: 200
  register: _k8s_api_ptr
  failed_when: false

- name: Remove k8s-api PTR record from FreeIPA
  community.general.ipa_dnsrecord:
    ipa_user: admin
    ipa_pass: "{{ vault_ipaadmin_password }}"
    ipa_host: "{{ vault_ipa_server }}"
    zone_name: "{{ k8s_api_endpoint_ip.split('.')[2] }}.{{ k8s_api_endpoint_ip.split('.')[1] }}.{{ k8s_api_endpoint_ip.split('.')[0] }}.in-addr.arpa"
    record_name: "{{ k8s_api_endpoint_ip.split('.')[3] }}"
    record_type: PTR
    record_value: "{{ _k8s_api_ptr.json.result.result.ptrrecord[0] }}"
    state: absent
  when:
    - _k8s_api_ptr.json.error is none
    - (_k8s_api_ptr.json.result.result.ptrrecord | default([])) | length > 0

- name: Look up current *.k8s A record in FreeIPA
  ansible.builtin.uri:
    url: "https://{{ vault_ipa_server }}/ipa/session/json"
    method: POST
    headers:
      Cookie: "ipa_session={{ _ipa_login.cookies.ipa_session }}"
      Referer: "https://{{ vault_ipa_server }}/ipa"
    body_format: json
    body:
      id: 0
      method: dnsrecord_show
      params:
        - - "{{ vault_ipadomain }}"
          - "*.k8s"
        - {}
    validate_certs: true
    status_code: 200
  register: _wildcard_record
  failed_when: false

- name: Remove *.k8s wildcard A record from FreeIPA
  community.general.ipa_dnsrecord:
    ipa_user: admin
    ipa_pass: "{{ vault_ipaadmin_password }}"
    ipa_host: "{{ vault_ipa_server }}"
    zone_name: "{{ vault_ipadomain }}"
    record_name: "*.k8s"
    record_type: A
    record_value: "{{ _wildcard_record.json.result.result.arecord[0] }}"
    state: absent
  when:
    - _wildcard_record.json.error is none
    - (_wildcard_record.json.result.result.arecord | default([])) | length > 0

- name: Remove host from Foreman
  theforeman.foreman.host:
    username: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    server_url: "{{ foreman_url }}"
    validate_certs: "{{ foreman_validate_certs }}"
    name: "{{ item.name }}.{{ foreman_domain }}"
    state: absent
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"

- name: Remove host from FreeIPA
  community.general.ipa_host:
    ipa_user: admin
    ipa_pass: "{{ vault_ipaadmin_password }}"
    ipa_host: "{{ vault_ipa_server }}"
    name: "{{ item.name }}.{{ foreman_domain }}"
    state: absent
    update_dns: true
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"
