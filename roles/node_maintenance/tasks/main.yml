---
- name: Confirm kubectl is available
  ansible.builtin.command: "{{ kubectl_bin }} version --client --output=json"
  register: kubectl_check
  changed_when: false
  failed_when: kubectl_check.rc != 0

- name: Verify node is registered in the cluster
  ansible.builtin.command: >
    {{ kubectl_bin }} --kubeconfig={{ kubeconfig }}
    get node {{ inventory_hostname }}
    --output=jsonpath='{.metadata.name}'
  register: node_check
  changed_when: false
  failed_when: node_check.stdout != inventory_hostname
  when: not delegate_kubectl | default(false)

- name: Cordon node (mark unschedulable)
  ansible.builtin.command: >
    {{ kubectl_bin }} --kubeconfig={{ kubeconfig }}
    cordon {{ inventory_hostname }}
  delegate_to: "{{ control_plane_host | default(omit) }}"
  register: cordon_result
  changed_when: "'cordoned' in cordon_result.stdout"

- name: Verify node is cordoned
  ansible.builtin.command: >
    {{ kubectl_bin }} --kubeconfig={{ kubeconfig }}
    get node {{ inventory_hostname }}
    --output=jsonpath='{.spec.unschedulable}'
  delegate_to: "{{ control_plane_host | default(omit) }}"
  register: cordon_check
  changed_when: false
  failed_when: cordon_check.stdout != "true"

- name: Drain node (evict pods)
  ansible.builtin.command: >
    {{ kubectl_bin }} --kubeconfig={{ kubeconfig }}
    drain {{ inventory_hostname }}
    --ignore-daemonsets
    --delete-emptydir-data
    --grace-period={{ drain_grace_period }}
    --timeout={{ drain_timeout }}s
    --force
  delegate_to: "{{ control_plane_host | default(omit) }}"
  register: drain_result
  changed_when: true

- name: Show drain output
  ansible.builtin.debug:
    var: drain_result.stdout_lines

# OS update. Package-mode hosts patch in place with dnf. Image-mode (bootc)
# hosts have an immutable /usr — dnf fails (pkg_mgr=atomic_container) and in-place
# changes wouldn't survive a reboot anyway. Instead `bootc upgrade` pulls the
# newest build of the image the node already tracks (rebuilt with patches by the
# foreman-bootc pipeline) and stages it for the next boot; the reboot below boots
# into it.
- name: Update all packages (dnf upgrade)
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  register: dnf_result
  when: not (image_mode | default(false))

- name: Show updated packages
  ansible.builtin.debug:
    msg: "{{ dnf_result.results | default(['No package output available']) }}"
  when: not (image_mode | default(false))

- name: Stage OS update (bootc upgrade)
  ansible.builtin.command: bootc upgrade
  register: bootc_result
  # bootc prints "No changes" when the tracked image already matches; anything
  # else means a new deployment was staged and a reboot is required.
  changed_when: "'No changes' not in bootc_result.stdout"
  when: image_mode | default(false)

- name: Show bootc upgrade output
  ansible.builtin.debug:
    var: bootc_result.stdout_lines
  when: image_mode | default(false)

# Whether the node will reboot this run. Package-mode always reboots (kernel and
# other in-place patches require it). Image-mode reboots only when bootc actually
# staged a new image — rebooting into the identical deployment is pointless churn.
- name: Determine whether a reboot is needed
  ansible.builtin.set_fact:
    reboot_required: "{{ (not (image_mode | default(false))) or (bootc_result.changed | default(false)) }}"

- name: Reboot node
  ansible.builtin.reboot:
    reboot_timeout: "{{ reboot_timeout }}"
    msg: "Rebooting for OS maintenance"
    pre_reboot_delay: 5
    post_reboot_delay: 30
  when: reboot_required

- name: Wait for kubelet service to be active
  ansible.builtin.systemd:
    name: kubelet
  register: kubelet_status
  until: kubelet_status.status.ActiveState == "active"
  retries: 20
  delay: 15

- name: Wait for node to become Ready in the cluster
  ansible.builtin.command: >
    {{ kubectl_bin }} --kubeconfig={{ kubeconfig }}
    get node {{ inventory_hostname }}
    --output=jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  delegate_to: "{{ control_plane_host | default(omit) }}"
  register: node_ready
  until: node_ready.stdout == "True"
  retries: 30
  delay: 15
  changed_when: false

- name: Uncordon node (mark schedulable)
  ansible.builtin.command: >
    {{ kubectl_bin }} --kubeconfig={{ kubeconfig }}
    uncordon {{ inventory_hostname }}
  delegate_to: "{{ control_plane_host | default(omit) }}"
  register: uncordon_result
  changed_when: "'uncordoned' in uncordon_result.stdout"

- name: Verify node is uncordoned and Ready
  ansible.builtin.command: >
    {{ kubectl_bin }} --kubeconfig={{ kubeconfig }}
    get node {{ inventory_hostname }}
    --output=jsonpath='{.spec.unschedulable}'
  delegate_to: "{{ control_plane_host | default(omit) }}"
  register: uncordon_check
  changed_when: false
  failed_when: uncordon_check.stdout == "true"

- name: Node maintenance summary
  ansible.builtin.debug:
    msg:
      - "============================================================"
      - "Node         : {{ inventory_hostname }}"
      - "Role         : {{ node_role | default('unknown') }}"
      - "Update mode  : {{ 'bootc upgrade' if image_mode | default(false) else 'dnf upgrade' }}"
      - "OS updated   : {{ bootc_result.changed | default(dnf_result.changed) }}"
      - "Rebooted     : {{ reboot_required }}"
      - "Status       : Ready / Schedulable"
      - "============================================================"
