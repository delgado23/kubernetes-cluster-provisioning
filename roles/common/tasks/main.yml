---
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap permanently in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '#\1'

- name: Configure kernel modules to load at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: '0644'

- name: Load overlay kernel module
  community.general.modprobe:
    name: overlay
    state: present

- name: Load br_netfilter kernel module
  community.general.modprobe:
    name: br_netfilter
    state: present

- name: Configure sysctl parameters for Kubernetes
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    owner: root
    group: root
    mode: '0644'

- name: Apply sysctl parameters
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Install containerd
  ansible.builtin.dnf:
    name: containerd
    state: present

- name: Ensure /etc/containerd directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy containerd config.toml
  ansible.builtin.copy:
    src: containerd/config.toml
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: '0644'
  notify: Restart containerd

- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started

- name: Install Kubernetes components
  ansible.builtin.dnf:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: kubernetes

- name: Enable and start kubelet
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started

- name: Set kubelet service file permissions (CIS 4.1.1)
  ansible.builtin.file:
    path: /lib/systemd/system/kubelet.service
    mode: "0600"

# kube-proxy uses iptables for service routing (DNAT in PREROUTING). On AlmaLinux 10,
# firewalld defaults to nftables which runs in parallel and can drop forwarded/DNAT'd
# traffic before kube-proxy rules fire. Setting iptables backend makes both use the same
# ruleset so kube-proxy DNAT and firewalld rules are evaluated together.
- name: Configure firewalld to use iptables backend
  ansible.builtin.lineinfile:
    path: /etc/firewalld/firewalld.conf
    regexp: '^FirewallBackend='
    line: 'FirewallBackend=iptables'
  register: firewalld_backend_result

- name: Restart firewalld to apply iptables backend
  ansible.builtin.systemd:
    name: firewalld
    state: restarted
  when: firewalld_backend_result.changed


- name: Open Flannel VXLAN port
  ansible.posix.firewalld:
    port: 8472/udp
    permanent: true
    state: enabled
    immediate: true

- name: Open MetalLB memberlist port (7946/tcp)
  ansible.posix.firewalld:
    port: 7946/tcp
    permanent: true
    state: enabled
    immediate: true

- name: Open MetalLB memberlist port (7946/udp)
  ansible.posix.firewalld:
    port: 7946/udp
    permanent: true
    state: enabled
    immediate: true

- name: Trust pod network CIDR
  ansible.posix.firewalld:
    zone: trusted
    source: "{{ k8s_pod_cidr }}"
    permanent: true
    state: enabled
    immediate: true

- name: Trust service network CIDR
  ansible.posix.firewalld:
    zone: trusted
    source: "{{ k8s_service_cidr }}"
    permanent: true
    state: enabled
    immediate: true

- name: Enable masquerade
  ansible.posix.firewalld:
    masquerade: true
    permanent: true
    state: enabled
    immediate: true
