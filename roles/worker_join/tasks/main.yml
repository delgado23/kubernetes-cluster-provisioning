---
- name: Generate bootstrap token from primary control plane
  ansible.builtin.shell: |
    TMPKUBE=$(mktemp)
    sed "s|https://[^:]*:6443|https://127.0.0.1:6443|" /etc/kubernetes/admin.conf > "$TMPKUBE"
    kubeadm token create --kubeconfig "$TMPKUBE"
    rm -f "$TMPKUBE"
  delegate_to: >-
    {{
      groups['foreman_almalinux10_kubernetescontrolplanenode']
      | map('extract', hostvars)
      | selectattr('foreman_params.k8s_role', 'equalto', 'primary')
      | selectattr('foreman_params.cluster_env', 'equalto', foreman_params.cluster_env)
      | map(attribute='inventory_hostname')
      | first
    }}
  register: kubeadm_join_token
  changed_when: true
  no_log: false

- name: Fetch discovery kubeconfig from primary control plane
  ansible.builtin.fetch:
    src: /etc/kubernetes/kubeadm-discovery.yaml
    dest: /tmp/kubeadm-discovery-{{ cluster_env }}.yaml
    flat: true
  delegate_to: >-
    {{
      groups['foreman_almalinux10_kubernetescontrolplanenode']
      | map('extract', hostvars)
      | selectattr('foreman_params.k8s_role', 'equalto', 'primary')
      | selectattr('foreman_params.cluster_env', 'equalto', foreman_params.cluster_env)
      | map(attribute='inventory_hostname')
      | first
    }}

- name: Copy discovery kubeconfig to worker
  ansible.builtin.copy:
    src: /tmp/kubeadm-discovery-{{ cluster_env }}.yaml
    dest: /etc/kubernetes/kubeadm-discovery.yaml
    owner: root
    group: root
    mode: '0600'

- name: Build worker join command (file-based discovery bypasses anonymous-auth restriction)
  ansible.builtin.set_fact:
    kubeadm_join_command: >-
      kubeadm join
      --discovery-file /etc/kubernetes/kubeadm-discovery.yaml
      --token {{ kubeadm_join_token.stdout | trim }}
  no_log: false

- name: Verify kubelet service exists
  ansible.builtin.service_facts:

- name: Fail if kubelet is not installed
  ansible.builtin.fail:
    msg: "kubelet service not found on {{ inventory_hostname }}. Install kubeadm/kubelet first."
  when: "'kubelet.service' not in ansible_facts.services"

- name: Check if node is already part of a cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Skip join if node is already configured
  ansible.builtin.debug:
    msg: "Node {{ inventory_hostname }} already has kubelet.conf — skipping join."
  when: kubelet_conf.stat.exists

- name: Reset any previous kubeadm state (idempotent safety)
  ansible.builtin.command: kubeadm reset --force
  when: not kubelet_conf.stat.exists
  changed_when: true

- name: Ensure required kernel modules are loaded
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

- name: Apply required sysctl parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward",                 value: "1" }

- name: Disable swap (required by kubelet)
  ansible.builtin.command: swapoff -a
  changed_when: true
  when: ansible_facts['swaptotal_mb'] > 0

- name: Remove swap entries from /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Enable and start kubelet
  ansible.builtin.service:
    name: kubelet
    enabled: true
    state: started

- name: Wait for kube-apiserver to be reachable before joining
  ansible.builtin.wait_for:
    host: "{{ k8s_api_endpoint_ip }}"
    port: 6443
    timeout: 120
    delay: 5
  when: not kubelet_conf.stat.exists

- name: Join node to the cluster
  ansible.builtin.command: "{{ kubeadm_join_command }}"
  when: not kubelet_conf.stat.exists
  register: join_result
  changed_when: join_result.rc == 0
  no_log: false

- name: Show join output
  ansible.builtin.debug:
    var: join_result.stdout_lines
  when:
    - join_result is defined
    - not kubelet_conf.stat.exists

- name: Wait for kubelet to become active after join
  ansible.builtin.command: systemctl is-active kubelet
  register: _kubelet_active
  until: _kubelet_active.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  when: not kubelet_conf.stat.exists

- name: Remove discovery kubeconfig after successful join (held cluster-admin creds)
  ansible.builtin.file:
    path: /etc/kubernetes/kubeadm-discovery.yaml
    state: absent
  when: not kubelet_conf.stat.exists

- name: Set kubelet config file permissions (CIS 4.1.9)
  ansible.builtin.file:
    path: /var/lib/kubelet/config.yaml
    mode: "0600"
