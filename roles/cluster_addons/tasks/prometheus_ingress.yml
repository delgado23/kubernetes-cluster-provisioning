---
- name: Write Prometheus IngressRoute manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/prometheus/ingress.yml"
    mode: "0600"
    content: |
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: prometheus
        namespace: {{ prometheus_namespace }}
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`prometheus.{{ ingress_domain }}`)
            kind: Rule
            middlewares:
              - name: authentik-forward-auth
                namespace: {{ traefik_namespace }}
            services:
              - name: kube-prometheus-stack-prometheus
                port: 9090
        tls:
          secretName: {{ wildcard_secret_name }}
      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: alertmanager
        namespace: {{ prometheus_namespace }}
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`alertmanager.{{ ingress_domain }}`)
            kind: Rule
            middlewares:
              - name: authentik-forward-auth
                namespace: {{ traefik_namespace }}
            services:
              - name: kube-prometheus-stack-alertmanager
                port: 9093
        tls:
          secretName: {{ wildcard_secret_name }}

- name: Apply Prometheus IngressRoutes
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/prometheus/ingress.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: prometheus_ingress_output
  changed_when: true

- name: Print Prometheus IngressRoute apply output
  ansible.builtin.debug:
    var: prometheus_ingress_output.stdout_lines
