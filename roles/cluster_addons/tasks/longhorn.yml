---
- name: Add Longhorn Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add longhorn https://charts.longhorn.io
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create Longhorn manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/longhorn"
    state: directory
    mode: '0700'

- name: Write Longhorn Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/longhorn/values.yml"
    mode: "0600"
    content: |
      defaultSettings:
        defaultDataPath: /var/lib/longhorn

      longhornManager:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

      longhornDriver:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

      longhornUI:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

- name: Install or upgrade Longhorn via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install longhorn longhorn/longhorn
      --namespace {{ longhorn_namespace }}
      --create-namespace
      --version {{ longhorn_version }}
      --values {{ k8s_manifests_dir }}/longhorn/values.yml
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /root/.kube/config
  register: longhorn_helm_output
  changed_when: true

- name: Print Longhorn Helm output
  ansible.builtin.debug:
    var: longhorn_helm_output.stdout_lines

- name: Wait for Longhorn manager DaemonSet to be ready
  ansible.builtin.command:
    cmd: >
      kubectl rollout status daemonset/longhorn-manager
      --namespace {{ longhorn_namespace }}
      --timeout=300s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
