---
- name: Add Longhorn Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add longhorn https://charts.longhorn.io
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create Longhorn manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/longhorn"
    state: directory
    mode: '0700'

- name: Write Longhorn Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/longhorn/values.yml"
    mode: "0600"
    content: |
      defaultSettings:
        defaultDataPath: /var/lib/longhorn

      longhornManager:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

      longhornDriver:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

      longhornUI:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

- name: Install or upgrade Longhorn via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install longhorn longhorn/longhorn
      --namespace {{ longhorn_namespace }}
      --create-namespace
      --version {{ longhorn_version }}
      --values {{ k8s_manifests_dir }}/longhorn/values.yml
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /root/.kube/config
  register: longhorn_helm_output
  until: longhorn_helm_output.rc == 0
  retries: 3
  delay: 30
  changed_when: true

- name: Print Longhorn Helm output
  ansible.builtin.debug:
    var: longhorn_helm_output.stdout_lines

- name: Wait for Longhorn manager DaemonSet to be ready
  ansible.builtin.command:
    cmd: >
      kubectl rollout status daemonset/longhorn-manager
      --namespace {{ longhorn_namespace }}
      --timeout=300s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Write Longhorn NetworkPolicy manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/longhorn/networkpolicy.yml"
    mode: "0600"
    content: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-deny-ingress
        namespace: {{ longhorn_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
      ---
      # Allow all intra-namespace traffic. Longhorn has many inter-component
      # communication paths (manager↔manager, manager↔instance-manager,
      # CSI sidecars↔manager, ui→manager) all within the same namespace.
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-intra-namespace
        namespace: {{ longhorn_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
        ingress:
          - from:
              - podSelector: {}
      ---
      # kube-apiserver calls the Longhorn admission webhook on port 9502
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-apiserver-webhook
        namespace: {{ longhorn_namespace }}
      spec:
        podSelector:
          matchLabels:
            longhorn.io/admission-webhook: longhorn-admission-webhook
        policyTypes:
          - Ingress
        ingress:
          - ports:
              - port: 9502
                protocol: TCP
      ---
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-traefik-ingress
        namespace: {{ longhorn_namespace }}
      spec:
        podSelector:
          matchLabels:
            app: longhorn-ui
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: {{ traefik_namespace }}
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: traefik
            ports:
              - port: 8000
                protocol: TCP

- name: Apply Longhorn NetworkPolicy
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/longhorn/networkpolicy.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: longhorn_netpol_output
  changed_when: true

- name: Print Longhorn NetworkPolicy apply output
  ansible.builtin.debug:
    var: longhorn_netpol_output.stdout_lines
