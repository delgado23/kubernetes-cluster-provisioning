---
- name: Apply Pod Security Standards to core namespaces
  ansible.builtin.command:
    cmd: >
      kubectl label namespace {{ item.ns }}
      pod-security.kubernetes.io/enforce={{ item.enforce }}
      pod-security.kubernetes.io/enforce-version=latest
      pod-security.kubernetes.io/warn={{ item.warn }}
      pod-security.kubernetes.io/warn-version=latest
      pod-security.kubernetes.io/audit={{ item.warn }}
      pod-security.kubernetes.io/audit-version=latest
      --overwrite
  environment:
    KUBECONFIG: /root/.kube/config
  loop:
    - { ns: metallb-system,                  enforce: privileged, warn: privileged }
    - { ns: "{{ cert_manager_namespace }}",  enforce: restricted, warn: restricted }
    - { ns: default,                          enforce: baseline,   warn: restricted }
  changed_when: true

- name: Apply Pod Security Standards to Traefik namespace
  ansible.builtin.command:
    cmd: >
      kubectl label namespace {{ traefik_namespace }}
      pod-security.kubernetes.io/enforce=baseline
      pod-security.kubernetes.io/enforce-version=latest
      pod-security.kubernetes.io/warn=restricted
      pod-security.kubernetes.io/warn-version=latest
      pod-security.kubernetes.io/audit=restricted
      pod-security.kubernetes.io/audit-version=latest
      --overwrite
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true
  when: "'traefik' in _addons"

- name: Apply Pod Security Standards to Longhorn namespace
  ansible.builtin.command:
