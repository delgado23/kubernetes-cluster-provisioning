---
- name: Verify Authentik OIDC vault variables are defined for Headlamp
  ansible.builtin.assert:
    that:
      - vault_authentik_headlamp_client_id is defined
      - vault_authentik_headlamp_client_id | length > 0
      - vault_authentik_headlamp_client_secret is defined
      - vault_authentik_headlamp_client_secret | length > 0
    fail_msg: |
      Missing vault variables for Headlamp OIDC. Add to vars/vault.yml:
        vault_authentik_headlamp_client_id: "<client id from Authentik>"
        vault_authentik_headlamp_client_secret: "<client secret from Authentik>"

- name: Add Headlamp Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add headlamp https://kubernetes-sigs.github.io/headlamp/
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create Headlamp manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/headlamp"
    state: directory
    mode: '0700'

- name: Write Headlamp Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/headlamp/values.yml"
    mode: "0600"
    content: |
      service:
        type: ClusterIP

      config:
        baseURL: "https://headlamp.{{ ingress_domain }}"
        oidc:
          clientID: "{{ vault_authentik_headlamp_client_id }}"
          clientSecret: "{{ vault_authentik_headlamp_client_secret }}"
          issuerURL: "{{ authentik_headlamp_issuer }}"
          scopes: "openid,profile,email,groups"
  no_log: true

- name: Install or upgrade Headlamp via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install headlamp headlamp/headlamp
      --namespace {{ headlamp_namespace }}
      --create-namespace
      --version {{ headlamp_version }}
      --values {{ k8s_manifests_dir }}/headlamp/values.yml
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /root/.kube/config
  register: headlamp_helm_output
  changed_when: true
  failed_when: headlamp_helm_output.rc != 0

- name: Print Headlamp Helm output
  ansible.builtin.debug:
    var: headlamp_helm_output.stdout_lines

- name: Dump Headlamp pod status on install failure
  ansible.builtin.command:
    cmd: kubectl get pods -n {{ headlamp_namespace }} -o wide
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  when: headlamp_helm_output.rc != 0
  ignore_errors: true
  register: _headlamp_pod_status

- name: Print Headlamp pod status
  ansible.builtin.debug:
    var: _headlamp_pod_status.stdout_lines
  when: headlamp_helm_output.rc != 0

- name: Dump Headlamp pod logs on install failure
  ansible.builtin.shell:
    cmd: >
      kubectl logs -n {{ headlamp_namespace }}
      -l app.kubernetes.io/name=headlamp
      --tail=50 2>&1 || true
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  when: headlamp_helm_output.rc != 0
  register: _headlamp_pod_logs

- name: Print Headlamp pod logs
  ansible.builtin.debug:
    var: _headlamp_pod_logs.stdout_lines
  when: headlamp_helm_output.rc != 0

- name: Fail after Headlamp diagnostics
  ansible.builtin.fail:
    msg: "Headlamp Helm install failed — see pod status and logs above"
  when: headlamp_helm_output.rc != 0

- name: Write Headlamp IngressRoute manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/headlamp/ingress.yml"
    mode: "0600"
    content: |
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: headlamp
        namespace: {{ headlamp_namespace }}
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`headlamp.{{ ingress_domain }}`)
            kind: Rule
            services:
              - name: headlamp
                port: 80
        tls:
          secretName: {{ wildcard_secret_name }}

- name: Apply Headlamp IngressRoute
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/headlamp/ingress.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: headlamp_ingress_output
  changed_when: true

- name: Print Headlamp IngressRoute apply output
  ansible.builtin.debug:
    var: headlamp_ingress_output.stdout_lines

