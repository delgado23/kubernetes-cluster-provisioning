---
- name: Add cert-manager Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add jetstack https://charts.jetstack.io
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create cert-manager namespace
  ansible.builtin.command:
    cmd: kubectl create namespace {{ cert_manager_namespace }} --dry-run=client -o yaml
  register: certmgr_ns_yaml
  changed_when: false

- name: Apply cert-manager namespace
  ansible.builtin.shell:
    cmd: "echo '{{ certmgr_ns_yaml.stdout }}' | kubectl apply -f -"
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Create cert-manager manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/cert-manager"
    state: directory
    mode: '0700'

- name: Write cert-manager Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/cert-manager/values.yml"
    mode: "0600"
    content: |
      crds:
        enabled: true

      extraArgs:
        - --dns01-recursive-nameservers-only
        - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

      webhook:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      cainjector:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

- name: Install or upgrade cert-manager via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install cert-manager jetstack/cert-manager
      --namespace {{ cert_manager_namespace }}
      --version {{ cert_manager_version }}
      --values {{ k8s_manifests_dir }}/cert-manager/values.yml
      --wait
      --timeout 5m
  environment:
    KUBECONFIG: /root/.kube/config
  register: certmgr_output
  until: certmgr_output.rc == 0
  retries: 3
  delay: 30
  changed_when: true

- name: Print cert-manager install output
  ansible.builtin.debug:
    var: certmgr_output.stdout_lines

- name: Wait for cert-manager webhook to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Available deployment/cert-manager-webhook
      --namespace {{ cert_manager_namespace }}
      --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Wait for cert-manager controller to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Available deployment/cert-manager
      --namespace {{ cert_manager_namespace }}
      --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create Cloudflare API token secret
  ansible.builtin.command:
    cmd: >
      kubectl create secret generic cloudflare-api-token
      --namespace {{ cert_manager_namespace }}
      --from-literal=api-token={{ vault_cloudflare_api_token }}
      --dry-run=client -o yaml
  register: cf_secret_yaml
  changed_when: false
  no_log: true

- name: Apply Cloudflare API token secret
  ansible.builtin.shell:
    cmd: "echo '{{ cf_secret_yaml.stdout }}' | kubectl apply -f -"
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true
  no_log: true

- name: Set Let's Encrypt ACME endpoint and issuer name
  ansible.builtin.set_fact:
    _acme_server: >-
      {{ 'https://acme-staging-v02.api.letsencrypt.org/directory'
         if letsencrypt_staging | bool
         else 'https://acme-v02.api.letsencrypt.org/directory' }}
    _issuer_name: >-
      {{ 'letsencrypt-cloudflare-staging'
         if letsencrypt_staging | bool
         else 'letsencrypt-cloudflare' }}
    _issuer_key_secret: >-
      {{ 'letsencrypt-cloudflare-staging-account-key'
         if letsencrypt_staging | bool
         else 'letsencrypt-cloudflare-account-key' }}

- name: Create cert-manager manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/cert-manager"
    state: directory
    mode: '0700'

- name: Write ClusterIssuer manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/cert-manager/clusterissuer.yml"
    mode: "0600"
    content: |
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: {{ _issuer_name }}
      spec:
        acme:
          server: {{ _acme_server }}
          email: {{ cloudflare_email }}
          privateKeySecretRef:
            name: {{ _issuer_key_secret }}
          solvers:
            - dns01:
                cloudflare:
                  apiTokenSecretRef:
                    name: cloudflare-api-token
                    key: api-token

- name: Apply ClusterIssuer
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/cert-manager/clusterissuer.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: issuer_output
  changed_when: true

- name: Print ClusterIssuer apply output
  ansible.builtin.debug:
    var: issuer_output.stdout_lines

- name: Wait for ClusterIssuer to be ready (ACME account registration)
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Ready clusterissuer/{{ _issuer_name }}
      --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Write wildcard Certificate manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/cert-manager/wildcard-cert.yml"
    mode: "0600"
    content: |
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: garaventaville-wildcard
        namespace: {{ cert_manager_namespace }}
      spec:
        secretName: {{ wildcard_secret_name }}
        secretTemplate:
          annotations:
            reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
            reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "{{ traefik_namespace }},{{ longhorn_namespace }},{{ headlamp_namespace }},{{ argocd_namespace }}"
            reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
            reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "{{ traefik_namespace }},{{ longhorn_namespace }},{{ headlamp_namespace }},{{ argocd_namespace }}"
        issuerRef:
          name: {{ _issuer_name }}
          kind: ClusterIssuer
        commonName: "*.{{ ingress_domain }}"
        dnsNames:
          - "*.{{ ingress_domain }}"

- name: Apply wildcard Certificate
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/cert-manager/wildcard-cert.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: cert_output
  changed_when: true

- name: Print Certificate apply output
  ansible.builtin.debug:
    var: cert_output.stdout_lines

- name: Write cert-manager NetworkPolicy manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/cert-manager/networkpolicy.yml"
    mode: "0600"
    content: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-deny-ingress
        namespace: {{ cert_manager_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
      ---
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-intra-namespace
        namespace: {{ cert_manager_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
        ingress:
          - from:
              - podSelector: {}
      ---
      # kube-apiserver calls cert-manager webhook on port 9443 (host network -> node IP)
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-apiserver-webhook
        namespace: {{ cert_manager_namespace }}
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/component: webhook
        policyTypes:
          - Ingress
        ingress:
          - ports:
              - port: 9443
                protocol: TCP

- name: Apply cert-manager NetworkPolicy
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/cert-manager/networkpolicy.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: certmgr_netpol_output
  changed_when: true

- name: Print cert-manager NetworkPolicy apply output
  ansible.builtin.debug:
    var: certmgr_netpol_output.stdout_lines

- name: Wait for ClusterIssuer to be ready (ACME account registration)
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Ready clusterissuer/{{ _issuer_name }}
      --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Wait for wildcard certificate to be issued (up to 20 min)
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Ready certificate/garaventaville-wildcard
      --namespace {{ cert_manager_namespace }}
      --timeout=1200s
  environment:
    KUBECONFIG: /root/.kube/config
  register: _cert_wait
  changed_when: false
  failed_when: false

- name: Dump certificate status on failure
  ansible.builtin.command:
    cmd: kubectl describe certificate garaventaville-wildcard --namespace {{ cert_manager_namespace }}
  environment:
    KUBECONFIG: /root/.kube/config
  register: _cert_describe
  changed_when: false
  when: _cert_wait.rc != 0

- name: Dump ACME orders on failure
  ansible.builtin.command:
    cmd: kubectl describe orders --namespace {{ cert_manager_namespace }}
  environment:
    KUBECONFIG: /root/.kube/config
  register: _orders_describe
  changed_when: false
  when: _cert_wait.rc != 0

- name: Dump ACME challenges on failure
  ansible.builtin.command:
    cmd: kubectl get challenges --namespace {{ cert_manager_namespace }} -o wide
  environment:
    KUBECONFIG: /root/.kube/config
  register: _challenges_describe
  changed_when: false
  failed_when: false
  when: _cert_wait.rc != 0

- name: Show certificate diagnostics
  ansible.builtin.debug:
    msg: "{{ _cert_describe.stdout_lines + ['---'] + _orders_describe.stdout_lines + ['---'] + _challenges_describe.stdout_lines }}"
  when: _cert_wait.rc != 0

- name: Fail with diagnostic hint
  ansible.builtin.fail:
    msg: |
      Wildcard certificate was not issued within 20 minutes.

      Diagnostic output is in the task above. Common causes:

      1. Cloudflare API token is missing Zone:DNS:Edit permission
         → Check token at dash.cloudflare.com → My Profile → API Tokens
         → The token needs Zone:Zone:Read + Zone:DNS:Edit on example.com

      2. TXT record never created — verify in Cloudflare DNS:
         dig TXT _acme-challenge.{{ ingress_domain }} @8.8.8.8

      3. Let's Encrypt rate limit (5 failures/hour per hostname)
         → Wait 1 hour and retry, or switch to letsencrypt_staging=true to test

      4. cert-manager controller errors:
         kubectl logs -n {{ cert_manager_namespace }} deploy/cert-manager | tail -50
  when: _cert_wait.rc != 0

