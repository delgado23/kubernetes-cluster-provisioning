---
- name: Add Prometheus community Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create Prometheus manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/prometheus"
    state: directory
    mode: '0700'

- name: Write kube-prometheus-stack Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/prometheus/values.yml"
    mode: "0600"
    content: |
      grafana:
        enabled: false

      prometheus:
        prometheusSpec:
          retention: 15d
          retentionSize: "18GB"
          serviceMonitorSelectorNilUsesHelmValues: false
          serviceMonitorSelector: {}
          serviceMonitorNamespaceSelector: {}
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: longhorn
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: {{ prometheus_storage_size }}

      alertmanager:
        alertmanagerSpec:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          storage:
            volumeClaimTemplate:
              spec:
                storageClassName: longhorn
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: {{ alertmanager_storage_size }}

      nodeExporter:
        enabled: true

      kubeStateMetrics:
        enabled: true

- name: Install or upgrade kube-prometheus-stack via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack
      --namespace {{ prometheus_namespace }}
      --create-namespace
      --version {{ prometheus_version }}
      --values {{ k8s_manifests_dir }}/prometheus/values.yml
      --wait
      --timeout 15m
  environment:
    KUBECONFIG: /root/.kube/config
  register: prometheus_helm_output
  changed_when: true

- name: Print kube-prometheus-stack Helm output
  ansible.builtin.debug:
    var: prometheus_helm_output.stdout_lines

- name: Write Prometheus IngressRoute manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/prometheus/ingress.yml"
    mode: "0600"
    content: |
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: prometheus
        namespace: {{ prometheus_namespace }}
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`prometheus.{{ ingress_domain }}`)
            kind: Rule
            middlewares:
              - name: authentik-forward-auth
                namespace: {{ traefik_namespace }}
            services:
              - name: kube-prometheus-stack-prometheus
                port: 9090
        tls:
          secretName: {{ wildcard_secret_name }}
      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: alertmanager
        namespace: {{ prometheus_namespace }}
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`alertmanager.{{ ingress_domain }}`)
            kind: Rule
            middlewares:
              - name: authentik-forward-auth
                namespace: {{ traefik_namespace }}
            services:
              - name: kube-prometheus-stack-alertmanager
                port: 9093
        tls:
          secretName: {{ wildcard_secret_name }}

- name: Apply Prometheus IngressRoutes
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/prometheus/ingress.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: prometheus_ingress_output
  changed_when: true

- name: Print Prometheus IngressRoute apply output
  ansible.builtin.debug:
    var: prometheus_ingress_output.stdout_lines
