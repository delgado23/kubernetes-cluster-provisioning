---
- name: Add Prometheus community Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create Prometheus manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/prometheus"
    state: directory
    mode: '0700'

- name: Write kube-prometheus-stack Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/prometheus/values.yml"
    mode: "0600"
    content: |
      grafana:
        enabled: false

      prometheus:
        prometheusSpec:
          retention: 15d
          retentionSize: "18GB"
          serviceMonitorSelectorNilUsesHelmValues: false
          serviceMonitorSelector: {}
          serviceMonitorNamespaceSelector: {}
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: longhorn
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: {{ prometheus_storage_size }}

      alertmanager:
        alertmanagerSpec:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          storage:
            volumeClaimTemplate:
              spec:
                storageClassName: longhorn
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: {{ alertmanager_storage_size }}

      nodeExporter:
        enabled: true

      prometheus-node-exporter:
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi

      kubeStateMetrics:
        enabled: true

      kube-state-metrics:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      prometheusOperator:
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            cpu: 200m
            memory: 200Mi
        prometheusConfigReloader:
          resources:
            requests:
              cpu: 10m
              memory: 25Mi
            limits:
              cpu: 100m
              memory: 50Mi

- name: Install or upgrade kube-prometheus-stack via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack
      --namespace {{ prometheus_namespace }}
      --create-namespace
      --version {{ prometheus_version }}
      --values {{ k8s_manifests_dir }}/prometheus/values.yml
      --wait
      --timeout 15m
  environment:
    KUBECONFIG: /root/.kube/config
  register: prometheus_helm_output
  changed_when: true

- name: Print kube-prometheus-stack Helm output
  ansible.builtin.debug:
    var: prometheus_helm_output.stdout_lines

- name: Write monitoring NetworkPolicy manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/prometheus/networkpolicy.yml"
    mode: "0600"
    content: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: prometheus-ingress
        namespace: {{ prometheus_namespace }}
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: {{ traefik_namespace }}
            ports:
              - protocol: TCP
                port: 9090
      ---
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: alertmanager-ingress
        namespace: {{ prometheus_namespace }}
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: alertmanager
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: {{ traefik_namespace }}
            ports:
              - protocol: TCP
                port: 9093
      ---
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: intra-namespace
        namespace: {{ prometheus_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
        ingress:
          - from:
              - podSelector: {}

- name: Apply monitoring NetworkPolicy
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/prometheus/networkpolicy.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: prometheus_netpol_output
  changed_when: true

- name: Print monitoring NetworkPolicy apply output
  ansible.builtin.debug:
    var: prometheus_netpol_output.stdout_lines

