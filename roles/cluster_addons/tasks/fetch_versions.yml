---
- name: Fetch Flannel release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/flannel-io/flannel/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _flannel_job

- name: Fetch Longhorn release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/longhorn/longhorn/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _longhorn_job

- name: Fetch Traefik Helm chart release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/traefik/traefik-helm-chart/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _traefik_job

- name: Fetch cert-manager release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/cert-manager/cert-manager/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _certmgr_job

- name: Fetch Headlamp releases from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/kubernetes-sigs/headlamp/releases?per_page=20
    return_content: true
  async: 60
  poll: 0
  register: _headlamp_job

- name: Fetch reflector release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/emberstack/kubernetes-reflector/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _reflector_job

- name: Fetch ArgoCD Helm chart releases from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/argoproj/argo-helm/releases?per_page=20
    return_content: true
  async: 60
  poll: 0
  register: _argocd_job

- name: Fetch descheduler release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/kubernetes-sigs/descheduler/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _descheduler_job

- name: Fetch kube-prometheus-stack Helm chart releases from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/prometheus-community/helm-charts/releases?per_page=20
    return_content: true
  async: 60
  poll: 0
  register: _prometheus_job

- name: Fetch kube-router release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/cloudnativelabs/kube-router/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _kube_router_job

- name: Fetch MetalLB release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/metallb/metallb/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _metallb_job

- name: Fetch metrics-server release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/kubernetes-sigs/metrics-server/releases/latest
    return_content: true
  async: 60
  poll: 0
  register: _metrics_server_job

- name: Wait for all GitHub version fetches to complete
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  register: _fetch_results
  until: _fetch_results.finished
  retries: 20
  delay: 3
  loop:
    - "{{ _flannel_job }}"
    - "{{ _longhorn_job }}"
    - "{{ _traefik_job }}"
    - "{{ _certmgr_job }}"
    - "{{ _headlamp_job }}"
    - "{{ _reflector_job }}"
    - "{{ _argocd_job }}"
    - "{{ _descheduler_job }}"
    - "{{ _prometheus_job }}"
    - "{{ _kube_router_job }}"
    - "{{ _metallb_job }}"
    - "{{ _metrics_server_job }}"

- name: Set resolved addon versions
  ansible.builtin.set_fact:
    flannel_version:        "{{ _fetch_results.results[0].json.tag_name }}"
    longhorn_version:       "{{ _fetch_results.results[1].json.tag_name | regex_replace('^v', '') }}"
    traefik_chart_version:  "{{ _fetch_results.results[2].json.tag_name | regex_replace('^v', '') }}"
    cert_manager_version:   "{{ _fetch_results.results[3].json.tag_name }}"
    headlamp_version: >-
      {{
        _fetch_results.results[4].json
        | selectattr('tag_name', 'match', '^v\d')
        | map(attribute='tag_name')
        | first
        | regex_replace('^v', '')
      }}
    reflector_version:      "{{ _fetch_results.results[5].json.tag_name | regex_replace('^v', '') }}"
    argocd_version: >-
      {{
        _fetch_results.results[6].json
        | selectattr('tag_name', 'match', '^argo-cd-')
        | map(attribute='tag_name')
        | first
        | regex_replace('^argo-cd-', '')
      }}
    descheduler_version:    "{{ _fetch_results.results[7].json.tag_name | regex_replace('^v', '') }}"
    prometheus_version: >-
      {{
        _fetch_results.results[8].json
        | selectattr('tag_name', 'match', '^kube-prometheus-stack-')
        | map(attribute='tag_name')
        | first
        | regex_replace('^kube-prometheus-stack-', '')
      }}
    kube_router_version:    "{{ _fetch_results.results[9].json.tag_name }}"
    metallb_version:        "{{ _fetch_results.results[10].json.tag_name }}"
    metrics_server_version:        "{{ _fetch_results.results[11].json.tag_name }}"

- name: Display resolved addon versions
  ansible.builtin.debug:
    msg:
      - "Flannel:        {{ flannel_version }}"
      - "Longhorn:       {{ longhorn_version }}"
      - "Traefik chart:  {{ traefik_chart_version }}"
      - "cert-manager:   {{ cert_manager_version }}"
      - "Headlamp:       {{ headlamp_version }}"
      - "Reflector:      {{ reflector_version }}"
      - "ArgoCD:         {{ argocd_version }}"
      - "Descheduler:    {{ descheduler_version }}"
      - "Prometheus:     {{ prometheus_version }}"
      - "kube-router:    {{ kube_router_version }}"
      - "MetalLB:        {{ metallb_version }}"
      - "metrics-server: {{ metrics_server_version }}"
