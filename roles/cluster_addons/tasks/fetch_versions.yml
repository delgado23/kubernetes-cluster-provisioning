---
- name: Fetch latest Flannel release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/flannel-io/flannel/releases/latest
    return_content: true
  register: flannel_release

- name: Fetch latest Longhorn release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/longhorn/longhorn/releases/latest
    return_content: true
  register: longhorn_release

- name: Fetch latest Traefik Helm chart release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/traefik/traefik-helm-chart/releases/latest
    return_content: true
  register: traefik_release

- name: Fetch latest cert-manager release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/cert-manager/cert-manager/releases/latest
    return_content: true
  register: cert_manager_release

- name: Fetch latest Headlamp release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/kubernetes-sigs/headlamp/releases/latest
    return_content: true
  register: headlamp_release

- name: Set resolved addon versions
  ansible.builtin.set_fact:
    flannel_version: "{{ flannel_release.json.tag_name }}"
    longhorn_version: "{{ longhorn_release.json.tag_name | regex_replace('^v', '') }}"
    traefik_chart_version: "{{ traefik_release.json.tag_name | regex_replace('^v', '') }}"
    cert_manager_version: "{{ cert_manager_release.json.tag_name }}"
    headlamp_version: "{{ headlamp_release.json.tag_name | regex_replace('^v', '') }}"

- name: Display resolved addon versions
  ansible.builtin.debug:
    msg:
      - "Flannel:       {{ flannel_version }}"
      - "Longhorn:      {{ longhorn_version }}"
      - "Traefik chart: {{ traefik_chart_version }}"
      - "cert-manager:  {{ cert_manager_version }}"
      - "Headlamp:      {{ headlamp_version }}"
