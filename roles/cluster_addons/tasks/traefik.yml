---
- name: Add Traefik Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add traefik https://traefik.github.io/charts
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create traefik namespace
  ansible.builtin.command:
    cmd: kubectl create namespace {{ traefik_namespace }} --dry-run=client -o yaml
  register: traefik_ns_yaml
  changed_when: false

- name: Apply traefik namespace
  ansible.builtin.shell:
    cmd: "echo '{{ traefik_ns_yaml.stdout }}' | kubectl apply -f -"
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Create Traefik manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/traefik"
    state: directory
    mode: '0700'

- name: Write Traefik Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/traefik/values.yml"
    mode: "0600"
    content: |
      deployment:
        replicas: 2

      service:
        type: LoadBalancer
        loadBalancerIP: "172.16.0.50"

      ingressClass:
        enabled: true
        isDefaultClass: true

      providers:
        kubernetesCRD:
          enabled: true
          allowCrossNamespace: true
          allowExternalNameServices: true
        kubernetesIngress:
          enabled: true
          allowExternalNameServices: true

      ports:
        web:
          http:
            redirections:
              entryPoint:
                to: websecure
                scheme: https
                permanent: true

      api:
        dashboard: true
        insecure: false

      logs:
        general:
          level: INFO
        access:
          enabled: true

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

      metrics:
        prometheus:
          entryPoint: metrics
          addRoutersLabels: true
          addServicesLabels: true
          service:
            enabled: true
          serviceMonitor:
            enabled: true

      persistence:
        enabled: false

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

- name: Install or upgrade Traefik via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install traefik traefik/traefik
      --namespace {{ traefik_namespace }}
      --version {{ traefik_chart_version }}
      --values {{ k8s_manifests_dir }}/traefik/values.yml
      --wait
      --timeout 5m
  environment:
    KUBECONFIG: /root/.kube/config
  register: traefik_helm_output
  until: traefik_helm_output.rc == 0
  retries: 3
  delay: 30
  changed_when: true

- name: Print Traefik Helm output
  ansible.builtin.debug:
    var: traefik_helm_output.stdout_lines

- name: Write Traefik dashboard IngressRoute manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/traefik/dashboard-ingress.yml"
    mode: "0600"
    content: |
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: authentik-forward-auth
        namespace: {{ traefik_namespace }}
      spec:
        forwardAuth:
          address: "{{ authentik_outpost_url }}/outpost.goauthentik.io/auth/traefik"
          trustForwardHeader: true
          authResponseHeaders:
            - X-authentik-username
            - X-authentik-groups
            - X-authentik-email
            - X-authentik-name
            - X-authentik-uid
            - X-authentik-jwt
            - X-authentik-meta-jwks
            - X-authentik-meta-outpost
            - X-authentik-meta-provider
            - X-authentik-meta-app
            - X-authentik-meta-version

      ---
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: traefik-dashboard-redirect
        namespace: {{ traefik_namespace }}
      spec:
        redirectRegex:
          regex: '.*'
          replacement: 'https://traefik.{{ ingress_domain }}/dashboard/'
          permanent: false

      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: authentik-outpost
        namespace: {{ traefik_namespace }}
      spec:
        type: ExternalName
        externalName: "{{ authentik_url | regex_replace('^https?://', '') }}"
        ports:
          - port: 9000
            targetPort: 9000

      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: traefik-dashboard
        namespace: {{ traefik_namespace }}
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`traefik.{{ ingress_domain }}`) && PathPrefix(`/outpost.goauthentik.io/`)
            kind: Rule
            services:
              - name: authentik-outpost
                port: 9000
                passHostHeader: false
          - match: Host(`traefik.{{ ingress_domain }}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
            kind: Rule
            middlewares:
              - name: authentik-forward-auth
            services:
              - name: api@internal
                kind: TraefikService
          - match: Host(`traefik.{{ ingress_domain }}`) && Path(`/`)
            kind: Rule
            middlewares:
              - name: traefik-dashboard-redirect
            services:
              - name: api@internal
                kind: TraefikService
        tls:
          secretName: {{ wildcard_secret_name }}

- name: Apply Traefik dashboard IngressRoute
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/traefik/dashboard-ingress.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: traefik_ingress_output
  changed_when: true

- name: Print Traefik IngressRoute apply output
  ansible.builtin.debug:
    var: traefik_ingress_output.stdout_lines

- name: Write Traefik NetworkPolicy manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/traefik/networkpolicy.yml"
    mode: "0600"
    content: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-deny-ingress
        namespace: {{ traefik_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
      ---
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-intra-namespace
        namespace: {{ traefik_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
        ingress:
          - from:
              - podSelector: {}
      ---
      # Traefik is the cluster ingress controller — allow external traffic on pod ports 8000/8443
      # (kube-proxy DNATs service ports 80/443 to these pod ports; NetworkPolicy matches pod ports)
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-external-web
        namespace: {{ traefik_namespace }}
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
        policyTypes:
          - Ingress
        ingress:
          - ports:
              - port: 8000
                protocol: TCP
              - port: 8443
                protocol: TCP
      ---
      # Allow Prometheus to scrape Traefik metrics (port 9100)
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-prometheus-scrape
        namespace: {{ traefik_namespace }}
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: {{ prometheus_namespace }}
            ports:
              - port: 9100
                protocol: TCP

- name: Apply Traefik NetworkPolicy
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/traefik/networkpolicy.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: traefik_netpol_output
  changed_when: true

- name: Print Traefik NetworkPolicy apply output
  ansible.builtin.debug:
    var: traefik_netpol_output.stdout_lines

