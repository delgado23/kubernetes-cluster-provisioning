---
- name: Install MetalLB
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/{{ metallb_version }}/config/manifests/metallb-native.yaml
  environment:
    KUBECONFIG: /root/.kube/config
  register: metallb_install_output
  changed_when: true

- name: Print MetalLB install output
  ansible.builtin.debug:
    var: metallb_install_output.stdout_lines

- name: Wait for MetalLB controller to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Available deployment/controller
      --namespace metallb-system
      --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Wait for MetalLB webhook service to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Ready pod
      --selector=component=controller
      --namespace metallb-system
      --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Wait for MetalLB speaker DaemonSet to be ready
  ansible.builtin.command:
    cmd: kubectl rollout status daemonset/speaker --namespace metallb-system --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create MetalLB manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/metallb"
    state: directory
    mode: '0700'

- name: Render MetalLB IP address pool manifest
  ansible.builtin.template:
    src: metallb-pool.yml.j2
    dest: "{{ k8s_manifests_dir }}/metallb/pool.yml"
    mode: "0600"

- name: Apply MetalLB IP address pool
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/metallb/pool.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: metallb_pool_output
  changed_when: true

- name: Print MetalLB pool apply output
  ansible.builtin.debug:
    var: metallb_pool_output.stdout_lines

# MetalLB v0.16.0 Layer2StatusReconciler race condition: when speakers can't
# form memberlist (e.g. port 7946 was blocked) they each create/delete
# servicel2status objects in a tight loop, flooding the API server.
# Deleting all stale objects and restarting speakers resets the reconcilers
# to a clean state. Harmless on a fresh install.
- name: Delete stale MetalLB L2 status objects
  ansible.builtin.command:
    cmd: kubectl delete servicel2statuses -A --all --ignore-not-found
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Rolling restart MetalLB speakers to clear stale reconciler cache
  ansible.builtin.command:
    cmd: kubectl rollout restart daemonset/speaker -n metallb-system
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Wait for MetalLB speaker rollout after restart
  ansible.builtin.command:
    cmd: kubectl rollout status daemonset/speaker --namespace metallb-system --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Write MetalLB NetworkPolicy manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/metallb/networkpolicy.yml"
    mode: "0600"
    content: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-deny-ingress
        namespace: metallb-system
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
      ---
      # kube-apiserver calls the MetalLB admission webhook on port 9443.
      # Speakers use hostNetwork so NetworkPolicy does not apply to them.
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-apiserver-webhook
        namespace: metallb-system
      spec:
        podSelector:
          matchLabels:
            component: controller
        policyTypes:
          - Ingress
        ingress:
          - ports:
              - port: 9443
                protocol: TCP

- name: Apply MetalLB NetworkPolicy
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/metallb/networkpolicy.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: metallb_netpol_output
  changed_when: true

- name: Print MetalLB NetworkPolicy apply output
  ansible.builtin.debug:
    var: metallb_netpol_output.stdout_lines

