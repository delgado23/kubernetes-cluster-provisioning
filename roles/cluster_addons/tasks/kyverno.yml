---
- name: Add Kyverno Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add kyverno https://kyverno.github.io/kyverno
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create Kyverno manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/kyverno"
    state: directory
    mode: '0700'

- name: Write Kyverno Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/kyverno/values.yml"
    mode: "0600"
    content: |
      admissionController:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 384Mi

      backgroundController:
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      cleanupController:
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      reportsController:
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

- name: Install or upgrade Kyverno via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install kyverno kyverno/kyverno
      --namespace {{ kyverno_namespace }}
      --create-namespace
      --values {{ k8s_manifests_dir }}/kyverno/values.yml
      --wait
      --timeout 5m
  environment:
    KUBECONFIG: /root/.kube/config
  register: kyverno_helm_output
  changed_when: true

- name: Print Kyverno Helm output
  ansible.builtin.debug:
    var: kyverno_helm_output.stdout_lines

- name: Create Kyverno manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/kyverno"
    state: directory
    mode: '0700'

- name: Copy Kyverno policies to control plane
  ansible.builtin.copy:
    src: kyverno-policies.yml
    dest: "{{ k8s_manifests_dir }}/kyverno/policies.yml"
    mode: "0600"

- name: Apply Kyverno cluster policies
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/kyverno/policies.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: kyverno_policies_output
  changed_when: true

- name: Print Kyverno policy apply output
  ansible.builtin.debug:
    var: kyverno_policies_output.stdout_lines

