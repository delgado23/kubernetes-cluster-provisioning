---
- name: Add Kyverno Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add kyverno https://kyverno.github.io/kyverno
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create Kyverno manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/kyverno"
    state: directory
    mode: '0700'

- name: Write Kyverno Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/kyverno/values.yml"
    mode: "0600"
    content: |
      admissionController:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 384Mi

      backgroundController:
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      cleanupController:
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      reportsController:
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

- name: Install or upgrade Kyverno via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install kyverno kyverno/kyverno
      --namespace {{ kyverno_namespace }}
      --create-namespace
      --values {{ k8s_manifests_dir }}/kyverno/values.yml
      --wait
      --timeout 5m
  environment:
    KUBECONFIG: /root/.kube/config
  register: kyverno_helm_output
  changed_when: true

- name: Print Kyverno Helm output
  ansible.builtin.debug:
    var: kyverno_helm_output.stdout_lines

- name: Create Kyverno manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/kyverno"
    state: directory
    mode: '0700'

- name: Copy Kyverno policies to control plane
  ansible.builtin.copy:
    src: kyverno-policies.yml
    dest: "{{ k8s_manifests_dir }}/kyverno/policies.yml"
    mode: "0600"

- name: Apply Kyverno cluster policies
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/kyverno/policies.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: kyverno_policies_output
  changed_when: true

- name: Print Kyverno policy apply output
  ansible.builtin.debug:
    var: kyverno_policies_output.stdout_lines

- name: Write Kyverno NetworkPolicy manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/kyverno/networkpolicy.yml"
    mode: "0600"
    content: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-deny-ingress
        namespace: {{ kyverno_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
      ---
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-intra-namespace
        namespace: {{ kyverno_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
        ingress:
          - from:
              - podSelector: {}
      ---
      # kube-apiserver calls Kyverno admission webhooks on port 9443.
      # The apiserver runs with hostNetwork so traffic arrives from node IPs,
      # not pod IPs — allow from anywhere on the webhook port.
      # Use podSelector: {} to match all Kyverno pods (admission-controller,
      # background-controller, cleanup-controller, reports-controller) since
      # they each use different component labels but all need to be reachable.
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-apiserver-webhook
        namespace: {{ kyverno_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
        ingress:
          - ports:
              - port: 9443
                protocol: TCP

- name: Apply Kyverno NetworkPolicy
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/kyverno/networkpolicy.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: kyverno_netpol_output
  changed_when: true

- name: Print Kyverno NetworkPolicy apply output
  ansible.builtin.debug:
    var: kyverno_netpol_output.stdout_lines

- name: Wait for Kyverno admission controller to be Available
  ansible.builtin.command:
    cmd: >
      kubectl wait deployment/kyverno-admission-controller
      -n {{ kyverno_namespace }}
      --for=condition=Available
      --timeout=180s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

