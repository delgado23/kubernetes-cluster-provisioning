---
- name: Wait for worker nodes to appear in the cluster
  ansible.builtin.command:
    cmd: >
      kubectl get nodes --no-headers
      -l '!node-role.kubernetes.io/control-plane'
      -o custom-columns=NAME:.metadata.name
  register: _worker_nodes
  retries: 18
  delay: 10
  until: _worker_nodes.stdout_lines | select('ne', '') | list | length > 0
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Wait for all worker nodes to be Ready
  ansible.builtin.command:
    cmd: >
      kubectl wait node
      --for=condition=Ready
      -l '!node-role.kubernetes.io/control-plane'
      --timeout=180s
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Display current node status
  ansible.builtin.command: kubectl get nodes -o wide
  changed_when: false
  register: nodes_wide
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Print node list
  ansible.builtin.debug:
    var: nodes_wide.stdout_lines
