---
- name: Verify Authentik OIDC vault variables are defined for ArgoCD
  ansible.builtin.assert:
    that:
      - vault_authentik_argocd_client_id is defined
      - vault_authentik_argocd_client_id | length > 0
      - vault_authentik_argocd_client_secret is defined
      - vault_authentik_argocd_client_secret | length > 0
    fail_msg: |
      Missing vault variables for ArgoCD OIDC. Add to vars/vault.yml:
        vault_authentik_argocd_client_id: "<client id from Authentik>"
        vault_authentik_argocd_client_secret: "<client secret from Authentik>"

- name: Add Argo Helm repo
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo add argo https://argoproj.github.io/argo-helm
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Update Helm repos
  ansible.builtin.command:
    cmd: /usr/local/bin/helm repo update
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Create ArgoCD namespace
  ansible.builtin.command:
    cmd: kubectl create namespace {{ argocd_namespace }} --dry-run=client -o yaml
  register: argocd_ns_yaml
  changed_when: false

- name: Apply ArgoCD namespace
  ansible.builtin.shell:
    cmd: "echo '{{ argocd_ns_yaml.stdout }}' | kubectl apply -f -"
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Create ArgoCD manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/argocd"
    state: directory
    mode: '0700'

- name: Write ArgoCD Helm values
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/argocd/values.yml"
    mode: "0600"
    content: |
      configs:
        params:
          server.insecure: "false"
        cm:
          url: "https://argocd.{{ ingress_domain }}"
          oidc.config: |
            name: Authentik
            issuer: {{ authentik_argocd_issuer }}
            clientID: {{ vault_authentik_argocd_client_id }}
            clientSecret: $oidc.authentik.clientSecret
            requestedScopes:
              - openid
              - profile
              - email
              - groups
        secret:
          extra:
            oidc.authentik.clientSecret: "{{ vault_authentik_argocd_client_secret }}"
        rbac:
          policy.default: role:readonly
          policy.csv: |
            g, {{ argocd_admin_group }}, role:admin

      controller:
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi

      server:
        replicas: 2
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

      repoServer:
        replicas: 2
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

      applicationSet:
        replicas: 2
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      redis:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      dex:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      notifications:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
  no_log: "{{ 'debug' not in ansible_run_tags }}"

- name: Install or upgrade ArgoCD via Helm
  ansible.builtin.command:
    cmd: >
      /usr/local/bin/helm upgrade --install argocd argo/argo-cd
      --namespace {{ argocd_namespace }}
      --version {{ argocd_version }}
      --values {{ k8s_manifests_dir }}/argocd/values.yml
      --wait
      --timeout 10m
  environment:
    KUBECONFIG: /root/.kube/config
  register: argocd_helm_output
  until: argocd_helm_output.rc == 0
  retries: 3
  delay: 30
  changed_when: true

- name: Print ArgoCD Helm output
  ansible.builtin.debug:
    var: argocd_helm_output.stdout_lines

- name: Write ArgoCD NetworkPolicy manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/argocd/networkpolicy.yml"
    mode: "0600"
    content: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: argocd-network-policy
        namespace: {{ argocd_namespace }}
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
          - Egress
        ingress:
          # Allow intra-namespace traffic between ArgoCD components
          - from:
              - podSelector: {}
          # Allow Traefik to reach argocd-server on container port 8080
          # (Service maps 80->8080; NetworkPolicy uses pod/container port)
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: {{ traefik_namespace }}
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: traefik
            ports:
              - port: 8080
                protocol: TCP
        egress:
          # DNS resolution
          - ports:
              - port: 53
                protocol: UDP
              - port: 53
                protocol: TCP
          # kube-apiserver via in-cluster Service (kubernetes.default.svc)
          - to:
              - ipBlock:
                  cidr: {{ k8s_service_cidr }}
            ports:
              - port: 443
                protocol: TCP
          # Intra-namespace (ArgoCD components talk to each other)
          - to:
              - podSelector: {}
          # Outbound HTTPS (Git repos, Authentik OIDC, container registries)
          - ports:
              - port: 443
                protocol: TCP
          # Outbound SSH (Git over SSH)
          - ports:
              - port: 22
                protocol: TCP

- name: Apply ArgoCD NetworkPolicy
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/argocd/networkpolicy.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: argocd_networkpolicy_output
  changed_when: true

- name: Print ArgoCD NetworkPolicy apply output
  ansible.builtin.debug:
    var: argocd_networkpolicy_output.stdout_lines

- name: Write ArgoCD IngressRoute manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/argocd/ingress.yml"
    mode: "0600"
    content: |
      apiVersion: traefik.io/v1alpha1
      kind: ServersTransport
      metadata:
        name: argocd-backend
        namespace: {{ argocd_namespace }}
      spec:
        insecureSkipVerify: true
      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: argocd
        namespace: {{ argocd_namespace }}
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`argocd.{{ ingress_domain }}`)
            kind: Rule
            services:
              - name: argocd-server
                port: 443
                scheme: https
                serversTransport: argocd-backend
        tls:
          secretName: {{ wildcard_secret_name }}

- name: Apply ArgoCD IngressRoute
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/argocd/ingress.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: argocd_ingress_output
  changed_when: true

- name: Print ArgoCD IngressRoute apply output
  ansible.builtin.debug:
    var: argocd_ingress_output.stdout_lines

- name: Delete ArgoCD initial admin secret
  ansible.builtin.command:
    cmd: kubectl delete secret argocd-initial-admin-secret -n {{ argocd_namespace }} --ignore-not-found
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true

- name: Print ArgoCD access summary
  ansible.builtin.debug:
    msg:
      - "================================================="
      - "ArgoCD installed."
      - "URL      : https://argocd.{{ ingress_domain }}"
      - "Login via Authentik OIDC — initial admin secret deleted."
      - "================================================="
