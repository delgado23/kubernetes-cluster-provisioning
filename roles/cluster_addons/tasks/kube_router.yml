---
- name: Create kube-router manifest directory
  ansible.builtin.file:
    path: "{{ k8s_manifests_dir }}/kube-router"
    state: directory
    mode: '0700'

- name: Write kube-router manifest
  ansible.builtin.copy:
    dest: "{{ k8s_manifests_dir }}/kube-router/kube-router.yml"
    mode: "0600"
    content: |
      ---
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: kube-router
        namespace: kube-system
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: kube-router
      rules:
        - apiGroups: ["networking.k8s.io"]
          resources: ["networkpolicies"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods", "nodes", "namespaces", "endpoints", "services"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["discovery.k8s.io"]
          resources: ["endpointslices"]
          verbs: ["get", "list", "watch"]
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: kube-router
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: kube-router
      subjects:
        - kind: ServiceAccount
          name: kube-router
          namespace: kube-system
      ---
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: kube-router
        namespace: kube-system
        labels:
          app.kubernetes.io/name: kube-router
      spec:
        selector:
          matchLabels:
            app.kubernetes.io/name: kube-router
        template:
          metadata:
            labels:
              app.kubernetes.io/name: kube-router
          spec:
            priorityClassName: system-node-critical
            serviceAccountName: kube-router
            hostNetwork: true
            hostPID: true
            tolerations:
              - operator: Exists
            containers:
              - name: kube-router
                image: docker.io/cloudnativelabs/kube-router:{{ kube_router_version }}
                args:
                  - --run-firewall=true
                  - --run-service-proxy=false
                  - --run-router=false
                  - --metrics-port=0
                securityContext:
                  privileged: true
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi
                volumeMounts:
                  - name: lib-modules
                    mountPath: /lib/modules
                    readOnly: true
                  - name: xtables-lock
                    mountPath: /run/xtables.lock
            volumes:
              - name: lib-modules
                hostPath:
                  path: /lib/modules
              - name: xtables-lock
                hostPath:
                  path: /run/xtables.lock
                  type: FileOrCreate

- name: Apply kube-router manifest
  ansible.builtin.command:
    cmd: kubectl apply -f {{ k8s_manifests_dir }}/kube-router/kube-router.yml
  environment:
    KUBECONFIG: /root/.kube/config
  register: kube_router_output
  changed_when: true

- name: Print kube-router apply output
  ansible.builtin.debug:
    var: kube_router_output.stdout_lines

- name: Wait for kube-router DaemonSet to be ready
  ansible.builtin.command:
    cmd: kubectl rollout status daemonset/kube-router -n kube-system --timeout=5m
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
