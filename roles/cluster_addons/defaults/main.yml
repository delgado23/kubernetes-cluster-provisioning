---
letsencrypt_staging: false
cert_manager_namespace: cert-manager
cloudflare_email: "daniel@garaventaville.com"
domain: "garaventaville.com"
ingress_domain: "k8s.garaventaville.com"
wildcard_secret_name: "garaventaville-wildcard-tls"
traefik_namespace: traefik
longhorn_namespace: longhorn-system
headlamp_namespace: headlamp
argocd_namespace: argocd
kyverno_namespace: kyverno

# Authentik SSO — set authentik_url before running addons
# e.g. https://auth.garaventaville.com
k8s_manifests_dir: /root/k8s-manifests

authentik_url: "https://auth.garaventaville.com"
# OIDC client IDs must match the Client ID configured in each Authentik provider.
# The issuer URL is derived as: {{ authentik_url }}/application/o/<client_id>/
# Override authentik_argocd_issuer / authentik_headlamp_issuer if your app slug
# differs from the client ID.
authentik_argocd_client_id: "argocd"
authentik_argocd_issuer: "{{ authentik_url }}/application/o/{{ authentik_argocd_client_id }}/"
authentik_headlamp_client_id: "headlamp"
authentik_headlamp_issuer: "{{ authentik_url }}/application/o/{{ authentik_headlamp_client_id }}/"
