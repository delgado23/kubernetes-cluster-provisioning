---
cert_manager_namespace: cert-manager
cloudflare_email: "{{ vault_cloudflare_email }}"
domain: "{{ vault_domain }}"
ingress_domain: "{{ ingress_subdomain }}.{{ vault_domain }}"
wildcard_secret_name: "{{ vault_domain | replace('.', '-') }}-wildcard-tls"
traefik_namespace: traefik
longhorn_namespace: longhorn-system
headlamp_namespace: headlamp
argocd_namespace: argocd
# Security (H1 fix): cluster-admin / ArgoCD admin are bound to the dedicated
# 'k8s_admins' group (synced FreeIPA -> Authentik), NOT the broad "authentik
# Admins" group. Add only users who need full cluster access to k8s_admins;
# this limits blast radius if Authentik group membership is misconfigured.
argocd_admin_group: "k8s_admins"
headlamp_admin_group: "k8s_admins"
kyverno_namespace: kyverno
descheduler_namespace: descheduler
prometheus_namespace: monitoring
prometheus_storage_size: 20Gi
alertmanager_storage_size: 2Gi

# Pinned addon versions. Most addon versions are auto-resolved to the latest
# upstream release by fetch_versions.yml. Pin one here to freeze it when a newer
# release is broken; set to "" to resume tracking latest.
# argo-cd 9.5.17 (app v3.4.3) is the last release verified working on a
# from-scratch build (2026-06-04). Newer charts bundled a dex image whose
# argocd-dex binary crash-looped (SIGSEGV); we also disable that unused dex in
# argocd.yml, but pinning keeps the build deterministic.
argocd_version_pin: "9.5.17"

# Authentik SSO — set vault_authentik_url in vault before running addons
k8s_manifests_dir: /root/k8s-manifests

authentik_url: "{{ vault_authentik_url }}"
# Internal outpost URL used by Traefik ForwardAuth — communicates directly with
# the proxy outpost over HTTP on port 9000 (no TLS needed for cluster-internal traffic).
authentik_outpost_url: "http://{{ authentik_url | regex_replace('^https?://', '') }}:9000"
# OIDC issuer URLs — set to the application slug configured in Authentik.
# Client IDs are stored in vault as vault_authentik_argocd_client_id
# and vault_authentik_headlamp_client_id.
authentik_argocd_issuer: "{{ authentik_url }}/application/o/argocd/"
authentik_headlamp_issuer: "{{ authentik_url }}/application/o/headlamp/"

