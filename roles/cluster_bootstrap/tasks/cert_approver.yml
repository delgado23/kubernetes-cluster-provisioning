---
- name: Resolve latest kubelet-serving-cert-approver version from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/alex1989hu/kubelet-serving-cert-approver/releases/latest
    return_content: true
    headers:
      Accept: application/vnd.github+json
  register: _cert_approver_release
  delegate_to: localhost
  become: false
  retries: 5
  delay: 10
  until: _cert_approver_release is success

- name: Set cert-approver version fact
  ansible.builtin.set_fact:
    cert_approver_version: "{{ _cert_approver_release.json.tag_name }}"

- name: Install kubelet-serving-cert-approver
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/{{ cert_approver_version }}/deploy/standalone-install.yaml
  environment:
    KUBECONFIG: /root/.kube/config
  register: cert_approver_output
  changed_when: true

- name: Print kubelet-serving-cert-approver install output
  ansible.builtin.debug:
    var: cert_approver_output.stdout_lines

- name: Wait for kubelet-serving-cert-approver to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Available deployment/kubelet-serving-cert-approver
      --namespace kubelet-serving-cert-approver
      --timeout=120s
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false

- name: Apply kubelet-serving-cert-approver default-deny NetworkPolicy
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-deny-ingress
        namespace: kubelet-serving-cert-approver
      spec:
        podSelector: {}
        policyTypes:
          - Ingress
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: true
