---
- name: Check if node is already part of the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Skip join if node is already in the cluster
  ansible.builtin.debug:
    msg: "Node {{ inventory_hostname }} already has kubelet.conf — skipping join."
  when: kubelet_conf.stat.exists

- name: Reset any previous kubeadm state before joining
  ansible.builtin.command: kubeadm reset --force
  when: not kubelet_conf.stat.exists
  changed_when: true

- name: Write etcd encryption config
  ansible.builtin.include_tasks: etcd_encryption.yml
  when: not kubelet_conf.stat.exists

- name: Create audit policy directory
  ansible.builtin.file:
    path: /etc/kubernetes/audit
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: not kubelet_conf.stat.exists

- name: Write kube-apiserver audit policy
  ansible.builtin.template:
    src: audit-policy.yaml.j2
    dest: /etc/kubernetes/audit/policy.yaml
    owner: root
    group: root
    mode: '0600'
  when: not kubelet_conf.stat.exists

- name: Write kube-apiserver authentication config (OIDC + anonymous on health only)
  ansible.builtin.template:
    src: apiserver-auth-config.yaml.j2
    dest: /etc/kubernetes/apiserver-auth.yaml
    owner: root
    group: root
    mode: '0600'
  when: not kubelet_conf.stat.exists

- name: Create audit log directory
  ansible.builtin.file:
    path: /var/log/kubernetes
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: not kubelet_conf.stat.exists

- name: Upload control plane certificates and capture fresh key
  ansible.builtin.shell: |
    TMPKUBE=$(mktemp)
    sed "s|https://[^:]*:6443|https://127.0.0.1:6443|" /etc/kubernetes/admin.conf > "$TMPKUBE"
    KUBECONFIG="$TMPKUBE" kubeadm init phase upload-certs --upload-certs --config /etc/kubernetes/kubeadm-config.yml
    rm -f "$TMPKUBE"
  delegate_to: >-
    {{
      groups['foreman_almalinux10_kubernetescontrolplanenode']
      | map('extract', hostvars)
      | selectattr('foreman_params.k8s_role', 'equalto', 'primary')
      | selectattr('foreman_params.cluster_env', 'equalto', foreman_params.cluster_env)
      | map(attribute='inventory_hostname')
      | first
    }}
  register: upload_certs_output
  changed_when: true
  no_log: "{{ 'debug' not in ansible_run_tags }}"
  when: not kubelet_conf.stat.exists

- name: Extract certificate key from upload output
  ansible.builtin.set_fact:
    cp_certificate_key: "{{ upload_certs_output.stdout_lines | last | trim }}"
  no_log: "{{ 'debug' not in ansible_run_tags }}"
  when: not kubelet_conf.stat.exists

- name: Generate fresh join command from primary control plane
  ansible.builtin.shell: |
    VIP=$(awk '/virtual_ipaddress/{getline; print $1}' /etc/keepalived/keepalived.conf | tr -d ' ')
    TMPKUBE=$(mktemp)
    sed "s|https://[^:]*:6443|https://127.0.0.1:6443|" /etc/kubernetes/admin.conf > "$TMPKUBE"
    OUTPUT=$(kubeadm token create --print-join-command --kubeconfig "$TMPKUBE")
    rm -f "$TMPKUBE"
    echo "$OUTPUT" | sed "s|[a-zA-Z0-9._-]*:6443|${VIP}:6443|"
  delegate_to: >-
    {{
      groups['foreman_almalinux10_kubernetescontrolplanenode']
      | map('extract', hostvars)
      | selectattr('foreman_params.k8s_role', 'equalto', 'primary')
      | selectattr('foreman_params.cluster_env', 'equalto', foreman_params.cluster_env)
      | map(attribute='inventory_hostname')
      | first
    }}
  register: join_cmd_raw
  changed_when: true
  no_log: "{{ 'debug' not in ansible_run_tags }}"
  when: not kubelet_conf.stat.exists

- name: Extract token from join command
  ansible.builtin.set_fact:
    _bootstrap_token: "{{ join_cmd_raw.stdout | regex_search('--token\\s+(\\S+)', '\\1') | first }}"
  no_log: "{{ 'debug' not in ansible_run_tags }}"
  when: not kubelet_conf.stat.exists

- name: Fetch discovery kubeconfig from primary control plane
  ansible.builtin.fetch:
    src: /etc/kubernetes/kubeadm-discovery.yaml
    dest: /tmp/kubeadm-discovery-{{ cluster_env }}.yaml
    flat: true
  delegate_to: >-
    {{
      groups['foreman_almalinux10_kubernetescontrolplanenode']
      | map('extract', hostvars)
      | selectattr('foreman_params.k8s_role', 'equalto', 'primary')
      | selectattr('foreman_params.cluster_env', 'equalto', foreman_params.cluster_env)
      | map(attribute='inventory_hostname')
      | first
    }}
  when: not kubelet_conf.stat.exists

- name: Copy discovery kubeconfig to secondary CP
  ansible.builtin.copy:
    src: /tmp/kubeadm-discovery-{{ cluster_env }}.yaml
    dest: /etc/kubernetes/kubeadm-discovery.yaml
    owner: root
    group: root
    mode: '0600'
  when: not kubelet_conf.stat.exists

- name: Build control plane join command (file-based discovery bypasses anonymous-auth restriction)
  ansible.builtin.set_fact:
    kubeadm_cp_join_command: >-
      kubeadm join
      --discovery-file /etc/kubernetes/kubeadm-discovery.yaml
      --token {{ _bootstrap_token }}
      --control-plane
      --certificate-key {{ cp_certificate_key }}
  no_log: "{{ 'debug' not in ansible_run_tags }}"
  when: not kubelet_conf.stat.exists

- name: Create kubeadm patches directory
  ansible.builtin.file:
    path: /etc/kubernetes/kubeadm-patches
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: not kubelet_conf.stat.exists

- name: Write apiserver liveness probe patch
  ansible.builtin.copy:
    dest: /etc/kubernetes/kubeadm-patches/kube-apiserver+strategic.yaml
    owner: root
    group: root
    mode: '0600'
    content: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: kube-apiserver
        namespace: kube-system
      spec:
        containers:
        - name: kube-apiserver
          livenessProbe:
            failureThreshold: 40
  when: not kubelet_conf.stat.exists

- name: Wait for kube-apiserver to be reachable before joining
  ansible.builtin.wait_for:
    host: "{{ k8s_api_endpoint_ip }}"
    port: 6443
    timeout: 120
    delay: 5
  when: not kubelet_conf.stat.exists

- name: Join cluster as control plane (with one retry on apiserver disruption)
  when: not kubelet_conf.stat.exists
  block:
    - name: Join cluster as control plane
      ansible.builtin.command:
        cmd: "{{ kubeadm_cp_join_command }} --patches /etc/kubernetes/kubeadm-patches"
      register: join_output
      changed_when: true
      no_log: "{{ 'debug' not in ansible_run_tags }}"

    - name: Print join output
      ansible.builtin.debug:
        var: join_output.stdout_lines
  rescue:
    # The primary apiserver briefly restarts during etcd leader election when
    # this node adds itself as a new etcd member.  Reset, wait for recovery,
    # refresh credentials, and retry once.
    - name: Reset kubeadm state after failed join
      ansible.builtin.command: kubeadm reset --force
      changed_when: true

    - name: Wait for primary apiserver to recover
      ansible.builtin.wait_for:
        host: "{{ k8s_api_endpoint_ip }}"
        port: 6443
        timeout: 300
        delay: 30

    - name: Re-upload control plane certificates for retry
      ansible.builtin.shell: |
        TMPKUBE=$(mktemp)
        sed "s|https://[^:]*:6443|https://127.0.0.1:6443|" /etc/kubernetes/admin.conf > "$TMPKUBE"
        KUBECONFIG="$TMPKUBE" kubeadm init phase upload-certs --upload-certs --config /etc/kubernetes/kubeadm-config.yml
        rm -f "$TMPKUBE"
      delegate_to: >-
        {{
          groups['foreman_almalinux10_kubernetescontrolplanenode']
          | map('extract', hostvars)
          | selectattr('foreman_params.k8s_role', 'equalto', 'primary')
          | selectattr('foreman_params.cluster_env', 'equalto', foreman_params.cluster_env)
          | map(attribute='inventory_hostname')
          | first
        }}
      register: _retry_upload_certs_output
      changed_when: true
      no_log: "{{ 'debug' not in ansible_run_tags }}"

    - name: Extract retry certificate key
      ansible.builtin.set_fact:
        cp_certificate_key: "{{ _retry_upload_certs_output.stdout_lines | last | trim }}"
      no_log: "{{ 'debug' not in ansible_run_tags }}"

    - name: Generate fresh join command for retry
      ansible.builtin.shell: |
        VIP=$(awk '/virtual_ipaddress/{getline; print $1}' /etc/keepalived/keepalived.conf | tr -d ' ')
        TMPKUBE=$(mktemp)
        sed "s|https://[^:]*:6443|https://127.0.0.1:6443|" /etc/kubernetes/admin.conf > "$TMPKUBE"
        OUTPUT=$(kubeadm token create --print-join-command --kubeconfig "$TMPKUBE")
        rm -f "$TMPKUBE"
        echo "$OUTPUT" | sed "s|[a-zA-Z0-9._-]*:6443|${VIP}:6443|"
      delegate_to: >-
        {{
          groups['foreman_almalinux10_kubernetescontrolplanenode']
          | map('extract', hostvars)
          | selectattr('foreman_params.k8s_role', 'equalto', 'primary')
          | selectattr('foreman_params.cluster_env', 'equalto', foreman_params.cluster_env)
          | map(attribute='inventory_hostname')
          | first
        }}
      register: _retry_join_cmd_raw
      changed_when: true
      no_log: "{{ 'debug' not in ansible_run_tags }}"

    - name: Build retry join command
      ansible.builtin.set_fact:
        kubeadm_cp_join_command: >-
          kubeadm join
          --discovery-file /etc/kubernetes/kubeadm-discovery.yaml
          --token {{ _retry_join_cmd_raw.stdout | regex_search('--token\s+(\S+)', '\1') | first }}
          --control-plane
          --certificate-key {{ cp_certificate_key }}
      no_log: "{{ 'debug' not in ansible_run_tags }}"

    - name: Retry join cluster as control plane
      ansible.builtin.command:
        cmd: "{{ kubeadm_cp_join_command }} --patches /etc/kubernetes/kubeadm-patches"
      register: join_output
      changed_when: true
      no_log: "{{ 'debug' not in ansible_run_tags }}"

- name: Set up kubeconfig for root
  ansible.builtin.shell: |
    mkdir -p /root/.kube
    cp /etc/kubernetes/admin.conf /root/.kube/config
    chown root:root /root/.kube/config
    chmod 0600 /root/.kube/config
  changed_when: true
  when: not kubelet_conf.stat.exists

- name: Remove discovery kubeconfig after successful join (held cluster-admin creds)
  ansible.builtin.file:
    path: /etc/kubernetes/kubeadm-discovery.yaml
    state: absent
  when: not kubelet_conf.stat.exists

- name: Wait for secondary control plane to be ready
  ansible.builtin.command:
    cmd: "kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=120s"
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  when: not kubelet_conf.stat.exists

- name: Create etcd system group (CIS 1.1.12)
  ansible.builtin.group:
    name: etcd
    system: true
    state: present

- name: Create etcd system user (CIS 1.1.12)
  ansible.builtin.user:
    name: etcd
    group: etcd
    system: true
    shell: /sbin/nologin
    home: /var/lib/etcd
    create_home: false
    state: present

- name: Set etcd data directory ownership (CIS 1.1.12)
  ansible.builtin.file:
    path: /var/lib/etcd
    owner: etcd
    group: etcd
    recurse: true

- name: Set kubelet config file permissions (CIS 4.1.9)
  ansible.builtin.file:
    path: /var/lib/kubelet/config.yaml
    mode: "0600"
