---
- name: Create etcd encryption config directory
  ansible.builtin.file:
    path: /etc/kubernetes/enc
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Write etcd EncryptionConfiguration
  ansible.builtin.copy:
    dest: /etc/kubernetes/enc/enc.yaml
    owner: root
    group: root
    mode: "0600"
    content: |
      apiVersion: apiserver.config.k8s.io/v1
      kind: EncryptionConfiguration
      resources:
        - resources:
            - secrets
          providers:
            - aescbc:
                keys:
                  - name: key1
                    secret: {{ vault_etcd_encryption_key }}
            - identity: {}
  no_log: true
