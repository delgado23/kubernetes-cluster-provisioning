---
- name: Deploy kubectl bash completion to profile.d
  ansible.builtin.copy:
    dest: /etc/profile.d/kubectl_completion.sh
    mode: "0644"
    content: |
      case ":${PATH}:" in
        *":/usr/local/bin:"*) ;;
        *) export PATH="/usr/local/bin:${PATH}" ;;
      esac

      if command -v kubectl &>/dev/null; then
        source <(kubectl completion bash)
      fi

- name: Resolve latest Helm version from GitHub API
  ansible.builtin.uri:
    url: https://api.github.com/repos/helm/helm/releases/latest
    return_content: true
    headers:
      Accept: application/vnd.github+json
  register: _helm_release_info
  retries: 5
  delay: 10
  until: _helm_release_info is success

- name: Set Helm version fact
  ansible.builtin.set_fact:
    helm_version: "{{ _helm_release_info.json.tag_name }}"

- name: Check installed Helm version
  ansible.builtin.command: helm version --short
  register: _helm_check
  changed_when: false
  failed_when: false
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

- name: Install Helm
  when: _helm_check.rc != 0 or helm_version not in _helm_check.stdout
  block:
    - name: Download Helm tarball checksum
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz.sha256"
        dest: "/tmp/helm-{{ helm_version }}.sha256"
        mode: "0600"
        force: true

    - name: Read Helm checksum
      ansible.builtin.slurp:
        src: "/tmp/helm-{{ helm_version }}.sha256"
      register: _helm_sha256

    - name: Download Helm tarball
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
        mode: "0600"
        checksum: "sha256:{{ (_helm_sha256.content | b64decode).split()[0] }}"
        force: true

    - name: Extract Helm binary
      ansible.builtin.unarchive:
        src: "/tmp/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        extra_opts:
          - --strip-components=1
          - linux-amd64/helm
        mode: "0755"

    - name: Print installed Helm version
      ansible.builtin.debug:
        msg: "Installed Helm {{ helm_version }}"

- name: Configure Helm bash completion
  ansible.builtin.shell: helm completion bash > /etc/bash_completion.d/helm
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
  changed_when: false

- name: Resolve latest k9s version from GitHub API
  ansible.builtin.uri:
    url: https://api.github.com/repos/derailed/k9s/releases/latest
    return_content: true
    headers:
      Accept: application/vnd.github+json
  register: k9s_release_info
  retries: 5
  delay: 10
  until: k9s_release_info is success

- name: Set k9s version fact
  ansible.builtin.set_fact:
    k9s_version: "{{ k9s_release_info.json.tag_name }}"

- name: Check installed k9s version
  ansible.builtin.command: k9s version --short
  register: _k9s_installed
  changed_when: false
  failed_when: false

# k9s is installed from the release tarball into /usr/local/bin (like Helm above),
# not the RPM via dnf — dnf fails on image-mode hosts (pkg_mgr=atomic_container,
# immutable /usr), and /usr/local is a writable symlink to /var/usrlocal in the
# bootc image. This works on both package- and image-mode hosts.
- name: Install k9s
  when: _k9s_installed.rc != 0 or k9s_version not in _k9s_installed.stdout
  block:
    - name: Download k9s checksums
      ansible.builtin.get_url:
        url: "https://github.com/derailed/k9s/releases/download/{{ k9s_version }}/checksums.sha256"
        dest: "/tmp/k9s_{{ k9s_version }}_checksums.sha256"
        mode: "0600"
        force: true

    - name: Extract k9s tarball checksum
      ansible.builtin.shell:
        cmd: "grep 'k9s_Linux_amd64.tar.gz$' /tmp/k9s_{{ k9s_version }}_checksums.sha256 | awk '{print $1}'"
      register: _k9s_tgz_checksum
      changed_when: false

    - name: Download k9s tarball
      ansible.builtin.get_url:
        url: "https://github.com/derailed/k9s/releases/download/{{ k9s_version }}/k9s_Linux_amd64.tar.gz"
        dest: "/tmp/k9s_{{ k9s_version }}_Linux_amd64.tar.gz"
        mode: "0644"
        checksum: "sha256:{{ _k9s_tgz_checksum.stdout }}"

    - name: Extract k9s binary to /usr/local/bin
      ansible.builtin.unarchive:
        src: "/tmp/k9s_{{ k9s_version }}_Linux_amd64.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        extra_opts:
          - k9s
        mode: "0755"

- name: Configure k9s KUBECONFIG for root in bash profile
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    line: export KUBECONFIG=/root/.kube/config
    regexp: '^export KUBECONFIG='
    state: present
    create: true
    mode: "0644"
