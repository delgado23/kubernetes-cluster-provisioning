---
# kube-apiserver OIDC (Headlamp) and the anonymous-auth restriction are
# configured through a structured AuthenticationConfiguration file that is
# written and mounted at init/join time (see kubeadm-config.yml.j2 and the
# apiserver-auth-config.yaml.j2 template).  Anonymous access is enabled ONLY
# for the health endpoints there — a bare --anonymous-auth=false crash-loops
# the apiserver because the kubelet's /livez & /readyz probes get 401.
#
# This task reconciles that file on every control plane so re-running the
# addons phase picks up any OIDC issuer/client changes.  The apiserver
# hot-reloads --authentication-config, so no restart is normally required.
- name: Ensure kube-apiserver authentication config is present and current
  ansible.builtin.template:
    src: apiserver-auth-config.yaml.j2
    dest: /etc/kubernetes/apiserver-auth.yaml
    owner: root
    group: root
    mode: '0600'
  register: _apiserver_auth_cfg

- name: Wait for kube-apiserver to stay reachable after auth config change
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 120
    delay: 5
  when: _apiserver_auth_cfg.changed
