---
- name: Normalise node count variables to integers
  ansible.builtin.set_fact:
    controlplane_node_count: "{{ controlplane_node_count | int }}"
    worker_node_count: "{{ worker_node_count | int }}"

- name: Query Foreman for existing control plane nodes
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hosts?search=name+%7E+%22{{ (controlplane_name_prefix + '-') | urlencode }}%22&per_page=250"
    method: GET
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    headers:
      Accept: application/json
  register: _existing_cps_result

- name: Clamp controlplane_node_count to remaining slots (max 3 total)
  ansible.builtin.set_fact:
    _existing_cp_count: "{{ _existing_cps_result.json.results | length }}"
    controlplane_node_count: "{{ [controlplane_node_count | int, [3 - (_existing_cps_result.json.results | length), 0] | max] | min }}"

- name: Fail if control plane node limit already reached
  ansible.builtin.fail:
    msg: >-
      Cannot provision control plane nodes: {{ _existing_cp_count }} of 3 already exist in Foreman.
      Set controlplane_node_count=0 to add workers only, or wipe the cluster first.
  when: _existing_cp_count | int >= 3 and controlplane_node_count | int > 0

- name: Generate control plane node definitions
  ansible.builtin.set_fact:
    _generated_cps: >-
      {{ _generated_cps | default([]) + [{'name': controlplane_name_prefix + '-' + '%02d' | format(idx + 1), 'hostgroup': controlplane_hostgroup, 'host_parameters': item.host_parameters}] }}
  loop: "{{ controlplane_configs[: controlplane_node_count | int] }}"
  loop_control:
    index_var: idx

- name: Query Foreman for existing worker nodes
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hosts?search=name+%7E+%22{{ (worker_name_prefix + '-') | urlencode }}%22&per_page=250"
    method: GET
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    headers:
      Accept: application/json
  register: _existing_workers_result

- name: Determine existing worker indices
  ansible.builtin.set_fact:
    _existing_indices: >-
      {{
        (_existing_workers_result.json.results
          | map(attribute='name')
          | select('match', '^' + worker_name_prefix + '-\d+\.')
          | map('regex_replace', '^' + worker_name_prefix + '-(\d+)\..*', '\1')
          | map('int')
          | list) or []
      }}

- name: Determine new worker indices (fill gaps first, then extend)
  ansible.builtin.set_fact:
    _new_worker_indices: >-
      {{
        (
          range(1, (_existing_indices | max | default(0)) + (worker_node_count | int) + 2)
          | list
          | difference(_existing_indices)
          | sort
        )[:worker_node_count | int]
      }}

- name: Report worker indices to be provisioned
  ansible.builtin.debug:
    msg: >-
      Provisioning {{ worker_node_count }} worker(s):
      {{ _new_worker_indices | map('string') | map('zfill', 2)
         | map('regex_replace', '^', worker_name_prefix + '-') | list | join(', ') }}

- name: Generate worker node definitions
  ansible.builtin.set_fact:
    _generated_workers: >-
      {{ _generated_workers | default([]) + [{'name': worker_name_prefix + '-' + '%02d' | format(item), 'hostgroup': worker_hostgroup}] }}
  loop: "{{ _new_worker_indices }}"

- name: Build vms list
  ansible.builtin.set_fact:
    vms: "{{ (_generated_cps | default([])) + (_generated_workers | default([])) }}"

- name: Validate VM definitions
  ansible.builtin.assert:
    that:
      - item.name is defined and item.name | length > 0
      - item.hostgroup is defined and item.hostgroup | length > 0
    fail_msg: >-
      VM entry is missing required fields (name or hostgroup).
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"

- name: Look up Foreman hostgroup IDs
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hostgroups?search=title+%3D+%22{{ item | urlencode }}%22&per_page=1"
    method: GET
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    return_content: true
    headers:
      Accept: application/json
  register: hostgroup_results
  loop: "{{ vms | map(attribute='hostgroup') | unique | list }}"
  loop_control:
    label: "{{ item }}"

- name: Build hostgroup name-to-id map
  ansible.builtin.set_fact:
    hostgroup_id_map: >-
      {{
        hostgroup_id_map | default({}) | combine({
          item.item: { 'id': item.json.results[0].id | string }
        })
      }}
  loop: "{{ hostgroup_results.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.json.results | length > 0

- name: Fetch full hostgroup details (location and organization)
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hostgroups/{{ hostgroup_id_map[item].id }}"
    method: GET
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    return_content: true
    headers:
      Accept: application/json
  register: hostgroup_details
  loop: "{{ vms | map(attribute='hostgroup') | unique | list }}"
  loop_control:
    label: "{{ item }}"

- name: Enrich hostgroup map with location_id and organization_id
  ansible.builtin.set_fact:
    hostgroup_id_map: >-
      {{
        hostgroup_id_map | combine({
          item.item: hostgroup_id_map[item.item] | combine({
            'location_id':     item.json.locations[0].id | string,
            'organization_id': item.json.organizations[0].id | string
          })
        })
      }}
  loop: "{{ hostgroup_details.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.json.locations | length > 0 and item.json.organizations | length > 0

- name: Fail if any hostgroup was not found in Foreman
  ansible.builtin.fail:
    msg: "Hostgroup '{{ item.hostgroup }}' not found in Foreman."
  when: item.hostgroup not in (hostgroup_id_map | default({}))
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"

- name: Check existing Foreman hosts
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hosts/{{ item.name }}.{{ foreman_domain }}"
    method: GET
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    status_code: [200, 404]
    headers:
      Content-Type: application/json
      Accept: application/json
  register: existing_hosts
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create VM in Foreman / Proxmox
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hosts"
    method: POST
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    body_format: json
    status_code: 201
    headers:
      Content-Type: application/json
      Accept: application/json
    body:
      host:
        name: "{{ item.0.name }}"
        hostgroup_id: "{{ hostgroup_id_map[item.0.hostgroup].id }}"
        location_id: "{{ hostgroup_id_map[item.0.hostgroup].location_id }}"
        organization_id: "{{ hostgroup_id_map[item.0.hostgroup].organization_id }}"
        compute_resource_id: "{{ foreman_compute_resource_id }}"
        compute_profile_id: >-
          {{ foreman_compute_profile_controlplane
             if 'Controlplane' in item.0.hostgroup
             else foreman_compute_profile_worker }}
        build: true
        managed: true
  loop: "{{ vms | zip(existing_hosts.results) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  when: item.1.status == 404
  register: created_hosts

- name: Set host parameters in Foreman
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hosts/{{ item.0.name }}.{{ foreman_domain }}/parameters"
    method: POST
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    body_format: json
    status_code: [201, 422]
    headers:
      Content-Type: application/json
      Accept: application/json
    body:
      parameter:
        name: "{{ item.1.name }}"
        value: "{{ item.1.value | string }}"
  loop: >-
    {{
      vms
      | selectattr('host_parameters', 'defined')
      | subelements('host_parameters')
    }}
  loop_control:
    label: "{{ item.0.name }} — {{ item.1.name }}"

- name: Report skipped VMs (already existed in Foreman)
  ansible.builtin.debug:
    msg: "SKIPPED — host already exists in Foreman: {{ item.0.name }}"
  loop: "{{ vms | zip(existing_hosts.results) | list }}"
  loop_control:
    label: "{{ item.0.name }}"
  when: item.1.status == 200

- name: Report created VMs
  ansible.builtin.debug:
    msg: >-
      CREATED — {{ item.item.0.name }}
      (Group: {{ item.item.0.hostgroup }})
      (Compute profile: {{ 'Controlplane (id=8)' if 'Controlplane' in item.item.0.hostgroup else 'Worker (id=6)' }})
      Foreman ID: {{ item.json.id | default('unknown') }}
  loop: "{{ created_hosts.results }}"
  loop_control:
    label: "{{ item.item.0.name }}"
  when:
    - created_hosts is defined
    - item.skipped is not defined or not item.skipped

- name: Power on VMs
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hosts/{{ item.name }}.{{ foreman_domain }}/power"
    method: PUT
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    body_format: json
    status_code: [200, 201]
    headers:
      Content-Type: application/json
      Accept: application/json
    body:
      power_action: "start"
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"
  register: power_results

- name: Report power-on results
  ansible.builtin.debug:
    msg: "POWERED ON — {{ item.item.name }}: {{ item.json.power | default('started') }}"
  loop: "{{ power_results.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.skipped is not defined or not item.skipped

- name: Add VMs to in-memory k8s_nodes group
  ansible.builtin.add_host:
    name: "{{ item.name }}.{{ foreman_domain }}"
    groups: k8s_nodes
    foreman_hostgroup: "{{ item.hostgroup }}"
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false

- name: Wait for hosts to finish building (build flag clears)
  ansible.builtin.uri:
    url: "{{ foreman_url }}/api/hosts/{{ item.name }}.{{ foreman_domain }}"
    method: GET
    user: "{{ foreman_user }}"
    password: "{{ foreman_password }}"
    force_basic_auth: true
    validate_certs: "{{ foreman_validate_certs }}"
    headers:
      Accept: application/json
    return_content: true
  register: build_status
  until: build_status.json.build == false
  retries: "{{ build_wait_retries }}"
  delay: "{{ build_wait_delay_seconds }}"
  loop: "{{ vms }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - wait_for_build | default(true)
    - created_hosts is defined

