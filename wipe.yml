---
# =============================================================================
# wipe.yml — Remove All Cluster Nodes from Foreman and FreeIPA
# =============================================================================
# Queries Foreman for all hosts whose names match the configured CP and
# worker prefixes, then removes every found host from Foreman and FreeIPA.
# Safe to re-run — handles absent hosts.  No count variables required.
#
# Usage:
#   ansible-playbook wipe.yml
# =============================================================================

- name: Remove cluster nodes from Foreman and FreeIPA
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/vault.yml
    - vars/vms.yml
    - vars/foreman.yml
    - vars/freeipa.yml
  pre_tasks:
    - name: Query Foreman for existing control plane nodes
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts?search=name+%7E+%22{{ (controlplane_name_prefix + '-') | urlencode }}%22&per_page=250"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        headers:
          Accept: application/json
      register: _existing_cps_result

    - name: Query Foreman for existing worker nodes
      ansible.builtin.uri:
        url: "{{ foreman_url }}/api/hosts?search=name+%7E+%22{{ (worker_name_prefix + '-') | urlencode }}%22&per_page=250"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: "{{ foreman_validate_certs }}"
        headers:
          Accept: application/json
      register: _existing_workers_result

    - name: Initialise vms list
      ansible.builtin.set_fact:
        vms: []

    - name: Build vms list from Foreman query results
      ansible.builtin.set_fact:
        vms: "{{ vms + [{'name': item | regex_replace('\\.' + foreman_domain + '$', '')}] }}"
      loop: >-
        {{
          (_existing_cps_result.json.results + _existing_workers_result.json.results)
          | map(attribute='name') | list
        }}

    - name: Report nodes to be wiped
      ansible.builtin.debug:
        msg: "Will remove {{ vms | length }} node(s): {{ vms | map(attribute='name') | join(', ') }}"

  roles:
    - role: cluster_cleanup

- name: Disable autoscale schedule for {{ cluster_env }}
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/vault.yml
    - vars/awx.yml
    - vars/vms.yml
  tasks:
    - name: Find autoscale schedules for {{ cluster_env }}
      ansible.builtin.uri:
        url: "{{ awx_url }}/api/v2/schedules/?name__icontains={{ cluster_env }}&page_size=20"
        method: GET
        headers:
          Authorization: "Bearer {{ awx_token }}"
        validate_certs: true
        return_content: true
      register: _schedules

    - name: Disable autoscale schedules for {{ cluster_env }}
      ansible.builtin.uri:
        url: "{{ awx_url }}/api/v2/schedules/{{ item.id }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ awx_token }}"
        body_format: json
        body:
          enabled: false
        validate_certs: true
        status_code: [200]
      loop: "{{ _schedules.json.results | selectattr('name', 'search', cluster_env) | list }}"
      loop_control:
        label: "{{ item.name }}"
