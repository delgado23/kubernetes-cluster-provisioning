---
- name: Kubernetes Node Prerequisites Setup
  hosts: all
  become: true
  strategy: free
  tasks:
    # -------------------------------------------------------------------------
    # Swap
    # -------------------------------------------------------------------------
    - name: Disable swap immediately
      command: swapoff -a
      changed_when: false

    - name: Disable swap permanently in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '#\1'

    # -------------------------------------------------------------------------
    # Kernel modules
    # -------------------------------------------------------------------------
    - name: Configure kernel modules to load at boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        owner: root
        group: root
        mode: '0644'

    - name: Load overlay kernel module
      modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter kernel module
      modprobe:
        name: br_netfilter
        state: present

    # -------------------------------------------------------------------------
    # sysctl
    # -------------------------------------------------------------------------
    - name: Configure sysctl parameters for Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        owner: root
        group: root
        mode: '0644'

    - name: Apply sysctl parameters
      command: sysctl --system
      changed_when: false

    # -------------------------------------------------------------------------
    # containerd
    # -------------------------------------------------------------------------
    - name: Install containerd
      dnf:
        name: containerd
        state: present

    - name: Ensure /etc/containerd directory exists
      file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy containerd config.toml from template
      copy:
        src: files/containerd/config.toml
        dest: /etc/containerd/config.toml
        owner: root
        group: root
        mode: '0644'
      notify: Restart containerd

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: true
        state: started

    # -------------------------------------------------------------------------
    # Kubernetes components
    # -------------------------------------------------------------------------
    - name: Install Kubernetes components
      dnf:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        disable_excludes: kubernetes

    - name: Enable and start kubelet
      systemd:
        name: kubelet
        enabled: true
        state: started

    # -------------------------------------------------------------------------
    # Firewall rules — common to all nodes
    # -------------------------------------------------------------------------
    - name: Open Flannel VXLAN port
      firewalld:
        port: 8472/udp
        permanent: true
        state: enabled
        immediate: true

    - name: Trust pod network CIDR
      firewalld:
        zone: trusted
        source: "{{ foreman_params.k8s_pod_cidr }}"
        permanent: true
        state: enabled
        immediate: true

    - name: Trust service network CIDR
      firewalld:
        zone: trusted
        source: "{{ foreman_params.k8s_service_cidr }}"
        permanent: true
        state: enabled
        immediate: true

    - name: Enable masquerade
      firewalld:
        masquerade: true
        permanent: true
        state: enabled
        immediate: true

  # ---------------------------------------------------------------------------
  # Handlers
  # ---------------------------------------------------------------------------
  handlers:
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted

# =============================================================================
# Controlplane setup
# =============================================================================
- name: Configure controlplane firewall rules
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  strategy: free
  vars_files:
    - vars/vault.yml
  tasks:
    - name: Open Kubernetes API Server port (6443/tcp)
      firewalld:
        port: 6443/tcp
        permanent: true
        state: enabled
        immediate: true

    - name: Open HAProxy port
      firewalld:
        port: "{{ foreman_params.haproxy_port }}/tcp"
        permanent: true
        state: enabled
        immediate: true

    - name: Open etcd server client API ports (2379-2380/tcp)
      firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - 2379
        - 2380

    - name: Open Kubelet API port (10250/tcp)
      firewalld:
        port: 10250/tcp
        permanent: true
        state: enabled
        immediate: true

    - name: Open kube-scheduler port (10259/tcp)
      firewalld:
        port: 10259/tcp
        permanent: true
        state: enabled
        immediate: true

    - name: Open kube-controller-manager port (10257/tcp)
      firewalld:
        port: 10257/tcp
        permanent: true
        state: enabled
        immediate: true

    - name: Allow VRRP protocol for keepalived
      firewalld:
        rich_rule: 'rule protocol value="vrrp" accept'
        permanent: true
        state: enabled
        immediate: true

    - name: Reload firewalld
      command: firewall-cmd --reload
      changed_when: false

    - name: Install controlplane packages
      dnf:
        name:
          - keepalived
          - haproxy
        state: present

    - name: Deploy HAProxy k8s config
      template:
        src: templates/k8s.cfg.j2
        dest: /etc/haproxy/conf.d/k8s.cfg
        owner: root
        group: root
        mode: '0644'
      notify:
        - Validate haproxy config
        - Restart haproxy

    - name: Deploy keepalived config
      template:
        src: templates/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart keepalived

    - name: Allow HAProxy to connect to any port (SELinux)
      ansible.posix.seboolean:
        name: haproxy_connect_any
        state: true
        persistent: true

    - name: Enable and start HAProxy
      systemd:
        name: haproxy
        enabled: true
        state: started

    - name: Enable and start keepalived
      systemd:
        name: keepalived
        enabled: true
        state: started

  handlers:
    - name: Validate haproxy config
      command: haproxy -f /etc/haproxy/haproxy.cfg -f /etc/haproxy/conf.d/k8s.cfg -c
      changed_when: false

    - name: Restart haproxy
      systemd:
        name: haproxy
        state: restarted

    - name: Restart keepalived
      systemd:
        name: keepalived
        state: restarted

# =============================================================================
# Worker node firewall rules and Longhorn disk setup
# =============================================================================
- name: Configure worker node firewall rules and Longhorn storage
  hosts: foreman_almalinux10_kubernetesworkernode
  become: true
  strategy: free
  tasks:
    # -------------------------------------------------------------------------
    # Firewall
    # -------------------------------------------------------------------------
    - name: Open Kubelet API port (10250/tcp)
      firewalld:
        port: 10250/tcp
        permanent: true
        state: enabled
        immediate: true

    - name: Open NodePort Services range (30000-32767/tcp)
      firewalld:
        port: 30000-32767/tcp
        permanent: true
        state: enabled
        immediate: true

    - name: Reload firewalld
      command: firewall-cmd --reload
      changed_when: false

    # -------------------------------------------------------------------------
    # Longhorn disk — LVM setup on the largest non-root disk
    #
    # Strategy: run lsblk with -b (raw bytes) so sizes are directly comparable
    # as integers. Exclude the root disk, then sort by size and take the last
    # (largest) entry. Using bytes avoids any ambiguity from human-readable
    # suffixes (G vs T). The debug task prints the size in GiB for confirmation.
    # This is idempotent: if the VG already exists all LVM tasks are skipped.
    # -------------------------------------------------------------------------
    - name: Install LVM2
      dnf:
        name: lvm2
        state: present

    - name: Gather block device info with sizes in bytes (lsblk JSON)
      command: lsblk -J -b -o NAME,TYPE,SIZE,MOUNTPOINT
      register: lsblk_output
      changed_when: false

    - name: Parse lsblk JSON
      set_fact:
        lsblk_data: "{{ lsblk_output.stdout | from_json }}"

    - name: Identify root disk name
      # Walk every top-level disk and check if any child (partition) or
      # grandchild (e.g. LVM LV on a partition) has mountpoint '/'.
      set_fact:
        root_disk_name: >-
          {{
            lsblk_data.blockdevices
            | selectattr('type', 'equalto', 'disk')
            | selectattr('children', 'defined')
            | selectattr('children', 'ne', none)
            | json_query("[?children[?mountpoint=='/'] || children[?children[?mountpoint=='/']]]")
            | map(attribute='name')
            | first
          }}

    - name: Build list of non-root disks with their byte sizes
      set_fact:
        data_disks: >-
          {{
            lsblk_data.blockdevices
            | selectattr('type', 'equalto', 'disk')
            | rejectattr('name', 'equalto', root_disk_name)
            | list
          }}

    - name: Fail if no non-root disk is found
      ansible.builtin.fail:
        msg: >-
          No non-root disk found on {{ inventory_hostname }}.
          Root disk: /dev/{{ root_disk_name }}.
          Attach a data disk before running this playbook.
      when: data_disks | length == 0

    - name: Select the largest non-root disk
      # Sort by the 'size' field (raw bytes integer) and take the last element.
      set_fact:
        longhorn_disk_entry: "{{ data_disks | sort(attribute='size') | last }}"

    - name: Set longhorn disk device path
      set_fact:
        longhorn_disk: "/dev/{{ longhorn_disk_entry.name }}"

    - name: Display disk selected for Longhorn
      ansible.builtin.debug:
        msg: >-
          Using {{ longhorn_disk }} for Longhorn LVM on {{ inventory_hostname }}
          ({{ (longhorn_disk_entry.size | int / 1073741824) | round(1) }} GiB)

    - name: Check if volume group 'longhorn' already exists
      command: vgs longhorn
      register: vg_check
      changed_when: false
      failed_when: false

    - name: Create LVM physical volume on longhorn disk
      command: pvcreate "{{ longhorn_disk }}"
      when: vg_check.rc != 0

    - name: Create volume group 'longhorn'
      command: vgcreate longhorn "{{ longhorn_disk }}"
      when: vg_check.rc != 0

    - name: Create logical volume 'data' using 100% of VG free space
      community.general.lvol:
        vg: longhorn
        lv: data
        size: 100%FREE
        state: present

    - name: Check if logical volume is already formatted as XFS
      command: blkid -o value -s TYPE /dev/longhorn/data
      register: lv_fs_type
      changed_when: false
      failed_when: false

    - name: Format logical volume as XFS
      command: mkfs.xfs /dev/longhorn/data
      when: lv_fs_type.stdout.strip() != 'xfs'

    - name: Ensure /var/lib/longhorn mount point exists
      file:
        path: /var/lib/longhorn
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Mount /var/lib/longhorn persistently (fstab + immediate)
      ansible.posix.mount:
        path: /var/lib/longhorn
        src: /dev/longhorn/data
        fstype: xfs
        opts: defaults
        state: mounted

