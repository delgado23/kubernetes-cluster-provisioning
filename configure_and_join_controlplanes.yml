---
# =============================================================================
# Ansible Playbook: Bootstrap Kubernetes Control Plane Nodes
# =============================================================================
# Reads k8s_role from Foreman host parameters to dynamically group nodes into
# primary and secondary control planes, initializes the cluster, joins
# secondary nodes, installs core cluster components, and configures tooling
# (kubectl, Helm, k9s) across all control plane nodes.
# =============================================================================

# -----------------------------------------------------------------------------
# PLAY 1: Group hosts by Foreman k8s_role parameter
# -----------------------------------------------------------------------------
# Reads the k8s_role Foreman parameter from each host and creates dynamic
# groups (k8s_role_primary, k8s_role_secondary) used by the plays that follow.
# -----------------------------------------------------------------------------
- name: Group hosts by k8s_role host variable
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  gather_facts: true
  tasks:
    - name: Group by k8s_role host variable
      ansible.builtin.group_by:
        key: "k8s_role_{{ foreman_params.k8s_role }}"

# -----------------------------------------------------------------------------
# PLAY 2: Bootstrap the primary control plane node
# -----------------------------------------------------------------------------
# Runs kubeadm init, installs the Flannel CNI, and extracts the join
# credentials (token, CA cert hash, certificate key) into host vars so
# secondary nodes can reference them later via hostvars[].
# -----------------------------------------------------------------------------
- name: Initialize primary control plane
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Deploy kubeadm config
      ansible.builtin.template:
        src: templates/kubeadm-config.yml.j2
        dest: /tmp/kubeadm-config.yml
        mode: "0644"

    - name: Run kubeadm init
      ansible.builtin.command:
        cmd: kubeadm init --config /tmp/kubeadm-config.yml --upload-certs
      register: kubeadm_init_output
      changed_when: true

    - name: Print kubeadm init output
      ansible.builtin.debug:
        var: kubeadm_init_output.stdout_lines

    - name: Extract control plane endpoint from kubeadm config
      ansible.builtin.command:
        cmd: >
          awk '/controlPlaneEndpoint:/ {print $2}' /tmp/kubeadm-config.yml
      register: endpoint_output
      changed_when: false

    - name: Set control plane endpoint fact
      ansible.builtin.set_fact:
        kubeadm_controlplaneendpoint: "{{ endpoint_output.stdout | regex_replace(':6443$', '') }}"

    - name: Extract certificate key
      ansible.builtin.set_fact:
        certificate_key: >-
          {{ kubeadm_init_output.stdout
             | regex_search('--certificate-key ([a-f0-9]+)', '\1')
             | first }}

    - name: Extract join token
      ansible.builtin.set_fact:
        join_token: >-
          {{ kubeadm_init_output.stdout
             | regex_search('--token ([a-z0-9]+\.[a-z0-9]+)', '\1')
             | first }}

    - name: Extract discovery token CA cert hash
      ansible.builtin.set_fact:
        discovery_hash: >-
          {{ kubeadm_init_output.stdout
             | regex_search('--discovery-token-ca-cert-hash (sha256:[a-f0-9]+)', '\1')
             | first }}

    - name: Set up kubeconfig for root
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp /etc/kubernetes/admin.conf /root/.kube/config
        chown root:root /root/.kube/config
      changed_when: true

    - name: Install Flannel CNI
      ansible.builtin.command:
        cmd: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /root/.kube/config
      register: flannel_output
      changed_when: true

    - name: Print Flannel install output
      ansible.builtin.debug:
        var: flannel_output.stdout_lines

    - name: Wait for control plane to be ready
      ansible.builtin.command:
        cmd: "kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=120s"
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false


# -----------------------------------------------------------------------------
# PLAY 3: Join secondary control plane nodes one at a time
# -----------------------------------------------------------------------------
# Uses serial: 1 to join nodes sequentially, avoiding etcd membership race
# conditions. Credentials are pulled from the primary node's hostvars.
# -----------------------------------------------------------------------------
- name: Join secondary control planes
  hosts: k8s_role_secondary
  become: true
  gather_facts: false
  serial: 1

  tasks:
    - name: Assert that primary join credentials are available
      ansible.builtin.assert:
        that:
          - hostvars[groups['k8s_role_primary'][0]]['kubeadm_controlplaneendpoint'] is defined
          - hostvars[groups['k8s_role_primary'][0]]['join_token'] is defined
          - hostvars[groups['k8s_role_primary'][0]]['discovery_hash'] is defined
          - hostvars[groups['k8s_role_primary'][0]]['certificate_key'] is defined
        fail_msg: >-
          One or more join credentials are missing from the primary node's hostvars.
          Ensure Play 2 completed successfully before running Play 3.

    - name: Join cluster as control plane
      ansible.builtin.command:
        cmd: >
          kubeadm join {{ hostvars[groups['k8s_role_primary'][0]]['kubeadm_controlplaneendpoint'] }}
          --token {{ hostvars[groups['k8s_role_primary'][0]]['join_token'] }}
          --discovery-token-ca-cert-hash {{ hostvars[groups['k8s_role_primary'][0]]['discovery_hash'] }}
          --control-plane
          --certificate-key {{ hostvars[groups['k8s_role_primary'][0]]['certificate_key'] }}
      register: join_output
      changed_when: true

    - name: Print join output
      ansible.builtin.debug:
        var: join_output.stdout_lines

    - name: Set up kubeconfig for root
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp /etc/kubernetes/admin.conf /root/.kube/config
        chown root:root /root/.kube/config
      changed_when: true

    - name: Wait for secondary control plane to be ready
      ansible.builtin.command:
        cmd: "kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=120s"
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false


# -----------------------------------------------------------------------------
# PLAY 4: Deploy kubelet-serving-cert-approver
# -----------------------------------------------------------------------------
# Installs the controller that automatically approves kubelet serving
# certificate CSRs — required for metrics-server and other components that
# scrape kubelet endpoints over HTTPS. Only needs to run once from the primary.
# -----------------------------------------------------------------------------
- name: Install kubelet-serving-cert-approver
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Install kubelet-serving-cert-approver
      ansible.builtin.command:
        cmd: kubectl apply -f https://git.example.com/example/kubelet-serving-cert-approver/raw/branch/main/deploy/standalone-install.yaml
      environment:
        KUBECONFIG: /root/.kube/config
      register: cert_approver_output
      changed_when: true

    - name: Print kubelet-serving-cert-approver install output
      ansible.builtin.debug:
        var: cert_approver_output.stdout_lines

    - name: Wait for kubelet-serving-cert-approver to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Available deployment/kubelet-serving-cert-approver
          --namespace kubelet-serving-cert-approver
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

# -----------------------------------------------------------------------------
# PLAY 5: Configure kubectl bash completion on all control plane nodes
# -----------------------------------------------------------------------------
# Drops a profile.d script that sources kubectl's bash completion at login,
# and ensures /usr/local/bin is on PATH (where kubeadm installs kubectl).
# -----------------------------------------------------------------------------
- name: Configure kubectl bash completion on all control plane nodes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false

  tasks:
    - name: Ensure bash-completion is installed
      ansible.builtin.dnf:
        name: bash-completion
        state: present

    - name: Deploy kubectl bash completion to profile.d
      ansible.builtin.copy:
        dest: /etc/profile.d/kubectl_completion.sh
        mode: "0644"
        content: |
          # kubectl bash completion
          # Loaded for all interactive bash sessions via /etc/profile.d

          # Ensure /usr/local/bin is in PATH
          case ":${PATH}:" in
            *":/usr/local/bin:"*) ;;
            *) export PATH="/usr/local/bin:${PATH}" ;;
          esac

          if command -v kubectl &>/dev/null; then
            source <(kubectl completion bash)
          fi

# -----------------------------------------------------------------------------
# PLAY 6: Install Helm on all control plane nodes
# -----------------------------------------------------------------------------
# Uses the official get-helm-3 installer script, targeting /usr/local/bin to
# avoid needing sudo at runtime. Also drops a bash_completion.d entry so Helm
# subcommands get tab completion alongside kubectl.
# -----------------------------------------------------------------------------
- name: Install Helm on all control plane nodes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

  tasks:
    - name: Download Helm install script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get-helm-3.sh
        mode: "0700"
        force: true

    - name: Run Helm install script
      ansible.builtin.command:
        cmd: /tmp/get-helm-3.sh
      environment:
        HELM_INSTALL_DIR: /usr/local/bin
        USE_SUDO: "false"
      register: helm_install_output
      changed_when: true

    - name: Print Helm install output
      ansible.builtin.debug:
        var: helm_install_output.stdout_lines

    - name: Verify Helm installation
      ansible.builtin.command:
        cmd: helm version --short
      register: helm_version_output
      changed_when: false

    - name: Print Helm version
      ansible.builtin.debug:
        var: helm_version_output.stdout_lines

    - name: Configure Helm bash completion
      ansible.builtin.shell: |
        helm completion bash > /etc/bash_completion.d/helm
      changed_when: true


# -----------------------------------------------------------------------------
# PLAY 7: Install k9s on all control plane nodes
# -----------------------------------------------------------------------------
# Queries the GitHub Releases API to resolve the latest version dynamically,
# then downloads and installs the RPM. Also exports KUBECONFIG in root's
# .bashrc so k9s (and kubectl) work immediately after login without extra setup.
# -----------------------------------------------------------------------------
- name: Install k9s on all control plane nodes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: false

  tasks:
    - name: Resolve latest k9s version from GitHub API
      ansible.builtin.uri:
        url: https://api.github.com/repos/derailed/k9s/releases/latest
        return_content: true
        headers:
          Accept: application/vnd.github+json
      register: k9s_release_info

    - name: Set k9s version fact
      ansible.builtin.set_fact:
        k9s_version: "{{ k9s_release_info.json.tag_name }}"

    - name: Print k9s version to be installed
      ansible.builtin.debug:
        msg: "Installing k9s {{ k9s_version }}"

    - name: Download k9s RPM
      ansible.builtin.get_url:
        url: "https://github.com/derailed/k9s/releases/download/{{ k9s_version }}/k9s_linux_amd64.rpm"
        dest: "/tmp/k9s_linux_amd64.rpm"
        mode: "0644"
        force: true

    - name: Install k9s RPM
      ansible.builtin.dnf:
        name: /tmp/k9s_linux_amd64.rpm
        state: present
        disable_gpg_check: true

    - name: Verify k9s installation
      ansible.builtin.command:
        cmd: k9s version --short
      register: k9s_version_output
      changed_when: false

    - name: Print k9s version
      ansible.builtin.debug:
        var: k9s_version_output.stdout_lines

    - name: Configure k9s KUBECONFIG for root in bash profile
      ansible.builtin.lineinfile:
        path: /root/.bashrc
        line: export KUBECONFIG=/root/.kube/config
        regexp: '^export KUBECONFIG='
        state: present
        create: true
        mode: "0644"
