---
- name: Group hosts by k8s_role host variable
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  gather_facts: true

  tasks:
    - name: Group by k8s_role host variable
      ansible.builtin.group_by:
        key: "k8s_role_{{ foreman_params.k8s_role }}"


- name: Initialize primary control plane
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Download kubeadm config
      ansible.builtin.get_url:
        url: https://git.garaventaville.com/Garaventaville/kubernetes-node-provisioning/raw/branch/master/kubeadm-config.yml
        dest: /tmp/kubeadm-config.yaml
        mode: "0644"
        force: true

    - name: Run kubeadm init
      ansible.builtin.command:
        cmd: kubeadm init --config /tmp/kubeadm-config.yaml --upload-certs
      register: kubeadm_init_output
      changed_when: true

    - name: Print kubeadm init output
      ansible.builtin.debug:
        var: kubeadm_init_output.stdout_lines

    - name: Extract certificate key
      ansible.builtin.set_fact:
        certificate_key: >-
          {{ kubeadm_init_output.stdout
             | regex_search('--certificate-key ([a-f0-9]+)', '\1')
             | first }}

    - name: Extract join token
      ansible.builtin.set_fact:
        join_token: >-
          {{ kubeadm_init_output.stdout
             | regex_search('--token ([a-z0-9]+\.[a-z0-9]+)', '\1')
             | first }}

    - name: Extract discovery token CA cert hash
      ansible.builtin.set_fact:
        discovery_hash: >-
          {{ kubeadm_init_output.stdout
             | regex_search('--discovery-token-ca-cert-hash (sha256:[a-f0-9]+)', '\1')
             | first }}

    - name: Set up kubeconfig for root
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp /etc/kubernetes/admin.conf /root/.kube/config
        chown root:root /root/.kube/config
      changed_when: true

    - name: Install Flannel CNI
      ansible.builtin.command:
        cmd: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /root/.kube/config
      register: flannel_output
      changed_when: true

    - name: Print Flannel install output
      ansible.builtin.debug:
        var: flannel_output.stdout_lines

    - name: Wait for control plane to be ready
      ansible.builtin.command:
        cmd: "kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=120s"
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false


- name: Join secondary control planes
  hosts: k8s_role_secondary
  become: true
  gather_facts: false
  serial: 1

  tasks:
    - name: Join cluster as control plane
      ansible.builtin.command:
        cmd: >
          kubeadm join naxxramas.garaventaville.com:6443
          --token {{ hostvars[groups['k8s_role_primary'][0]]['join_token'] }}
          --discovery-token-ca-cert-hash {{ hostvars[groups['k8s_role_primary'][0]]['discovery_hash'] }}
          --control-plane
          --certificate-key {{ hostvars[groups['k8s_role_primary'][0]]['certificate_key'] }}
      register: join_output
      changed_when: true

    - name: Print join output
      ansible.builtin.debug:
        var: join_output.stdout_lines

    - name: Set up kubeconfig for root
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp /etc/kubernetes/admin.conf /root/.kube/config
        chown root:root /root/.kube/config
      changed_when: true


- name: Install cert-manager and auto approver on primary control plane
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Wait for all control plane nodes to be ready before proceeding
      ansible.builtin.command:
        cmd: kubectl wait --for=condition=Ready nodes --selector=node-role.kubernetes.io/control-plane --timeout=300s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Add cert-manager Helm repo
      ansible.builtin.command:
        cmd: helm repo add jetstack https://charts.jetstack.io
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

    - name: Update Helm repos
      ansible.builtin.command:
        cmd: helm repo update
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

    - name: Install cert-manager via Helm
      ansible.builtin.command:
        cmd: >
          helm upgrade --install cert-manager jetstack/cert-manager
          --namespace cert-manager
          --create-namespace
          --set crds.enabled=true
          --wait
          --timeout 5m
      environment:
        KUBECONFIG: /root/.kube/config
      register: cert_manager_output
      changed_when: true

    - name: Print cert-manager install output
      ansible.builtin.debug:
        var: cert_manager_output.stdout_lines

    - name: Wait for cert-manager webhook to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Available deployment/cert-manager-webhook
          --namespace cert-manager
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false

    - name: Add approver-policy Helm repo
      ansible.builtin.command:
        cmd: helm repo add cert-manager-approver-policy https://charts.jetstack.io
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

    - name: Install cert-manager approver-policy via Helm
      ansible.builtin.command:
        cmd: >
          helm upgrade --install cert-manager-approver-policy jetstack/cert-manager-approver-policy
          --namespace cert-manager
          --wait
          --timeout 5m
      environment:
        KUBECONFIG: /root/.kube/config
      register: approver_output
      changed_when: true

    - name: Print approver-policy install output
      ansible.builtin.debug:
        var: approver_output.stdout_lines

    - name: Wait for approver-policy to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Available deployment/cert-manager-approver-policy
          --namespace cert-manager
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false


- name: Install metrics-server on primary control plane
  hosts: k8s_role_primary
  become: true
  gather_facts: false

  tasks:
    - name: Add metrics-server Helm repo
      ansible.builtin.command:
        cmd: helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

    - name: Update Helm repos
      ansible.builtin.command:
        cmd: helm repo update
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: true

    - name: Install metrics-server via Helm
      ansible.builtin.command:
        cmd: >
          helm upgrade --install metrics-server metrics-server/metrics-server
          --namespace kube-system
          --wait
          --timeout 5m
      environment:
        KUBECONFIG: /root/.kube/config
      register: metrics_server_output
      changed_when: true

    - name: Print metrics-server install output
      ansible.builtin.debug:
        var: metrics_server_output.stdout_lines

    - name: Wait for metrics-server to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait --for=condition=Available deployment/metrics-server
          --namespace kube-system
          --timeout=120s
      environment:
        KUBECONFIG: /root/.kube/config
      changed_when: false


- name: Install helm and k9s on all control plane nodes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  become: true
  gather_facts: true

  tasks:
    - name: Install helm
      ansible.builtin.shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Verify helm installation
      ansible.builtin.command:
        cmd: helm version --short
      register: helm_version
      changed_when: false

    - name: Print helm version
      ansible.builtin.debug:
        var: helm_version.stdout

    - name: Get latest k9s version
      ansible.builtin.uri:
        url: https://api.github.com/repos/derailed/k9s/releases/latest
        return_content: true
      register: k9s_release

    - name: Set k9s version fact
      ansible.builtin.set_fact:
        k9s_version: "{{ k9s_release.json.tag_name }}"

    - name: Download k9s archive
      ansible.builtin.get_url:
        url: "https://github.com/derailed/k9s/releases/download/{{ k9s_version }}/k9s_Linux_amd64.tar.gz"
        dest: /tmp/k9s.tar.gz
        mode: "0644"

    - name: Extract k9s binary
      ansible.builtin.unarchive:
        src: /tmp/k9s.tar.gz
        dest: /usr/local/bin
        include:
          - k9s
        remote_src: true
        mode: "0755"

    - name: Clean up k9s archive
      ansible.builtin.file:
        path: /tmp/k9s.tar.gz
        state: absent

    - name: Verify k9s installation
      ansible.builtin.command:
        cmd: k9s version --short
      register: k9s_version_output
      changed_when: false

    - name: Print k9s version
      ansible.builtin.debug:
        var: k9s_version_output.stdout
