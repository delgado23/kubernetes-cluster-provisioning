---
# =============================================================================
# maintenance.yml — Rolling OS Maintenance for Kubernetes Nodes
# =============================================================================
# Drains, updates packages, reboots, and uncordons nodes one at a time for
# both control planes and workers.
#
# Cluster scoping: this playbook targets the Foreman host groups, which contain
# the nodes of EVERY cluster regardless of environment. Each play therefore
# skips any node whose Foreman `cluster_env` parameter does not match the
# `cluster_env` passed in — before any SSH connection — so a run only ever
# touches one cluster. `cluster_env` is REQUIRED (the Ascender survey supplies
# it; on the CLI pass `-e cluster_env=test|prod`).
#
# Usage:
#   ansible-playbook maintenance.yml -e cluster_env=test
#   ansible-playbook maintenance.yml -e cluster_env=prod
#   ansible-playbook maintenance.yml -e cluster_env=test -e "drain_timeout=600"
# =============================================================================

- name: OS Maintenance — Control Plane Nodes
  hosts: foreman_almalinux10_kubernetescontrolplanenode
  serial: 1
  gather_facts: false
  become: true
  vars:
    drain_timeout: 300
    drain_grace_period: 60
    reboot_timeout: 600
    kubectl_bin: /usr/bin/kubectl
    kubeconfig: /etc/kubernetes/admin.conf
    node_role: control-plane
    delegate_kubectl: false
  pre_tasks:
    # Drop nodes from other clusters before any connection is attempted, so a
    # powered-off / mid-wipe node in another cluster can never fail this run.
    - name: Skip nodes that belong to a different cluster
      ansible.builtin.meta: end_host
      when: foreman_params.cluster_env | default('') != cluster_env
    - name: Gather facts for this cluster's nodes
      ansible.builtin.setup:
    # This playbook runs standalone (it never runs main.yml's prep play), so the
    # image_mode fact the maintenance role keys off has to be detected here too.
    # Image-mode (bootc/ostree) hosts patch the OS with `bootc upgrade`, not dnf.
    - name: Detect image-mode (ostree/bootc) booted system
      ansible.builtin.stat:
        path: /run/ostree-booted
      register: ostree_booted
    - name: Set image_mode fact
      ansible.builtin.set_fact:
        image_mode: "{{ ostree_booted.stat.exists }}"
  roles:
    - role: node_maintenance

- name: OS Maintenance — Worker Nodes
  hosts: foreman_almalinux10_kubernetesworkernode
  # serial: 1 — drain one worker at a time. Draining more than one at once can
  # overwhelm the remaining workers on small clusters (a 3-worker cluster has
  # only 2 nodes left to absorb the load), tipping a node NotReady and failing
  # the run. One at a time always leaves maximum capacity for evicted pods.
  serial: 1
  gather_facts: false
  become: true
  vars:
    drain_timeout: 300
    drain_grace_period: 60
    reboot_timeout: 600
    kubectl_bin: /usr/bin/kubectl
    kubeconfig: /etc/kubernetes/admin.conf
    node_role: worker
    delegate_kubectl: true
    # Delegate kubectl to a control plane of THIS cluster (not just the first
    # CP in the group, which may belong to a different cluster_env).
    control_plane_host: >-
      {{
        groups['foreman_almalinux10_kubernetescontrolplanenode']
        | map('extract', hostvars)
        | selectattr('foreman_params.cluster_env', 'equalto', cluster_env)
        | map(attribute='inventory_hostname')
        | first
      }}
  pre_tasks:
    - name: Skip nodes that belong to a different cluster
      ansible.builtin.meta: end_host
      when: foreman_params.cluster_env | default('') != cluster_env
    - name: Gather facts for this cluster's nodes
      ansible.builtin.setup:
    - name: Detect image-mode (ostree/bootc) booted system
      ansible.builtin.stat:
        path: /run/ostree-booted
      register: ostree_booted
    - name: Set image_mode fact
      ansible.builtin.set_fact:
        image_mode: "{{ ostree_booted.stat.exists }}"
  roles:
    - role: node_maintenance
