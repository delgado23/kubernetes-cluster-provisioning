---
# vars/vms.yml
# Kubernetes node definitions.
#
# Worker nodes are generated dynamically from worker_node_count and
# worker_name_prefix — no hardcoded list is required. Foreman receives
# names in the form "<prefix>-<NN>" (e.g. naxxramas-worker-01).
#
# Control plane nodes are defined explicitly because each one carries
# a distinct k8s_role, keepalived priority, and cluster-wide parameters
# that must be set individually in Foreman.
# ------------------------------------------------------------------
# Worker naming — used by the vm_provisioning role to generate the list
# ------------------------------------------------------------------
worker_hostgroup: "AlmaLinux 10/Kubernetes Worker Node"
worker_name_prefix: "naxxramas-worker"

# ------------------------------------------------------------------
# VM definitions (control plane only — workers are generated at runtime)
# ------------------------------------------------------------------
vms:

  # --- Controlplane nodes ---
  - name: lich-king
    hostgroup: "AlmaLinux 10/Kubernetes Controlplane Node"
    host_parameters:
      - { name: k8s_role,            value: primary                    }
      - { name: keepalived_state,    value: MASTER                     }
      - { name: keepalived_priority, value: 101                        }
      - { name: cluster_name,        value: naxxramas                  }
      - { name: k8s_api_endpoint,    value: k8s-api.garaventaville.com }
      - { name: k8s_api_endpoint_ip, value: 172.16.0.29                }
      - { name: metallb_pool,        value: 172.16.0.50-172.16.0.60    }

  - name: kel-thuzad
    hostgroup: "AlmaLinux 10/Kubernetes Controlplane Node"
    host_parameters:
      - { name: k8s_role,            value: secondary }
      - { name: keepalived_state,    value: BACKUP    }
      - { name: keepalived_priority, value: 100       }

  - name: sapphiron
    hostgroup: "AlmaLinux 10/Kubernetes Controlplane Node"
    host_parameters:
      - { name: k8s_role,            value: secondary }
      - { name: keepalived_state,    value: BACKUP    }
      - { name: keepalived_priority, value: 99        }
