---
# vars/vms.yml
# Kubernetes node definitions.
#
# Both control plane and worker nodes are named at runtime from a prefix
# and a counter (<prefix>-01, <prefix>-02, …).  No hardcoded hostnames.
#
# Control plane configs are listed primary first, then secondaries in
# failover order.  Only the first controlplane_node_count entries are
# provisioned; the primary is always entry [0].
# ------------------------------------------------------------------
# Cluster-wide network settings
# ------------------------------------------------------------------
keepalived_vip:      "{{ k8s_api_endpoint_ip }}"   # VIP shared by all control plane nodes
k8s_pod_cidr:        "10.244.0.0/16" # Flannel pod network
k8s_service_cidr:    "10.96.0.0/12"  # Kubernetes service network
haproxy_port:        7443             # HAProxy frontend port for kube-apiserver

# ------------------------------------------------------------------
# Survey vars — overridable at runtime (e.g. AWX job template survey)
# ------------------------------------------------------------------
k8s_api_endpoint:    "k8s-api.example.com"
k8s_api_endpoint_ip: "172.16.0.29"
metallb_pool:        "172.16.0.50-172.16.0.60"
ingress_ip:          "172.16.0.50"

# ------------------------------------------------------------------
# Naming and hostgroup strings
# ------------------------------------------------------------------
controlplane_hostgroup: "AlmaLinux 10/Kubernetes Controlplane Node"
controlplane_name_prefix: "k8s-cp"

worker_hostgroup: "AlmaLinux 10/Kubernetes Worker Node"
worker_name_prefix: "k8s-worker"

# ------------------------------------------------------------------
# Control plane node configs — host_parameters only, names are generated
# ------------------------------------------------------------------
controlplane_configs:

  # Primary — always provisioned (index 0)
  - host_parameters:
      - { name: k8s_role,            value: primary                    }
      - { name: keepalived_state,    value: MASTER                     }
      - { name: keepalived_priority, value: 101                        }
      - { name: k8s_api_endpoint,    value: "{{ k8s_api_endpoint }}"    }
      - { name: k8s_api_endpoint_ip, value: "{{ k8s_api_endpoint_ip }}" }
      - { name: metallb_pool,        value: "{{ metallb_pool }}"        }

  # Secondary — provisioned when controlplane_node_count >= 2
  - host_parameters:
      - { name: k8s_role,            value: secondary }
      - { name: keepalived_state,    value: BACKUP    }
      - { name: keepalived_priority, value: 100       }

  # Secondary — provisioned when controlplane_node_count >= 3
  - host_parameters:
      - { name: k8s_role,            value: secondary }
      - { name: keepalived_state,    value: BACKUP    }
      - { name: keepalived_priority, value: 99        }
