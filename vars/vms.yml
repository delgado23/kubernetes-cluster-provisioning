---
# vars/vms.yml
# Kubernetes node definitions.
# Required per entry : name, ip, hostgroup (must be a literal string — no Jinja
#                      variable references, as this list is parsed before
#                      play-level vars are interpolated)
# Optional per entry : cores, memory_mb, disk_gb  (overrides vars/vm_defaults.yml)
#
# Hostgroup values:
#   Controlplane : "AlmaLinux 10/Kubernetes Controlplane Node"
#   Worker       : "AlmaLinux 10/Kubernetes Worker Node"

vms:
  # --- Controlplane nodes ---
  - name: lich-king
    ip: 172.16.0.30
    hostgroup: "AlmaLinux 10/Kubernetes Controlplane Node"
    host_parameters:
      - name: keepalived_state
        value: MASTER
      - name: keepalived_priority
        value: 101
      - name: k8s_role
        value: primary
      - name: metallb_pool
        value: "172.16.0.50-172.16.0.60"
      - name: kubeadm_controlplaneendpoint
        value: "k8s-api.example.com"
      - name: clustername
        value: naxxramas
      - name: proxmox_tags
        value: "k8s;controlplane"

  - name: kel-thuzad
    ip: 172.16.0.31
    hostgroup: "AlmaLinux 10/Kubernetes Controlplane Node"
    host_parameters:
      - name: k8s_role
        value: secondary
      - name: proxmox_tags
        value: "k8s;controlplane"

  - name: sapphiron
    ip: 172.16.0.32
    hostgroup: "AlmaLinux 10/Kubernetes Controlplane Node"
    host_parameters:
      - name: k8s_role
        value: secondary
      - name: proxmox_tags
        value: "k8s;controlplane"

  # --- Worker nodes ---
