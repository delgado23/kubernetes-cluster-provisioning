---
# vars/vms.yml
# Kubernetes node definitions.
#
# Top-level cluster vars (shared across all nodes):
#   cluster_name                    kubeadm cluster name
#   k8s_api_endpoint               control plane VIP FQDN
#   k8s_api_endpoint_ip            control plane VIP IP
#   metallb_pool                   MetalLB address range
#
# Per-VM keys:
#   name        (required) short hostname, no domain suffix
#   hostgroup   (required) Foreman hostgroup string
#   host_parameters (optional)  list of {name, value} Foreman params
#
# Hostgroup anchors (edit here to rename for all nodes):
#   &cp  →  "AlmaLinux 10/Kubernetes Controlplane Node"
#   &wk  →  "AlmaLinux 10/Kubernetes Worker Node"
# ------------------------------------------------------------------
# YAML anchors — single source of truth for hostgroup strings
# ------------------------------------------------------------------
_hostgroups:
  controlplane: &cp "AlmaLinux 10/Kubernetes Controlplane Node"
  worker:       &wk "AlmaLinux 10/Kubernetes Worker Node"

# ------------------------------------------------------------------
# VM definitions
# ------------------------------------------------------------------
vms:

  # --- Controlplane nodes ---
  - name: lich-king
    hostgroup: *cp
    host_parameters:
      - { name: k8s_role,            value: primary                    }
      - { name: keepalived_state,    value: MASTER                     }
      - { name: keepalived_priority, value: 101                        }
      - { name: cluster_name,        value: naxxramas                  }
      - { name: k8s_api_endpoint,    value: k8s-api.garaventaville.com }
      - { name: k8s_api_endpoint_ip, value: 172.16.0.29                }
      - { name: metallb_pool,        value: 172.16.0.50-172.16.0.60    }

#  - name: kel-thuzad
